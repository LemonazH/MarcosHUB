        )}

        {tab==="migrazione"&&(
          <MigrazioneTab docs={docs} authed={authed} notify={notify} onComplete={loadData}/>
        )}
      </main>

      {/* ── POPUP DETTAGLIO RICONCILIAZIONE ── */}
      {storicoPopup&&(()=>{
        const {r, fatture, tipo, data, desc, accredito, id, descAdd, utente} = storicoPopup;
        // Incrocia fatture con documenti e assegni
        const docCollegati = fatture.map(f=>{
          const d = docs.find(d=>d[COL.numeroDocumento]===f||String(d._id)===f);
          return d ? {...d, _numRef:f} : null;
        }).filter(Boolean);
        const assCollegati = (() => {
          // Cerca assegni che hanno quella data o che contengono quei numeri nelle fatture pagate
          const byData = assegni.filter(a=>{
            const normA = String(a["DATA TITOLO"]||"").slice(0,10);
            return normA===String(data||"").slice(0,10);
          });
          const byFatt = assegni.filter(a=>{
            const fp = String(a["FATTURE PAGATE"]||"");
            return fatture.some(f=>fp.includes(f));
          });
          const all = [...byData,...byFatt];
          return all.filter((a,i,arr)=>arr.findIndex(b=>b["N TITOLO"]===a["N TITOLO"])===i);
        })();
        return (
          <div style={{position:"fixed",inset:0,background:"#000000cc",zIndex:500,
            display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
            onClick={()=>setStoricoPopup(null)}>
            <div style={{background:"#0a0f1e",border:"1px solid #1e3a5f",borderRadius:16,
              width:"100%",maxWidth:680,maxHeight:"85vh",display:"flex",flexDirection:"column",
              boxShadow:"0 24px 80px #00000099"}}
              onClick={e=>e.stopPropagation()}>

              {/* Header */}
              <div style={{padding:"16px 20px",borderBottom:"1px solid #1e293b",
                display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                    <span style={{color:"#475569",fontSize:10,fontFamily:"'IBM Plex Mono',monospace"}}>{id}</span>
                    <span style={{background:tipo==="Banca"?"#0f1f35":"#0a2a1a",
                      border:`1px solid ${tipo==="Banca"?"#1e3a5f":"#22c55e33"}`,
                      borderRadius:4,padding:"1px 6px",
                      color:tipo==="Banca"?"#60a5fa":"#4ade80",fontSize:9}}>{tipo}</span>
                  </div>
                  <div style={{color:"#4ade80",fontSize:20,fontWeight:800,
                    fontFamily:"'IBM Plex Mono',monospace"}}>{accredito?eur(accredito):"—"}</div>
                  <div style={{color:"#94a3b8",fontSize:11,marginTop:2}}>📅 {toIT(data)}</div>
                  {desc&&desc!=="—"&&<div style={{color:"#64748b",fontSize:10,marginTop:4,
                    maxWidth:400,lineHeight:1.4}}>{desc}</div>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {isAdmin&&(
                    <button onClick={async()=>{
                      if(!window.confirm(`Eliminare la riconciliazione ${id}?\nI saldi dei documenti collegati verranno ripristinati.`)) return;
                      try {
                        const res = await d1API.deleteRiconciliazione(id);
                        setStoricoPopup(null);
                        setRiconciliazioni(p=>p.filter(r=>r.id!==id));
                        notify(`Riconciliazione eliminata — ${res.ripristinati||0} documenti ripristinati.`,"success");
                        loadData();
                      } catch(e) { notify("Errore: "+e.message,"error"); }
                    }}
                    style={{background:"#1a0a0a",border:"1px solid #7f1d1d",color:"#ef4444",
                      borderRadius:8,padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700,
                      display:"flex",alignItems:"center",gap:5}}>
                      🗑 Elimina
                    </button>
                  )}
                  <button onClick={()=>setStoricoPopup(null)}
                    style={{background:"#1e293b",border:"none",color:"#94a3b8",
                      borderRadius:8,padding:"6px 12px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              </div>

              <div style={{overflowY:"auto",flex:1,padding:"16px 20px"}}>

                {/* Documenti/Fatture abbinate */}
                {(docCollegati.length>0||fatture.length>0)&&(
                  <div style={{marginBottom:16}}>
                    <div style={{color:"#475569",fontSize:10,fontWeight:700,
                      textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
                      📄 Documenti abbinati ({fatture.length})
                    </div>
                    {fatture.map((f,j)=>{
                      const doc = docCollegati.find(d=>d._numRef===f);
                      return (
                        <div key={j} style={{background:doc?"#0b1628":"#0a0a0a",
                          border:`1px solid ${doc?"#1e3a5f":"#1e293b"}`,
                          borderRadius:8,padding:"8px 12px",marginBottom:6,
                          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <span style={{color:"#60a5fa",fontWeight:700,fontSize:12,
                              fontFamily:"'IBM Plex Mono',monospace"}}>
                              {f}
                            </span>
                            {doc&&<div style={{color:"#94a3b8",fontSize:10,marginTop:2}}>
                              {doc[COL.ragioneSociale]} · {doc[COL.tipoDocumento]}
                            </div>}
                          </div>
                          {doc&&<div style={{textAlign:"right"}}>
                            <div style={{color: doc[COL.stato]==="CHIUSO"||doc[COL.stato]==="PAGATO"?"#4ade80":doc[COL.stato]==="DA INCASSARE"?"#fb923c":"#94a3b8",
                              fontSize:11,fontWeight:700}}>{doc[COL.stato]}</div>
                            <div style={{color:"#64748b",fontSize:10}}>
                              saldo: {eur(doc[COL.saldoResiduo])}
                            </div>
                          </div>}
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Assegni collegati */}
                {assCollegati.length>0&&(
                  <div>
                    <div style={{color:"#fb923c",fontSize:10,fontWeight:700,
                      textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>
                      📋 Assegni correlati ({assCollegati.length})
                    </div>
                    {assCollegati.map((a,j)=>(
                      <div key={j} style={{background:"#0e1620",border:"1px solid #1e3a5f",
                        borderRadius:8,padding:"10px 12px",marginBottom:6}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <div>
                            <div style={{color:"#e2e8f0",fontSize:12,fontWeight:700}}>{a["CLIENTE"]}</div>
                            <div style={{color:"#38bdf8",fontSize:10,
                              fontFamily:"'IBM Plex Mono',monospace",marginTop:1}}>{a["N TITOLO"]}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{color:"#4ade80",fontSize:13,fontWeight:800,
                              fontFamily:"'IBM Plex Mono',monospace"}}>{eur(a["IMPORTO TITOLO"])}</div>
                            <div style={{color:assStatoColor(a["STATO TITOLO"]),fontSize:9,marginTop:1}}>
                              {a["STATO TITOLO"]}
                            </div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                          <span style={{color:"#64748b",fontSize:9}}>Data: {toIT(a["DATA TITOLO"])}</span>
                          {a["FATTURE PAGATE"]&&<span style={{color:"#64748b",fontSize:9}}>
                            Fatt: {fmtDocList(a["FATTURE PAGATE"])}
                          </span>}
                          {a["NC SCALATE"]&&<span style={{color:"#c084fc",fontSize:9}}>
                            NC: {fmtDocList(a["NC SCALATE"])}
                          </span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {docCollegati.length===0&&assCollegati.length===0&&(
                  <div style={{textAlign:"center",color:"#334155",padding:30,fontSize:12}}>
                    Nessun documento o assegno trovato per questa riconciliazione
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {showPay&&<PayModal docs={docs} onSave={handleSavePay} onClose={()=>setShowPay(false)} user={authed} onLogout={handleLogout}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,background:"#0a0f1e",minHeight:"100vh",color:"#ef4444"}}>
        <h2 style={{fontFamily:"monospace"}}>⚠ Errore App</h2>
        <pre style={{background:"#070c18",padding:20,borderRadius:8,color:"#f87171",fontSize:12,overflow:"auto"}}>
          {this.state.error.toString()}
          {this.state.error.stack}
        </pre>
      </div>
    );
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch(e) {
  document.getElementById("root").innerHTML = 
    "<pre style='color:#ef4444;padding:20px;background:#0a0f1e;min-height:100vh'>" + 
    "ERRORE CRITICO:\n" + e.toString() + "\n" + (e.stack||"") + "</pre>";
}
</script>
</body>
</html>
