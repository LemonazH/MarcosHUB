                <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                  <div className="filter-group" style={{padding:"2px 8px"}}>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>DAL:</span>
                    <input type="date" value={ricDateDa} onChange={e=>setRicDateDa(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>AL:</span>
                    <input type="date" value={ricDateA} onChange={e=>setRicDateA(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    {(ricDateDa||ricDateA) && <button onClick={()=>{setRicDateDa("");setRicDateA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:2}}>✕</button>}
                  </div>
                  <div style={{display:"flex",gap:16,fontSize:11}}>
                    <span style={{color:"var(--accent)"}}>Bancarie: <strong>{filteredRico.filter(r=>r.tipo==="Banca"||(r.id||"").startsWith("RIC-")).length}</strong></span>
                    <span style={{color:"var(--success)"}}>Pagamenti: <strong>{filteredRico.filter(r=>r.tipo==="Pagamento"||(r.id||"").startsWith("INC-")).length}</strong></span>
                    <span style={{color:"var(--text-2)"}}>Totale: <strong style={{color:"#0284C7"}}>{eur(filteredRico.reduce((s,r)=>s+(parseNum(r.accredito||0)),0))}</strong></span>
                  </div>
                </div>
              )}
              {storicoSezione==="assegni"&&(
                <div style={{display:"flex",gap:12,alignItems:"center",flexWrap:"wrap"}}>
                  <div className="filter-group" style={{padding:"2px 8px"}}>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>DATA TITOLO:</span>
                    <input type="date" value={assDateDa} onChange={e=>setAssDateDa(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>A:</span>
                    <input type="date" value={assDateA} onChange={e=>setAssDateA(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    {(assDateDa||assDateA) && <button onClick={()=>{setAssDateDa("");setAssDateA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:2}}>✕</button>}
                  </div>
                  <div className="filter-group" style={{padding:"2px 8px"}}>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>DATA INCASSO:</span>
                    <input type="date" value={assDateIncDa} onChange={e=>setAssDateIncDa(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    <span style={{fontSize:9,color:"var(--text-2)",fontWeight:700}}>A:</span>
                    <input type="date" value={assDateIncA} onChange={e=>setAssDateIncA(e.target.value)} style={{...S.input,width:105,border:"none",padding:"4px 0",background:"transparent",fontSize:11}}/>
                    {(assDateIncDa||assDateIncA) && <button onClick={()=>{setAssDateIncDa("");setAssDateIncA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:2}}>✕</button>}
                  </div>
                  {storicoFiltroAssegno&&(
                    <div style={{display:"flex",alignItems:"center",gap:6,
                      background:"var(--warn-s)",border:"1px solid var(--warn)",
                      borderRadius:20,padding:"3px 10px"}}>
                      <span style={{color:"var(--warn)",fontSize:10,fontWeight:600}}>
                        {storicoFiltroAssegno.slice(8,10)}/{storicoFiltroAssegno.slice(5,7)}/{storicoFiltroAssegno.slice(0,4)}
                      </span>
                      <button onClick={()=>setStoricoFiltroAssegno(null)}
                        style={{background:"transparent",border:"none",color:"var(--warn)",
                          cursor:"pointer",fontSize:11,lineHeight:1,padding:0}}>✕</button>
                    </div>
                  )}
                  <span style={{color:"var(--text-2)",fontSize:11}}>
                    Totale: <strong style={{color:"var(--text-1)"}}>{filteredAssegni.length}</strong>
                  </span>
                  {nRicNonRic>0&&(
                    <span style={{color:"var(--warn)",fontSize:11}}>
                      ⚠ Non riconciliati: <strong>{nRicNonRic}</strong> — {eur(totNonRic)}
                    </span>
                  )}
                </div>
              )}
            </div>

            {/* ══ SEZIONE INCASSI ══ */}
            {storicoSezione==="incassi"&&(
              riconciliazioni.length===0?(
                <div style={{padding:60,textAlign:"center",color:"var(--text-2)",fontSize:12}}>Nessuna riconciliazione registrata</div>
              ):(
                <div style={{overflowX:"auto"}}>
                  <table className="data-table-dark" role="table" aria-label="Lista riconciliazioni" style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"var(--raised)"}}>
                        <RicoSortTh label="ID" colKey="id"/>
                        <RicoSortTh label="Data" colKey="data"/>
                        <RicoSortTh label="Accredito" colKey="accredito" style={{textAlign:"right"}}/>
                        <RicoSortTh label="Descrizione" colKey="descrizione"/>
                        <RicoSortTh label="Fatture/NAC collegate" colKey="fatture"/>
                      </tr>
                    </thead>
                    <tbody>
                      {ricoVisible.map((r,i)=>{
                         const fatture   = Array.isArray(r.fatture)?r.fatture:[];
                        const fattureIds = Array.isArray(r.fattureIds)&&r.fattureIds.length ? r.fattureIds : fatture;
                        const accredito = r.accredito||0;
                        const data      = r.data||"—";
                        const desc      = r.descrizione||"—";
                        const id        = r.id||"—";
                        const tipo      = r.tipo||"Banca";
                        return (
                          <tr key={i} style={{borderBottom:"1px solid var(--border-2)",cursor:"pointer"}}
                            className="row-hover"
                            onClick={()=>setStoricoPopup({r,fatture,fattureIds,tipo,data,desc,accredito,id,descAdd:r.descAdd||"",utente:r.utente||""})}>
                            <td style={{padding:"10px 14px"}}>
                              <div style={{color:"var(--text-2)",fontSize:9,marginBottom:2}}>{id}</div>
                              <span style={{background:tipo==="Banca"?"var(--accent-s)":"var(--success-s)",
                                borderRadius:4,padding:"1px 6px",
                                color:tipo==="Banca"?"#60a5fa":"#4ade80",fontSize:9}}>{tipo}</span>
                            </td>
                            <td style={{padding:"10px 14px",color:"var(--text-2)",fontSize:12}}>{toIT(data)}</td>
                            <td style={{padding:"10px 14px",color:"var(--success)",fontWeight:700,fontSize:13,fontFamily:"var(--mono)"}}>{accredito?eur(accredito):"—"}</td>
                            <td style={{padding:"10px 14px",color:"var(--text-2)",fontSize:11,maxWidth:260,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{desc}</td>
                            <td style={{padding:"10px 14px"}}>
                              {fatture.length>0?fatture.map((f,j)=>(
                                <span key={j} style={{display:"inline-block",background:"var(--accent-s)",
                                  border:"1px solid var(--border)",borderRadius:4,padding:"1px 6px",
                                  color:"var(--accent)",fontSize:10,marginRight:4,marginBottom:2}}>{f}</span>
                              )):<span style={{color:"var(--text-3)"}}>—</span>}
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {filteredRico.length > ricRowsLimit && (
                    <div style={{padding:10,textAlign:"center",borderTop:"1px solid var(--border)",background:"var(--bg)"}}>
                      <button onClick={()=>setRicRowsLimit(v=>v+VIRTUAL_STEP)} className="micro-btn micro-btn--accent" style={{padding:"7px 12px"}}>
                        Mostra altri {Math.min(VIRTUAL_STEP, filteredRico.length - ricRowsLimit)}
                      </button>
                    </div>
                  )}
                </div>
              )
            )}

            {/* ══ SEZIONE ASSEGNI ══ */}
            {storicoSezione==="assegni"&&(
              assegniVis.length===0?(
                <div style={{padding:60,textAlign:"center",color:"var(--text-2)",fontSize:12}}>
                  {storicoFiltroAssegno?"Nessun assegno per questa data":"Nessun assegno registrato"}
                </div>
              ):(
                <div style={{overflowX:"auto"}}>
                  <table className="data-table-dark" role="table" aria-label="Dettaglio assegni riconciliati" style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                    <thead>
                      <tr style={{background:"var(--raised)"}}>
                        {["N° Assegno","Cliente","Data Titolo","Data Incasso","Importo","Fatture Pagate","NC Scalate","Stato","RIC"].map(h=>(
                          <th key={h} style={{padding:"9px 12px",textAlign:h==="Importo"?"right":"left",
                            color:"var(--text-2)",fontWeight:600,fontSize:10,
                            borderBottom:"1px solid var(--border)",whiteSpace:"nowrap"}}>{h}</th>
                        ))}
                      </tr>
                    </thead>
                    <tbody>
                      {assegniStoricoVisible.map((a,i)=>{
                        const isRic = (a["STATO TITOLO"]||"").toUpperCase()==="INCASSATO";
                        const isHL  = storicoFiltroAssegno && (a["DATA TITOLO"]||"").slice(0,10)===storicoFiltroAssegno;
                        const stato = a["STATO TITOLO"]||"";
                        const statoC = assStatoColor(stato);
                        return (
                          <tr key={i}
                            style={{borderBottom:"1px solid var(--border-2)",
                              background:isHL?"#1A1A0A":"var(--surface)",
                              borderLeft:isHL?"3px solid var(--warn)":"3px solid transparent"}}
                            className="row-hover">
                            <td style={{padding:"9px 12px",color:"#0284C7",fontWeight:700,
                              fontFamily:"var(--mono)",fontSize:11,whiteSpace:"nowrap"}}>
                              {a["N TITOLO"]||"—"}
                            </td>
                            <td style={{padding:"9px 12px",color:"var(--text-1)",fontSize:11}}>
                              {a["CLIENTE"]||"—"}
                            </td>
                            <td style={{padding:"9px 12px",color:"var(--text-2)",fontSize:11,whiteSpace:"nowrap"}}>
                              {toIT(a["DATA TITOLO"])||"—"}
                            </td>
                            <td style={{padding:"9px 12px",color:"var(--text-2)",fontSize:11,whiteSpace:"nowrap"}}>
                              {toIT(a["DATA INCASSO PREVISTA"]||a["DATA TITOLO"])||"—"}
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"right",color:"var(--success)",
                              fontWeight:700,fontFamily:"var(--mono)",whiteSpace:"nowrap"}}>
                              {eur(a["IMPORTO TITOLO"])}
                            </td>
                            <td style={{padding:"9px 12px",color:"var(--text-2)",fontSize:10,maxWidth:180,
                              overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}
                              title={a["FATTURE PAGATE"]||""}>
                              {a["FATTURE PAGATE"]||"—"}
                            </td>
                            <td style={{padding:"9px 12px",color:"#c084fc",fontSize:10}}>
                              {a["NC SCALATE"]||"—"}
                            </td>
                            <td style={{padding:"9px 12px",whiteSpace:"nowrap"}}>
                              <span style={{background:statoC+"22",color:statoC,
                                borderRadius:4,padding:"2px 7px",fontSize:9,fontWeight:700}}>
                                {stato}
                              </span>
                            </td>
                            <td style={{padding:"9px 12px",textAlign:"center"}}>
                              <select
                                value={isRic ? "SI" : "NO"}
                                onChange={e => {
                                  if (window.confirm(`Confermi aggiornamento RIC a "${e.target.value}" per assegno ${a["N TITOLO"] || ""}?`)) {
                                    handleEditRicStorico(a, e.target.value);
                                  }
                                }}
                                style={{
                                  background:"var(--surface)",
                                  color:isRic ? "var(--success)" : "var(--warn)",
                                  border:"1px solid var(--border)",
                                  borderRadius:"var(--radius-s)",
                                  fontSize:10,
                                  fontWeight:700,
                                  padding:"3px 6px",
                                  cursor:"pointer",
                                }}>
                                <option value="NO">NO</option>
                                <option value="SI">SI</option>
                              </select>
                            </td>
                          </tr>
                        );
                      })}
                    </tbody>
                  </table>
                  {assegniVis.length > storicoAssRowsLimit && (
                    <div style={{padding:10,textAlign:"center",borderTop:"1px solid var(--border)",background:"var(--bg)"}}>
                      <button onClick={()=>setStoricoAssRowsLimit(v=>v+VIRTUAL_STEP)} className="micro-btn micro-btn--accent" style={{padding:"7px 12px"}}>
                        Mostra altri {Math.min(VIRTUAL_STEP, assegniVis.length - storicoAssRowsLimit)}
                      </button>
                    </div>
                  )}
                </div>
              )
            )}

          </div>
          );
        })()}

        {tab==="migrazione"&&(
          <div className="tab-content"><MigrazioneTab docs={docs} authed={authed} notify={notify} onComplete={loadData}/></div>
        )}
        </main>

        <div className="bottom-dock">
          {TABS.map(({id,lbl,icon})=>{
            const active = tab===id;
            return (
              <button
                key={id}
                className={`dock-btn ${active?"active":""}`}
                data-tip={lbl}
                title={lbl}
                onClick={()=>setTab(id)}
                aria-label={lbl}
              >
                {icon}
              </button>
            );
          })}
          <div className="dock-actions">
            <button
              className="dock-btn"
              data-tip="Sincronizza"
              title="Sincronizza"
              onClick={loadData}
              aria-label="Sincronizza"
            >
              ↻
            </button>
            <button
              className="dock-btn"
              data-tip="Esci"
              title="Esci"
              onClick={handleLogout}
              aria-label="Esci"
            >
              ↩
            </button>
          </div>
        </div>
      </div>

      {/* ── POPUP DETTAGLIO RICONCILIAZIONE ── */}
      {storicoPopup&&(()=>{
        const {r, fatture, fattureIds, tipo, data, desc, accredito, id, descAdd, utente} = storicoPopup;
        // Incrocia per ID (fattureIds) → preciso anche quando FVE e NAC hanno stesso numero
        const lookupIds = fattureIds||fatture;
        const docCollegati = lookupIds.map(f=>{
          const d = docs.find(d=>String(d._id)===String(f)||d[COL.numeroDocumento]===f||String(d[COL.numeroDocumento])===String(f));
          return d ? {...d, _numRef: d[COL.numeroDocumento]} : null;
        }).filter(Boolean);
        const assCollegati = (() => {
          const titoloInCausaleSet = (() => {
            const src = String(desc || "");
            const m = src.match(/\[([^\]]+)\]\s*$/);
            if (!m) return new Set();
            return new Set(
              m[1]
                .split("+")
                .map(s => String(s||"").replace(/^[\s\[(]+|[\s\])]+$/g, "").trim())
                .filter(Boolean)
            );
          })();

          // byFatt con tipo documento: evita collisioni tra FVE/NAC con stesso numero
          const fattureSet = new Set((fatture||[]).map(f=>String(f).trim()).filter(Boolean));
          const fveSet = new Set(
            docCollegati
              .filter(d => (d?.[COL.tipoDocumento]||"").toUpperCase() === "FVE")
              .map(d => String(d?.[COL.numeroDocumento]||"").trim())
              .filter(Boolean)
          );
          const nacSet = new Set(
            docCollegati
              .filter(d => (d?.[COL.tipoDocumento]||"").toUpperCase() === "NAC")
              .map(d => String(d?.[COL.numeroDocumento]||"").trim())
              .filter(Boolean)
          );
          const hasTypedRefs = fveSet.size>0 || nacSet.size>0;

          const match = assegni.filter(a=>{
            const nTitolo = String(a["N TITOLO"]||"").trim();
            if (titoloInCausaleSet.size > 0) {
              return titoloInCausaleSet.has(nTitolo);
            }

            const fveRefs = parseDocRefs(a["FATTURE PAGATE"]||"");
            const nacRefs = parseDocRefs(a["NC SCALATE"]||"");
            const invoiceMatch = hasTypedRefs
              ? (fveRefs.some(p=>fveSet.has(String(p).trim())) || nacRefs.some(p=>nacSet.has(String(p).trim())))
              : ([...fveRefs, ...nacRefs].some(p=>fattureSet.has(String(p).trim())));
            const isIncassato = (a["STATO TITOLO"]||"").toUpperCase() === "INCASSATO";
            return invoiceMatch && isIncassato;
          });
          // Rimosso byData (matching per sola data) perché causava falsi positivi.
          return match.filter((a,i,arr)=>arr.findIndex(b=>b["N TITOLO"]===a["N TITOLO"])===i);
        })();
        return (
          <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.7)",zIndex:500,
            display:"flex",alignItems:"center",justifyContent:"center",animation:"overlayEnter .3s ease-out",padding:"12px"}}
            onClick={()=>setStoricoPopup(null)}>
            <div role="dialog" aria-label="Dettaglio riconciliazione e documenti collegati" style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,
              width:"clamp(320px, 100%, 680px)",maxHeight:"85vh",display:"flex",flexDirection:"column",animation:"modalEnter .35s cubic-bezier(0.34, 1.56, 0.64, 1)",
              boxShadow:"0 24px 80px #00000099"}}
              onClick={e=>e.stopPropagation()}>

              {/* Header */}
              <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",
                display:"flex",justifyContent:"space-between",alignItems:"flex-start"}}>
                <div>
                  <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                    <span style={{color:"var(--text-2)",fontSize:10,fontFamily:"var(--font)"}}>{id}</span>
                    <span style={{background:tipo==="Banca"?"var(--accent-s)":"var(--success-s)",
                      border:`1px solid ${tipo==="Banca"?"var(--bg)":"#22c55e33"}`,
                      borderRadius:4,padding:"1px 6px",
                      color:tipo==="Banca"?"#60a5fa":"#4ade80",fontSize:9}}>{tipo}</span>
                  </div>
                  <div style={{color:"var(--success)",fontSize:20,fontWeight:800,
                    fontFamily:"var(--font)"}}>{accredito?eur(accredito):"—"}</div>
                  <div className="popup-subtitle" style={{fontSize:11,marginTop:2}}>📅 {toIT(data)}</div>
                  {desc&&desc!=="—"&&<div className="popup-subtitle" style={{fontSize:10,marginTop:4,
                    maxWidth:400,lineHeight:1.4}}>{desc}</div>}
                </div>
                <div style={{display:"flex",gap:8,alignItems:"center"}}>
                  {isAdmin&&(
                    <button onClick={async()=>{
                      if(!window.confirm(`Eliminare la riconciliazione ${id}?\nI saldi dei documenti collegati verranno ripristinati.`)) return;
                      try {
                        const res = await d1API.deleteRiconciliazione(id);
                        setStoricoPopup(null);
                        setRiconciliazioni(p=>p.filter(r=>r.id!==id));
                        notify(`Riconciliazione eliminata — ${res.ripristinati||0} documenti ripristinati.`,"success");
                        loadData();
                      } catch(e) {
                        handleApiError(e);
                      }
                    }}
                    style={{background:"var(--danger-s)",border:"1px solid #7f1d1d",color:"var(--danger)",
                      borderRadius:"var(--radius-s)",padding:"6px 14px",cursor:"pointer",fontSize:12,fontWeight:700,
                      display:"flex",alignItems:"center",gap:5}}
                    className="micro-btn micro-btn--danger">
                      🗑 Elimina
                    </button>
                  )}
                  <button onClick={()=>setStoricoPopup(null)}
                    style={{background:"var(--accent-s)",border:"none",color:"var(--text-1)",
                      borderRadius:"var(--radius-s)",padding:"6px 12px",cursor:"pointer",fontSize:12}}>✕</button>
                </div>
              </div>

              <div style={{overflowY:"auto",flex:1,padding:"16px 20px"}}>

                {/* Documenti/Fatture abbinate */}
                {(docCollegati.length>0||fatture.length>0)&&(
                  <div style={{marginBottom:16}}>
                    <div className="popup-section-title" style={{marginBottom:8}}>
                      📄 Documenti abbinati ({fatture.length})
                    </div>
                    {fatture.map((f,j)=>{
                      const doc = docCollegati.find(d=>d._numRef===f);
                      return (
                        <div key={j} className="popup-dark-card" style={{background:doc?"rgba(255,255,255,.07)":"rgba(255,255,255,.04)",
                          border:`1px solid ${doc?"rgba(255,255,255,.14)":"rgba(255,255,255,.1)"}`,
                          borderRadius:"var(--radius-s)",padding:"8px 12px",marginBottom:6,
                          display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                          <div>
                            <span style={{color:"var(--accent)",fontWeight:700,fontSize:12,
                              fontFamily:"var(--font)"}}>
                              {f}
                            </span>
                            {doc&&<div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>
                              {doc[COL.ragioneSociale]} · {doc[COL.tipoDocumento]}
                            </div>}
                          </div>
                          {doc&&<div style={{textAlign:"right"}}>
                            <div style={{color: doc[COL.stato]==="CHIUSO"||doc[COL.stato]==="PAGATO"?"#4ade80":doc[COL.stato]==="DA INCASSARE"?"#fb923c":"#94a3b8",
                              fontSize:11,fontWeight:700}}>{doc[COL.stato]}</div>
                            <div style={{color:"var(--text-2)",fontSize:10}}>
                              saldo: {eur(doc[COL.saldoResiduo])}
                            </div>
                          </div>}
                        </div>
                      );
                    })}
                  </div>
                )}

                {/* Assegni collegati */}
                {assCollegati.length>0&&(
                  <div>
                    <div className="popup-section-title" style={{marginBottom:8,color:"var(--warn)"}}>
                      📋 Assegni correlati ({assCollegati.length})
                    </div>
                    {assCollegati.map((a,j)=>(
                      <div key={j} className="popup-dark-card" style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.12)",
                        borderRadius:"var(--radius-s)",padding:"10px 12px",marginBottom:6}}>
                        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                          <div>
                            <div style={{color:"var(--text-1)",fontSize:12,fontWeight:700}}>{a["CLIENTE"]}</div>
                            <div style={{color:"#0284C7",fontSize:10,
                              fontFamily:"var(--font)",marginTop:1}}>{a["N TITOLO"]}</div>
                          </div>
                          <div style={{textAlign:"right"}}>
                            <div style={{color:"var(--success)",fontSize:13,fontWeight:800,
                              fontFamily:"var(--font)"}}>{eur(a["IMPORTO TITOLO"])}</div>
                            <div style={{color:assStatoColor(a["STATO TITOLO"]),fontSize:9,marginTop:1}}>
                              {a["STATO TITOLO"]}
                            </div>
                          </div>
                        </div>
                        <div style={{display:"flex",gap:16,flexWrap:"wrap"}}>
                          <span style={{color:"var(--text-2)",fontSize:9}}>Data: {toIT(a["DATA TITOLO"])}</span>
                          {a["FATTURE PAGATE"]&&<span style={{color:"var(--text-2)",fontSize:9}}>
                            Fatt: {fmtDocList(a["FATTURE PAGATE"])}
                          </span>}
                          {a["NC SCALATE"]&&<span style={{color:"#c084fc",fontSize:9}}>
                            NC: {fmtDocList(a["NC SCALATE"])}
                          </span>}
                        </div>
                      </div>
                    ))}
                  </div>
                )}

                {docCollegati.length===0&&assCollegati.length===0&&(
                  <div style={{textAlign:"center",color:"var(--text-2)",padding:30,fontSize:12}}>
                    Nessun documento o assegno trovato per questa riconciliazione
                  </div>
                )}
              </div>
            </div>
          </div>
        );
      })()}

      {/* ── POPUP PERCORSI CONNESSI ── */}
      {pathPopup&&(
        <div
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,.66)",zIndex:510,display:"flex",alignItems:"center",justifyContent:"center",padding:20}}
          onClick={()=>setPathPopup(null)}>
          <div
            style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:16,width:"100%",maxWidth:860,maxHeight:"86vh",display:"flex",flexDirection:"column",boxShadow:"0 24px 80px #00000099"}}
            onClick={e=>e.stopPropagation()}>
            <div style={{padding:"16px 20px",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:10}}>
              <div>
                <div style={{color:"var(--text-1)",fontSize:18,fontWeight:800}}>{pathPopup.title}</div>
                <div className="popup-subtitle" style={{fontSize:11,marginTop:3}}>{pathPopup.subtitle}</div>
                <div style={{display:"flex",gap:10,marginTop:8,flexWrap:"wrap"}}>
                  <span className="popup-chip">Documenti: {pathPopup.docs.length}</span>
                  <span className="popup-chip">Incassi: {pathPopup.incs.length}</span>
                  <span className="popup-chip">Assegni: {pathPopup.ass.length}</span>
                  <span className="popup-chip">Riconciliazioni: {pathPopup.rico.length}</span>
                </div>
              </div>
              <button onClick={()=>setPathPopup(null)} style={{background:"var(--accent-s)",border:"none",color:"var(--text-1)",borderRadius:"var(--radius-s)",padding:"6px 12px",cursor:"pointer",fontSize:12}}>✕</button>
            </div>

            <div style={{overflowY:"auto",padding:"16px 20px",display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
              <div className="popup-dark-card" style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:10}}>
                <div className="popup-section-title" style={{marginBottom:8}}>Documenti collegati</div>
                {pathPopup.docs.length ? pathPopup.docs.map((d,idx)=>(
                  <div key={idx} style={{padding:"8px 9px",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,marginBottom:7,background:"rgba(255,255,255,.04)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <span style={{color:"var(--accent)",fontFamily:"var(--mono)",fontWeight:700,fontSize:11}}>{d[COL.numeroDocumento]||"—"}</span>
                      <span style={{color:"var(--text-2)",fontSize:10}}>{d[COL.tipoDocumento]||"—"}</span>
                    </div>
                    <div style={{color:"var(--text-1)",fontSize:11,marginTop:2}}>{d[COL.ragioneSociale]||"—"}</div>
                    <div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>Saldo: {eur(d[COL.saldoResiduo])} · Stato: {d[COL.stato]||"—"}</div>
                  </div>
                )) : <div style={{color:"var(--text-2)",fontSize:11}}>Nessun documento collegato</div>}
              </div>

              <div className="popup-dark-card" style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:10}}>
                <div className="popup-section-title" style={{marginBottom:8}}>Incassi collegati</div>
                {pathPopup.incs.length ? pathPopup.incs.map((inc,idx)=>(
                  <div key={idx} style={{padding:"8px 9px",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,marginBottom:7,background:"rgba(255,255,255,.04)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <span style={{color:"var(--text-1)",fontFamily:"var(--mono)",fontWeight:700,fontSize:11}}>{inc["ID Incasso"]||inc._id||"—"}</span>
                      <span style={{color:"var(--success)",fontWeight:700,fontSize:11}}>{eur(inc["Importo Totale"]||0)}</span>
                    </div>
                    <div style={{color:"var(--text-1)",fontSize:11,marginTop:2}}>{inc["Cliente"]||"—"}</div>
                    <div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>{inc["Metodo"]||"—"} · {toIT(inc["Data Ricezione"])||"—"}</div>
                  </div>
                )) : <div style={{color:"var(--text-2)",fontSize:11}}>Nessun incasso collegato</div>}
              </div>

              <div className="popup-dark-card" style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:10}}>
                <div className="popup-section-title" style={{marginBottom:8}}>Assegni collegati</div>
                {pathPopup.ass.length ? pathPopup.ass.map((a,idx)=>(
                  <div key={idx} style={{padding:"8px 9px",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,marginBottom:7,background:"rgba(255,255,255,.04)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <span style={{color:"var(--text-1)",fontFamily:"var(--mono)",fontWeight:700,fontSize:11}}>{a["N TITOLO"]||"—"}</span>
                      <span style={{color:"var(--success)",fontWeight:700,fontSize:11}}>{eur(a["IMPORTO TITOLO"]||0)}</span>
                    </div>
                    <div style={{color:"var(--text-1)",fontSize:11,marginTop:2}}>{a["CLIENTE"]||"—"}</div>
                    <div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>{toIT(a["DATA TITOLO"])||"—"} · <span style={{color:assStatoColor(a["STATO TITOLO"]),fontWeight:700}}>{a["STATO TITOLO"]||"—"}</span></div>
                  </div>
                )) : <div style={{color:"var(--text-2)",fontSize:11}}>Nessun assegno collegato</div>}
              </div>

              <div className="popup-dark-card" style={{background:"rgba(255,255,255,.04)",border:"1px solid rgba(255,255,255,.12)",borderRadius:12,padding:10}}>
                <div className="popup-section-title" style={{marginBottom:8}}>Riconciliazioni collegate</div>
                {pathPopup.rico.length ? pathPopup.rico.map((r,idx)=>(
                  <div key={idx} style={{padding:"8px 9px",border:"1px solid rgba(255,255,255,.12)",borderRadius:8,marginBottom:7,background:"rgba(255,255,255,.04)"}}>
                    <div style={{display:"flex",justifyContent:"space-between",gap:8}}>
                      <span style={{color:"var(--accent)",fontFamily:"var(--mono)",fontWeight:700,fontSize:11}}>{r.id||"—"}</span>
                      <span style={{color:"var(--success)",fontWeight:700,fontSize:11}}>{eur(r.accredito||0)}</span>
                    </div>
                    <div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>{toIT(r.data)||"—"} · {r.tipo||"—"}</div>
                    <div style={{color:"var(--text-2)",fontSize:10,marginTop:2,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{r.descrizione||"—"}</div>
                  </div>
                )) : <div style={{color:"var(--text-2)",fontSize:11}}>Nessuna riconciliazione collegata</div>}
              </div>
            </div>
          </div>
        </div>
      )}

      {showPay&&<PayModal docs={docs} onSave={handleSavePay} onClose={()=>setShowPay(false)} user={authed} onLogout={handleLogout}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,background:"var(--surface)",minHeight:"100vh",color:"var(--danger)"}}>
        <h2 style={{fontFamily:"monospace"}}>⚠ Errore App</h2>
        <pre style={{background:"var(--bg)",padding:20,borderRadius:"var(--radius-s)",color:"var(--danger)",fontSize:12,overflow:"auto"}}>
          {this.state.error.toString()}
          {this.state.error.stack}
        </pre>
      </div>
    );
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch(e) {
  document.getElementById("root").innerHTML = 
    "<pre style='color:#ef4444;padding:20px;background:#ffffff;min-height:100vh'>" + 
    "ERRORE CRITICO:\n" + e.toString() + "\n" + (e.stack||"") + "</pre>";
}
</script>
</body>
</html>
