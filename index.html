/* ──────────────────────────────────────────────
   IMPORT EXCEL DAL GESTIONALE
────────────────────────────────────────────── */
function MigrazioneTab({docs, authed, notify, onComplete}) {
  const [phase, setPhase] = React.useState("idle"); // idle | preview | importing | done
  const [parsed, setParsed] = React.useState(null); // {nuovi, duplicati, fve, nac}
  const [log, setLog] = React.useState([]);
  const fileRef = React.useRef();

  const addLog = msg => setLog(p => [...p, msg]);

  // Formatta data Excel (numero seriale o Date JS) → "YYYY-MM-DD"
  const excelDateToISO = val => {
    if (!val) return null;
    if (val instanceof Date) {
      return val.toISOString().slice(0,10);
    }
    if (typeof val === "number") {
      // Numero seriale Excel
      const d = new Date((val - 25569) * 86400 * 1000);
      return d.toISOString().slice(0,10);
    }
    if (typeof val === "string" && val.match(/^\d{4}-\d{2}-\d{2}/)) return val.slice(0,10);
    return String(val);
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setPhase("idle"); setParsed(null); setLog([]);

    try {
      // Legge il file come ArrayBuffer
      const buf = await file.arrayBuffer();
      const XLSX = window.XLSX;
      const wb = XLSX.read(buf, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

      if (rows.length < 2) { notify("File vuoto o non valido","error"); return; }

      // Colonne: A=0 Data, D=3 Tipo, F=5 Num.Doc, I=8 CodPV, J=9 Cliente, N=13 Tot.lordo
      const righe = rows.slice(1).filter(r => r[3] === "FVE" || r[3] === "NAC");

      if (righe.length === 0) { notify("Nessuna riga FVE/NAC trovata","error"); return; }

      // Costruisce set dei documenti già presenti per deduplicazione
      // Chiave: numero_documento + "|" + tipo_documento + "|" + data_documento
      const esistenti = new Set(
        docs.map(d => `${d[COL.numeroDocumento]}|${d[COL.tipoDocumento]}|${d[COL.dataDocumento]}`)
      );

      const nuovi = [], duplicati = [];

      righe.forEach(r => {
        const tipo      = r[3];  // D
        const numDoc    = String(r[5] || "").trim();  // F
        const data      = excelDateToISO(r[0]);       // A
        const codCliente= String(r[8] || "").trim();  // I
        const cliente   = String(r[9] || "").trim();  // J
        let importo     = parseFloat(r[13]) || 0;    // N

        // NAC → importo negativo
        if (tipo === "NAC" && importo > 0) importo = -importo;

        const chiave = `${numDoc}|${tipo}|${data}`;

        const doc = {
          numero_documento: numDoc,
          tipo_documento: tipo,
          data_documento: data,
          codice_cliente: codCliente,
          ragione_sociale: cliente,
          importo_totale: importo,
          saldo_residuo: importo,
          stato: "APERTO",
        };

        if (esistenti.has(chiave)) {
          duplicati.push(doc);
        } else {
          nuovi.push(doc);
          esistenti.add(chiave); // evita duplicati interni al file stesso
        }
      });

      const fve = nuovi.filter(d => d.tipo_documento === "FVE");
      const nac = nuovi.filter(d => d.tipo_documento === "NAC");

      setParsed({ nuovi, duplicati, fve, nac });
      addLog(`📂 File letto: ${righe.length} righe totali`);
      addLog(`✅ Nuovi da importare: ${nuovi.length} (${fve.length} FVE, ${nac.length} NAC)`);
      addLog(`⏭ Già presenti (saltati): ${duplicati.length}`);
      setPhase("preview");
    } catch(err) {
      notify("Errore lettura file: " + err.message, "error");
      addLog("❌ " + err.message);
    }
  };

  const handleImport = async () => {
    if (!parsed?.nuovi?.length) { notify("Nessun documento nuovo da importare","error"); return; }
    setPhase("importing");
    addLog("Avvio importazione...");
    try {
      const BATCH = 50;
      let tot = 0;
      for (let i = 0; i < parsed.nuovi.length; i += BATCH) {
        const batch = parsed.nuovi.slice(i, i + BATCH);
        const res = await d1API.migrate("documenti", batch);
        tot += res.inserted || 0;
        addLog(`Inseriti ${tot}/${parsed.nuovi.length}...`);
      }
      addLog(`✅ Importazione completata! ${tot} documenti aggiunti.`);
      setPhase("done");
      setTimeout(() => { onComplete(); notify(`${tot} documenti importati ✓`, "success"); }, 800);
    } catch(err) {
      addLog("❌ Errore: " + err.message);
      notify("Errore: " + err.message, "error");
      setPhase("preview");
    }
  };

  const reset = () => { setParsed(null); setLog([]); setPhase("idle"); if(fileRef.current) fileRef.current.value=""; };

  return (
    <div className="premium-panel-dark" style={{maxWidth:760,margin:"0 auto",padding:"18px 20px"}}>
      <h2 style={{fontFamily:"var(--font)",fontWeight:800,fontSize:20,marginBottom:4}}>
        Importa da Excel
      </h2>
      <p style={{color:"var(--text-2)",fontSize:12,marginBottom:24}}>
        Carica il file Excel esportato dal gestionale. Vengono letti solo i documenti FVE e NAC,
        scartando automaticamente i duplicati già presenti.
      </p>

      {/* Drop area file */}
      <div style={{border:"1px dashed rgba(255,255,255,.26)",borderRadius:12,padding:"32px",textAlign:"center",
        marginBottom:20,background:"linear-gradient(180deg, rgba(24,24,24,.96) 0%, rgba(17,17,17,.92) 100%)",cursor:"pointer"}}
        onClick={()=>fileRef.current?.click()}>
        <div style={{color:"var(--text-2)",fontSize:13}}>Clicca per selezionare il file <strong style={{color:"var(--text-1)"}}>.xlsx</strong></div>
        <div style={{color:"var(--text-2)",fontSize:11,marginTop:4}}>Colonne usate: A (data), D (tipo), F (num.doc), I (cod.cliente), J (cliente), N (importo)</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile}
          style={{display:"none"}} />
      </div>

      {/* Preview risultato parsing */}
      {parsed && (
        <div style={{marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
            {[
              {label:"Nuovi totali", val:parsed.nuovi.length, color:"var(--success)"},
              {label:"FVE nuove",    val:parsed.fve.length,   color:"var(--accent)"},
              {label:"NAC nuove",    val:parsed.nac.length,   color:"#f59e0b"},
              {label:"Duplicati",    val:parsed.duplicati.length, color:"var(--text-2)"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"var(--surface)",border:"1px solid var(--border)",
                borderRadius:"var(--radius-s)",padding:"12px",textAlign:"center"}}>
                <div style={{color,fontSize:22,fontWeight:800}}>{val}</div>
                <div style={{color:"var(--text-2)",fontSize:10,marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Anteprima prime righe nuove */}
          {parsed.nuovi.length > 0 && (
            <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-s)",
              overflow:"auto",marginBottom:16,maxHeight:180}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{background:"var(--bg)"}}>
                    {["Tipo","N.Doc","Data","Cliente","Importo"].map(h=>(
                      <th key={h} style={{padding:"6px 10px",color:"var(--text-2)",fontWeight:600,textAlign:"left"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {parsed.nuovi.slice(0,8).map((d,i)=>(
                    <tr key={i} style={{borderTop:"1px solid var(--border)"}}>
                      <td style={{padding:"5px 10px"}}>
                        <span style={{background:d.tipo_documento==="FVE"?"var(--bg)":"var(--warn-s)",
                          color:d.tipo_documento==="FVE"?"#60a5fa":"#f59e0b",
                          padding:"1px 6px",borderRadius:4,fontSize:10}}>{d.tipo_documento}</span>
                      </td>
                      <td style={{padding:"5px 10px",color:"var(--text-1)"}}>{d.numero_documento}</td>
                      <td style={{padding:"5px 10px",color:"var(--text-2)"}}>{toIT(d.data_documento)}</td>
                      <td style={{padding:"5px 10px",color:"var(--text-1)",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.ragione_sociale}</td>
                      <td style={{padding:"5px 10px",color:d.importo_totale<0?"#f87171":"#4ade80",fontFamily:"var(--font)"}}>
                        {new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(d.importo_totale)}
                      </td>
                    </tr>
                  ))}
                  {parsed.nuovi.length > 8 && (
                    <tr><td colSpan={5} style={{padding:"6px 10px",color:"var(--text-2)",fontSize:10}}>
                      ... e altri {parsed.nuovi.length - 8} documenti
                    </td></tr>
                  )}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Bottoni azione */}
      <div style={{display:"flex",gap:10}}>
        {phase === "preview" && parsed?.nuovi?.length > 0 && (
          <button onClick={handleImport}
            style={{background:"var(--grad-accent)",color:"#0f172a",
              border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,
              fontSize:13,cursor:"pointer",fontFamily:"var(--font)"}}>
            ⬆ Importa {parsed.nuovi.length} documenti
          </button>
        )}
        {phase === "preview" && parsed?.nuovi?.length === 0 && (
          <div style={{color:"#f59e0b",fontSize:13,padding:"12px 0"}}>
            ✓ Tutti i documenti del file sono già presenti nel database.
          </div>
        )}
        {phase === "importing" && (
          <button disabled style={{background:"var(--accent-s)",color:"var(--text-2)",border:"none",
            borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:13,fontFamily:"var(--font)"}}>
            Importazione in corso...
          </button>
        )}
        {phase === "done" && (
          <button onClick={reset}
            style={{background:"var(--accent-s)",color:"var(--text-2)",border:"none",borderRadius:10,
              padding:"12px 28px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"var(--font)"}}>
            ↺ Importa un altro file
          </button>
        )}
        {(phase === "preview" || phase === "done") && (
          <button onClick={reset}
            style={{background:"transparent",color:"var(--text-2)",border:"1px solid var(--border)",
              borderRadius:10,padding:"12px 20px",fontWeight:600,fontSize:13,
              cursor:"pointer",fontFamily:"var(--font)"}}>
            Annulla
          </button>
        )}
      </div>

      {/* Log */}
      {log.length > 0 && (
        <div style={{marginTop:20,background:"var(--bg)",border:"1px solid var(--border)",
          borderRadius:"var(--radius-s)",padding:12,maxHeight:150,overflow:"auto"}}>
          {log.map((l,i)=><div key={i} style={{fontSize:11,color:"var(--text-2)",marginBottom:3}}>{l}</div>)}
        </div>
      )}
    </div>
  );
}

function App() {
  const VIRTUAL_STEP = 250;

  // ── LOGIN ──

  const isAdmin = sessionStorage.getItem("cf_ruolo")==="admin";
  const [loginUser, setLoginUser] = useState("");
  const [loginPass, setLoginPass] = useState("");
  const [loginErr, setLoginErr] = useState("");

  const handleLogout = async () => {
    await d1API.logout();
    sessionStorage.removeItem("cf_user");
    sessionStorage.removeItem("cf_token");

  // ── APP HOOKS (devono stare SEMPRE prima di qualsiasi return) ──
  const [auth,setAuth]=useState(false);

  const [loading,setLoading]=useState(false);
  const [docs,setDocs]=useState([]);

  const selAccredito = accrediti[0] || null; // compat con codice esistente
  const [recoSearch,setRecoSearch]=useState(""); // ricerca fatture nel pannello
  const [storicoPopup,setStoricoPopup]=useState(null); // riconciliazione aperta in popup
  const [pathPopup,setPathPopup]=useState(null); // popup percorsi connessi da row click
  const [storicoFiltroAssegno,setStoricoFiltroAssegno]=useState(null); // highlight da click grafico
  const [storicoSezione,setStoricoSezione]=useState("incassi"); // "incassi" | "assegni"
  const [assShowAltri,setAssShowAltri]=useState(false); // espandi altri assegni in riconciliazione
  // ── Pannello assegni manuale ──
  const [assManData,setAssManData]=useState(()=>new Date().toISOString().slice(0,10)); // data selezionata
  const [assManDa,setAssManDa]=useState("");    // filtro data da
  const [assManA,setAssManA]=useState("");      // filtro data a
  const [assManStato,setAssManStato]=useState("TUTTI"); // filtro stato
  const [assManSearch,setAssManSearch]=useState(""); // ricerca cliente/numero
  const [assManSel,setAssManSel]=useState(null); // assegno selezionato per dettaglio
  const [recoTab,setRecoTab]=useState("assegni"); // "assegni" | "bonifici"
  const [incManDa,setIncManDa]=useState("");
  const [incManA,setIncManA]=useState("");
  const [incManSearch,setIncManSearch]=useState("");
  const [recoSel,setRecoSel]=useState({}); // {numDoc: importoAllocato}
  const selIds = new Set(Object.keys(recoSel));
  const [recoSaving,setRecoSaving]=useState(false);
  const [tab,setTab]=useState("dashboard");
  const [globalSearch,setGlobalSearch]=useState("");
  const [toast,setToast]=useState(null);
  const [showBackupReminder,setShowBackupReminder]=useState(false);
  const [isNarrow,setIsNarrow]=useState(() => window.innerWidth <= 1180);

  const [docRowsLimit,setDocRowsLimit]=useState(VIRTUAL_STEP);
  const [incRowsLimit,setIncRowsLimit]=useState(VIRTUAL_STEP);
  const [assRowsLimit,setAssRowsLimit]=useState(VIRTUAL_STEP);
  const [ricRowsLimit,setRicRowsLimit]=useState(VIRTUAL_STEP);
  const [storicoAssRowsLimit,setStoricoAssRowsLimit]=useState(VIRTUAL_STEP);
  const [showPay,setShowPay]=useState(false);
  const [showAdvancedDocStates,setShowAdvancedDocStates]=useState(false);
  const [fState,setFState]=useState("Tutti");
  const [fType,setFType]=useState("Tutti");
  const [search,setSearch]=useState("");
  const [docDateDa,setDocDateDa]=useState("");
  const [docDateA,setDocDateA]=useState("");
  const [docDatePagDa,setDocDatePagDa]=useState("");
  const [docDatePagA,setDocDatePagA]=useState("");
  const [incDateDa,setIncDateDa]=useState("");
  const [incDateA,setIncDateA]=useState("");
  const [incTabSearch,setIncTabSearch]=useState("");
  const [assDateDa,setAssDateDa]=useState("");
  const [assDateA,setAssDateA]=useState("");
  const [assDateIncDa,setAssDateIncDa]=useState("");
  const [assDateIncA,setAssDateIncA]=useState("");
  const [assTabSearch,setAssTabSearch]=useState("");
  const [ricDateDa,setRicDateDa]=useState("");
  const [ricDateA,setRicDateA]=useState("");
  const [recoDateDa,setRecoDateDa]=useState("");
  const [recoDateA,setRecoDateA]=useState("");

  useEffect(()=>{
    const onResize = () => setIsNarrow(window.innerWidth <= 1180);
    window.addEventListener("resize", onResize);
    return () => window.removeEventListener("resize", onResize);
  },[]);

  useEffect(()=>{
    const last = Number(localStorage.getItem("cf_last_backup_ts") || 0);
    const ONE_DAY = 24 * 60 * 60 * 1000;
    setShowBackupReminder(!last || (Date.now() - last) > ONE_DAY);
  },[]);

  useEffect(()=>{
    setDocRowsLimit(VIRTUAL_STEP);
    setIncRowsLimit(VIRTUAL_STEP);
    setAssRowsLimit(VIRTUAL_STEP);
    setRicRowsLimit(VIRTUAL_STEP);
    setStoricoAssRowsLimit(VIRTUAL_STEP);
  },[tab, docDateDa, docDateA, docDatePagDa, docDatePagA, incDateDa, incDateA, assDateDa, assDateA, assDateIncDa, assDateIncA, ricDateDa, ricDateA, search, globalSearch, incTabSearch, assTabSearch]);

  const globalQ = globalSearch.trim().toLowerCase();

  const matchesGlobal = (obj) => {
    if (!globalQ) return true;
    return Object.values(obj || {}).some(v => String(v || "").toLowerCase().includes(globalQ));
  };

  const filtered=docs.filter(d=>{
    if(fState!=="Tutti"&&d[COL.stato]?.toUpperCase()!==fState) return false;
    if(fType!=="Tutti"&&d[COL.tipoDocumento]!==fType) return false;
    if(docDateDa){ const k=toISO(d[COL.dataDocumento]); if(k<docDateDa) return false; }
    if(docDateA){ const k=toISO(d[COL.dataDocumento]); if(k>docDateA) return false; }
    if(docDatePagDa){ const k=toISO(d[COL.dataPagamento]); if(k<docDatePagDa) return false; }
    if(docDatePagA){ const k=toISO(d[COL.dataPagamento]); if(k>docDatePagA) return false; }
    if(search){ const q=search.toLowerCase(); if(!Object.values(d).some(v=>String(v).toLowerCase().includes(q))) return false; }
    if(!matchesGlobal(d)) return false;
    return true;
  });

  // Ordinamento tabelle — useState semplici, nessun hook custom
  const [docSortKey, setDocSortKey] = useState(COL.dataDocumento);
  const [docSortDir, setDocSortDir] = useState("asc");
  const [incSortKey, setIncSortKey] = useState("Data Ricezione");
  const [incSortDir, setIncSortDir] = useState("desc");
  const [assSortKey, setAssSortKey] = useState("DATA TITOLO");
  const [assSortDir, setAssSortDir] = useState("desc");
  const [ricoSortKey, setRicoSortKey] = useState("data");
  const [ricoSortDir, setRicoSortDir] = useState("desc");

  const toggleDocSort = k => { setDocSortKey(k); setDocSortDir(d=>k===docSortKey?(d==="asc"?"desc":"asc"):"asc"); };
  const toggleIncSort = k => { setIncSortKey(k); setIncSortDir(d=>k===incSortKey?(d==="asc"?"desc":"asc"):"asc"); };
  const toggleAssSort = k => { setAssSortKey(k); setAssSortDir(d=>k===assSortKey?(d==="asc"?"desc":"asc"):"asc"); };
  const toggleRicoSort = k => { setRicoSortKey(k); setRicoSortDir(d=>k===ricoSortKey?(d==="asc"?"desc":"asc"):"asc"); };

  const docSorted = sortData(filtered, docSortKey, docSortDir);

  const filteredIncs = incs.filter(i=>{
    if(incTabSearch){
      const q = incTabSearch.toLowerCase();
      const hit = Object.values(i).some(v => String(v || "").toLowerCase().includes(q));
      if(!hit) return false;
    }
    if(incDateDa){ const k=toISO(i["Data Ricezione"]); if(k<incDateDa) return false; }
    if(incDateA){ const k=toISO(i["Data Ricezione"]); if(k>incDateA) return false; }
    if(!matchesGlobal(i)) return false;
    return true;
  });
  const incSorted = sortData(filteredIncs, incSortKey, incSortDir);

  const filteredAssegni = assegni.filter(a=>{
    if(assTabSearch){
      const q = assTabSearch.toLowerCase();
      const hit = Object.values(a).some(v => String(v || "").toLowerCase().includes(q));
      if(!hit) return false;
    }
    if(assDateDa){ const k=toISO(a["DATA TITOLO"]); if(k<assDateDa) return false; }
    if(assDateA){ const k=toISO(a["DATA TITOLO"]); if(k>assDateA) return false; }
    if(assDateIncDa){ const k=toISO(a["DATA INCASSO PREVISTA"]); if(k<assDateIncDa) return false; }
    if(assDateIncA){ const k=toISO(a["DATA INCASSO PREVISTA"]); if(k>assDateIncA) return false; }
    if(!matchesGlobal(a)) return false;
    return true;
  });
  const assSorted = sortData(filteredAssegni, assSortKey, assSortDir);
  const assegniRiconciliabili = assegni.filter(a => (a["STATO TITOLO"] || "").toUpperCase() !== "INCASSATO");
  const incassiRiconciliabili = incs.filter(i => {
    if ((i["Metodo"] || "").toUpperCase() === "ASSEGNO") return false;
    const refs = parseDocRefs(i.fatture);
    if (!refs.length) return true;

    const linkedDocs = refs.flatMap(num =>
      docs.filter(d => String(d[COL.numeroDocumento]) === String(num))
    );
    if (!linkedDocs.length) return true;

    return linkedDocs.some(d => (d[COL.stato] || "").toUpperCase() === "DA RICONCILIARE");
  });

  const filteredRico = riconciliazioni.filter(r=>{
    if(ricDateDa){ const k=toISO(r.data); if(k<ricDateDa) return false; }
    if(ricDateA){ const k=toISO(r.data); if(k>ricDateA) return false; }
    if(!matchesGlobal(r)) return false;
    return true;
  });
  const ricoSorted = sortData(filteredRico, ricoSortKey, ricoSortDir);

  const bankRowsFiltered = bankRows.filter(r => {
    const k = toISO(r.data || "");
    if(recoDateDa && k && k < recoDateDa) return false;
    if(recoDateA && k && k > recoDateA) return false;
    if(!matchesGlobal(r)) return false;
    return true;
  });

  const docVisible = docSorted.slice(0, docRowsLimit);
  const incVisible = incSorted.slice(0, incRowsLimit);
  const assVisible = assSorted.slice(0, assRowsLimit);
  const ricoVisible = ricoSorted.slice(0, ricRowsLimit);

  const DocSortTh = makeSortTh(docSortKey, docSortDir, toggleDocSort);
  const IncSortTh = makeSortTh(incSortKey, incSortDir, toggleIncSort);
  const AssSortTh = makeSortTh(assSortKey, assSortDir, toggleAssSort);
  const RicoSortTh = makeSortTh(ricoSortKey, ricoSortDir, toggleRicoSort);

  const notify=(msg,type="info")=>setToast({msg,type});

  // ── Error handler per nuovi error codes dal backend ──
  const handleApiError = (error) => {
    const msg = String(error.message || error);
    
    // Riconosce error codes dal backend
    if (msg.includes('VERSION_CONFLICT')) {
      notify('Assegno modificato da un altro utente. Ricaricamento...', 'warn');
      return 'reload';
    }
    if (msg.includes('VERSION_MISMATCH')) {
      notify('Documento modificato da un altro utente. Ricarica', 'warn');
      return 'reload';
    }
    if (msg.includes('INCASSO_DELETED')) {
      notify('Incasso eliminato. Contatta admin per ripristinare', 'error');
      return 'reload';
    }
    if (msg.includes('INVALID_STATO')) {
      notify('Transizione stato non consentita', 'error');
      return;
    }
    if (msg.includes('INVALID_INPUT')) {
      notify('Dati non validi: ' + msg, 'error');
      return;
    }
    if (msg.includes('AUTH_FAILED')) {
      notify('Autenticazione fallita. Risali...', 'error');
      window.location.reload();
      return;
    }
    if (msg.includes('PERM_DENIED')) {
      notify('Permesso negato', 'error');
      return;
    }
    if (msg.includes('Timeout')) {
      notify('Timeout: server non risponde. Ricontatta', 'error');
      return;
    }
    // Fallback generico
    notify('Errore: ' + msg, 'error');
  };

  const sameRef = (a,b) => String(a||"").trim() === String(b||"").trim();
  const uniqBy = (arr, keyFn) => {
    const seen = new Set();
    return (arr||[]).filter(x => {
      const k = keyFn(x);
      if (!k || seen.has(k)) return false;
      seen.add(k);
      return true;
    });
  };
  const interAny = (arrA, arrB) => {
    const b = new Set((arrB||[]).map(v => String(v||"").trim()).filter(Boolean));
    return (arrA||[]).some(v => b.has(String(v||"").trim()));
  };
  const assegnoRefs = a => {
    const fve = parseDocRefs(a?.["DOCUMENTI COLLEGATI"] || a?.["FATTURE PAGATE"] || "");
    const nac = parseDocRefs(a?.["NC SCALATE"] || "");
    return uniqBy([...fve, ...nac], v => String(v||"").trim());
  };
  const ricoMatchesByDocs = (docNums, docIds=[]) => {
    return (riconciliazioni||[]).filter(r => {
      const nums = parseDocRefs(r?.fatture || "");
      const ids = parseDocRefs(r?.fattureIds || "");
      return interAny(docNums, nums) || interAny(docIds, ids);
    });
  };

  const openPathPopup = (kind, row) => {
    let docsL = [];
    let incsL = [];
    let assL = [];
    let ricoL = [];
    let title = "";
    let subtitle = "";

    if (kind === "documento") {
      const num = String(row?.[COL.numeroDocumento] || "").trim();
      const did = String(row?._id || "").trim();
      const nums = num ? [num] : [];
      const ids = did ? [did] : [];

      docsL = [row];
      assL = (assegni||[]).filter(a => interAny(nums, assegnoRefs(a)));
      incsL = (incs||[]).filter(i => {
        const refs = parseDocRefs(i?.fatture || "");
        return interAny(nums, refs) || (row?.[COL.nAssegno] && sameRef(i?.["N Assegno"], row?.[COL.nAssegno]));
      });
      ricoL = ricoMatchesByDocs(nums, ids);

      title = `Documento ${num || "-"}`;
      subtitle = `${row?.[COL.ragioneSociale] || "Cliente n/d"} · ${row?.[COL.tipoDocumento] || ""}`;
    }

    if (kind === "incasso") {
      const refs = parseDocRefs(row?.fatture || "");
      const nTitolo = String(row?.["N Assegno"] || "").trim();
      docsL = (docs||[]).filter(d => refs.some(r => sameRef(d?.[COL.numeroDocumento], r)));
      const docNums = docsL.map(d => String(d?.[COL.numeroDocumento] || "").trim()).filter(Boolean);
      const docIds = docsL.map(d => String(d?._id || "").trim()).filter(Boolean);

      incsL = [row];
      assL = (assegni||[]).filter(a => {
        const byRefs = interAny(docNums, assegnoRefs(a));
        const byTit = nTitolo && sameRef(a?.["N TITOLO"], nTitolo);
        return byRefs || byTit;
      });
      ricoL = (riconciliazioni||[]).filter(r => {
        const byId = sameRef(r?.id, row?._id) || sameRef(r?.id, row?.["ID Incasso"]);
        const byDoc = interAny(parseDocRefs(r?.fatture || ""), docNums) || interAny(parseDocRefs(r?.fattureIds || ""), docIds);
        return byId || byDoc;
      });

      title = `Incasso ${row?.["ID Incasso"] || row?._id || "-"}`;
      subtitle = `${row?.["Cliente"] || "Cliente n/d"} · ${row?.["Metodo"] || "Metodo n/d"}`;
    }

    if (kind === "assegno") {
      const refs = assegnoRefs(row);
      const titolo = String(row?.["N TITOLO"] || "").trim();
      docsL = (docs||[]).filter(d => refs.some(r => sameRef(d?.[COL.numeroDocumento], r)));
      const docNums = docsL.map(d => String(d?.[COL.numeroDocumento] || "").trim()).filter(Boolean);
      const docIds = docsL.map(d => String(d?._id || "").trim()).filter(Boolean);

      assL = [row];
      incsL = (incs||[]).filter(i => {
        const byRefs = interAny(parseDocRefs(i?.fatture || ""), docNums);

        importo: f.allocato,
        descrizione: notes,
      }));
      // Prepara assegno se presente

        ragione_sociale: cliente,

        data_titolo: dataTitolo||null,
        note: notes,
        utente: authed,
        allocazioni,
        assegno,

      // Aggiorna stato locale

        const d=[...p];

          const i=d.findIndex(x=>x[COL.numeroDocumento]===f[COL.numeroDocumento]);

          const isFull=pred.full.some(x=>x[COL.numeroDocumento]===f[COL.numeroDocumento]);
          const numDoc = f[COL.numeroDocumento];
          const nuovaNota = f[COL.tipoDocumento]==="NAC"
            ? (d[i][COL.note]||"")
            : (noteDocPerDoc&&noteDocPerDoc[numDoc] ? noteDocPerDoc[numDoc] : notes);
          if(method === "ASSEGNO") {
            d[i]={...d[i],[COL.saldoResiduo]:d[i][COL.saldoResiduo],[COL.stato]:"DA INCASSARE",[COL.note]:nuovaNota};
          } else if(isFull) {
            // Assegno: stato DA INCASSARE (saldo invariato, attende riconciliazione bancaria)
            // Bonifico: stato DA RICONCILIARE (saldo azzerato, attende conferma estratto conto)
            d[i]={...d[i],[COL.saldoResiduo]:"0",[COL.stato]:"DA RICONCILIARE",[COL.note]:nuovaNota};
          } else {

            d[i]={...d[i],[COL.saldoResiduo]:ns,[COL.stato]:"PARZIALE",[COL.note]:nuovaNota};
          }

        return d;

          "IMPORTO TITOLO":importoEffettivo,"FATTURE PAGATE":fveNums,"NC SCALATE":nacNums||"","STATO TITOLO":"IN ARCHIVIO",

  const parseBankFile = async (file) => {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: "array", cellDates: true, cellNF: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
    if (rows.length < 1) throw new Error("File vuoto");

    // Debug rimosso
    // Rileggi raw:true per avere i numeri veri (raw:false li converte in stringhe formattate)
    const rowsRaw = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

    // ── Converti data: stringa "09.03.2026", "09/03/2026", seriale Excel, Date JS ──
    const toDateStr = v => {
      if (v == null) return null;
      if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
      // Seriale Excel (numero > 40000 = post 2009)
      if (typeof v === "number" && v > 40000 && v < 100000) {
        const d = new Date(Date.UTC(1899,11,30) + Math.round(v)*86400000);
        return isNaN(d) ? null : d.toISOString().slice(0,10);
      }
      const s = String(v).trim();
      // ISO: 2026-03-09
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      // IT punto: 09.03.2026
      const dot = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      if (dot) return `${dot[3]}-${dot[2].padStart(2,"0")}-${dot[1].padStart(2,"0")}`;
      // IT slash: 09/03/2026
      const sl = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (sl) return `${sl[3]}-${sl[2].padStart(2,"0")}-${sl[1].padStart(2,"0")}`;
      return null;
    };

    // ── Converti numero: gestisce 1.234,56 (IT) e 1234.56 (EN) e stringhe ──
    const toNum = v => {
      if (v == null || v === "") return null;
      if (typeof v === "number") return v;
      const s = String(v).trim().replace(/\s/g,"");
      // formato italiano: 1.234,56 o 1.234 o 1.234,00
      if (/^-?\d{1,3}(\.\d{3})*(,\d*)?$/.test(s)) return parseFloat(s.replace(/\./g,"").replace(",","."));
      // semplice con virgola: 1234,56
      if (/^-?\d+(,\d+)?$/.test(s)) return parseFloat(s.replace(",","."));
      // fallback
      const n = parseFloat(s.replace(",",".").replace(/[^\d.\-]/g,""));
      return isNaN(n) ? null : n;
    };

    // ── Trova riga intestazione: quella con più parole chiave bancarie ──
    const HDR_WORDS = ["data","avere","dare","causale","descrizione","valuta","saldo","accredito","addebito","importo","movimento","aggiunt"];
    let hdrIdx = -1, bestScore = 0;
    for (let i = 0; i < Math.min(rowsRaw.length, 20); i++) {
      if (!rowsRaw[i]) continue;
      const txt = rowsRaw[i].map(c => String(c||"").toLowerCase()).join(" ");
      const score = HDR_WORDS.filter(w => txt.includes(w)).length;
      if (score > bestScore) { bestScore = score; hdrIdx = i; }
    }
    if (hdrIdx < 0) hdrIdx = rowsRaw.findIndex(r => r && r.some(c => c != null));
    if (hdrIdx < 0) throw new Error("Intestazione non trovata nel file");

    const hdr = rowsRaw[hdrIdx].map(h => String(h||"").toLowerCase().trim());
    console.log("Header @ riga", hdrIdx, "(score "+bestScore+"):", hdr);

    const findCol = (...keys) => {
      for (const k of keys) { const i = hdr.findIndex(h => h.includes(k)); if (i>=0) return i; }
      return -1;
    };

    // Colonne formato: Data Contabile | Data Valuta | Dare | Avere | Descrizione Causale ABI/SWIFT | Descrizioni Aggiuntive
    const colDataC   = findCol("data cont","data op","data mov");
    const colDataV   = findCol("data val","valuta");
    const colDataGen = findCol("data");
    const colAvere   = findCol("avere","accredito","entrate","credito","entrata");
    const colDare    = findCol("dare","addebito","uscite","debito","uscita");
    const colImporto = findCol("importo","amount","valore","mov");
    const colCausale = findCol("causale","descrizione causale","descri");
    const colDescAdd = findCol("aggiunt","descrizioni aggiunt","note aggiunt");

    // Priorità data: Contabile (col A) > Valuta (col B) > generica
    const colData = colDataC >= 0 ? colDataC : colDataV >= 0 ? colDataV : colDataGen;

    console.log("Colonne:", {colData,colAvere,colDare,colImporto,colCausale,colDescAdd});

    const result = [];
    for (let i = hdrIdx + 1; i < rowsRaw.length; i++) {
      const row = rowsRaw[i];
      if (!row || row.every(v => v == null || v === "")) continue;

      // Data — obbligatoria
      const data = toDateStr(colData >= 0 ? row[colData] : null);
      if (!data) continue;

      // Avere: colonna dedicata oppure importo positivo
      let avere = 0;
      if (colAvere >= 0) {
        const v = toNum(row[colAvere]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0 && colImporto >= 0) {
        const v = toNum(row[colImporto]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0) continue; // addebito (dare > 0, avere = 0) → skip

      const dare    = colDare    >= 0 ? (toNum(row[colDare]) || 0) : 0;
      const desc    = colCausale >= 0 ? String(row[colCausale]||"").trim() : "";
      const descAdd = colDescAdd >= 0 ? String(row[colDescAdd]||"").trim() : "";

      result.push({ idx: result.length, data, avere, dare, desc, descAdd, riconciliato: false });
    }

    console.log("Accrediti trovati:", result.length, result.slice(0,2));

    if (result.length === 0) {
      const hdrStr = hdr.map((h,i) => `[${i}]${h||"vuoto"}`).join(" | ");
      throw new Error(`Nessun accredito (Avere > 0) trovato.\nColonne rilevate: ${hdrStr}`);
    }
    return result;
  };

  const handleBankFile = async e => {
    const file = e.target.files[0];
    if(!file) return;
    try {
      const rows = await parseBankFile(file);
      setBankRows(rows);
      setSelAccredito(null);
      setRecoSel({});
      setToast({msg:`File caricato: ${rows.length} accrediti trovati`, type:"success"});
    } catch(err) {
      // Mostra le prime righe dell'errore (senza \n che rompe il toast)
      const msg = err.message.replace(/\n/g," | ").slice(0,200);
      setToast({msg:"Errore lettura file: "+msg, type:"error"});
      console.error("parseBankFile error:", err.message);
    }
    e.target.value="";
  };

  const handleConfirmReco = async () => {
    // recoSel = { assegno_id: importo_string, ... }
    if(!accrediti.length || Object.keys(recoSel).length===0) return;
    setRecoSaving(true);
    try {
    const accredito = accrediti[0];
    const dataAccredito = accredito.data;
    const totaleAccredito = accredito.avere;

    const dettaglio = [];
    const aggiornamenti = [];
    let causale = "";
    let descAdd = "";
    let nItems = 0;
    const seenDocIds = new Set();
    const addDettaglioUnico = (doc, docIdx, importo, tipo, saldoForUi) => {
      if(!doc?._id) return;
      const key = String(doc._id);
      if (seenDocIds.has(key)) return;
      seenDocIds.add(key);
      dettaglio.push({ documento_id: doc._id, importo, tipo });
      aggiornamenti.push({ docIdx, saldo: saldoForUi });
    };

    if (recoTab === "assegni") {
      const assegniSel = assegniRiconciliabili.filter(a=>String(a._id) in recoSel);
      nItems = assegniSel.length;
      causale = assegniSel.map(a=>a["N TITOLO"]).filter(Boolean).join(" + ");
      descAdd = assegniSel.map(a=>`${a["CLIENTE"]} — ${a["DOCUMENTI COLLEGATI"]||a["FATTURE PAGATE"]||""}`).join(" | ");

      const normText = (v) => String(v||"")
        .toLowerCase()
        .normalize("NFD")
        .replace(/[\u0300-\u036f]/g, "")
        .replace(/[^a-z0-9]/g, "");
      const sameClient = (doc, clienteAss) => {
        const a = normText(clienteAss);
        if (!a) return true;
        const b = normText(doc?.[COL.ragioneSociale]);
        return !!b && (a.includes(b) || b.includes(a));
      };
      const findDocStrict = (numDoc, tipo, clienteAss) => {
        const byNum = docs.filter(d => String(d[COL.numeroDocumento]) === String(numDoc));
        const byNumTipo = byNum.filter(d => (d[COL.tipoDocumento]||"").toUpperCase() === tipo);
        const byNumTipoCliente = byNumTipo.filter(d => sameClient(d, clienteAss));
        if (byNumTipoCliente.length === 1) return docs.indexOf(byNumTipoCliente[0]);
        if (byNumTipo.length === 1) return docs.indexOf(byNumTipo[0]);

        const byNumCliente = byNum.filter(d => sameClient(d, clienteAss));
        if (byNumCliente.length === 1) return docs.indexOf(byNumCliente[0]);

        return -1;
      };
      const unresolvedRefs = [];

      for(const ass of assegniSel) {
        // Combinazione di fatture e NC scalate
        const fveStr = ass["DOCUMENTI COLLEGATI"]||ass["FATTURE PAGATE"]||"";
        const nacStr = ass["NC SCALATE"]||"";
        
        const fveList = parseDocRefs(fveStr);
        const nacList = parseDocRefs(nacStr);

        for(const numDoc of fveList) {
          const docIdx = findDocStrict(numDoc, "FVE", ass["CLIENTE"]);
          if(docIdx<0) { unresolvedRefs.push(`FVE ${numDoc} (${ass["CLIENTE"]||"cliente n/d"})`); continue; }
          const doc = docs[docIdx];
          const saldo = parseNum(doc[COL.saldoResiduo]);
          addDettaglioUnico(doc, docIdx, saldo, "FVE", saldo);
        }
        for(const numDoc of nacList) {
          const docIdx = findDocStrict(numDoc, "NAC", ass["CLIENTE"]);
          if(docIdx<0) { unresolvedRefs.push(`NAC ${numDoc} (${ass["CLIENTE"]||"cliente n/d"})`); continue; }
          const doc = docs[docIdx];
          const saldo = parseNum(doc[COL.saldoResiduo]);
          addDettaglioUnico(doc, docIdx, saldo, "NAC", saldo);
        }
      }

      if (unresolvedRefs.length) {
        const preview = unresolvedRefs.slice(0, 4).join("; ");
        notify(`Riconciliazione bloccata: riferimenti documento ambigui/non trovati (${preview}${unresolvedRefs.length>4?" ...":""}).`, "error");
        setRecoSaving(false);
        return;
      }
      
      // Miglioramento descrizione nel database per includere l'elenco documenti
      descAdd = assegniSel.map(a => {
        const dStr = [a["DOCUMENTI COLLEGATI"]||a["FATTURE PAGATE"], a["NC SCALATE"]].filter(Boolean).join(" | ");
        return `${a["CLIENTE"]} — Docs: ${dStr}`;
      }).join(" | ");
    } else {
      // Bonifici/Incassi
      const incassiSel = incs.filter(i=>String(i._id) in recoSel);
      nItems = incassiSel.length;
      // FIX 2: causale leggibile — nome cliente + numeri fattura
      causale = incassiSel.map(i=>{
        const fatt = Array.isArray(i.fatture) ? i.fatture.join(", ") : (i.fatture||"");
        return `${i["Cliente"]||""} [${fatt||i["ID Incasso"]||i._id}]`;
      }).join(" | ");
      descAdd = incassiSel.map(i=>`${i["Cliente"]||""} — ${Array.isArray(i.fatture)?i.fatture.join(","):i.fatture||""}`).join(" | ");

      for(const inc of incassiSel) {
        // FIX 3: split solo su virgola — non su trattino/spazio per non spezzare
        // codici documento tipo "AB - 90564" o "2024/00123"
        const docsCollegati = parseDocRefs(inc.fatture);
        for(const numDoc of docsCollegati) {
          const docIdx = docs.findIndex(d=>String(d[COL.numeroDocumento])===String(numDoc));
          if(docIdx<0) continue;
          const doc = docs[docIdx];

          // Solo se non è già chiuso, sennò l'incasso lo ha già chiuso a suo tempo
          const saldo = parseNum(doc[COL.saldoResiduo]);
          const imp = saldo > 0 ? saldo : parseNum(doc[COL.importoDocumento] || 0.01);
          addDettaglioUnico(doc, docIdx, imp, doc[COL.tipoDocumento] || "FVE", 0);
        }
      }
    }

    // FIX 4: guard dettaglio vuoto vale per entrambi i tab (assegni e bonifici)
    if(dettaglio.length === 0) {
      notify("Nessun documento collegato agli elementi selezionati. Verifica che gli incassi abbiano fatture associate.","error");
      setRecoSaving(false); return;
    }

    // POST riconciliazione
    await d1API.postRiconciliazione({
      data_accredito: dataAccredito,
      importo: totaleAccredito,
      causale: accredito.desc ? `${accredito.desc} [${causale}]` : causale,
      descrizione_aggiuntiva: descAdd,
      utente: authed,
      dettaglio,
      assegni_ids: recoTab === "assegni"
        ? assegniRiconciliabili.filter(a => String(a._id) in recoSel).map(a => a._id)
        : [],
    });
      // Aggiorna stato locale documenti:
      // - Assegni: tutti i doc collegati passano a CHIUSO
      // - Bonifici: solo i doc che erano DA INCASSARE; gli altri erano già CHIUSI dal PayModal
      setDocs(p => {
        const d = [...p];
        for(const {docIdx} of aggiornamenti) {
          const docCorrente = d[docIdx];
          const statoCorrente = docCorrente?.[COL.stato]?.toUpperCase();
          // Per i bonifici, non toccare documenti già CHIUSI o PAGATI (il server non li ha aggiornati)
          // Ma permetti l'aggiornamento da DA RICONCILIARE a CHIUSO
          if(recoTab !== "assegni" && (statoCorrente === "CHIUSO" || statoCorrente === "PAGATO")) continue;
          d[docIdx] = {...docCorrente,
            [COL.saldoResiduo]: "0",
            [COL.stato]: "CHIUSO",
          };
        }
        return d;
      });
      setBankRows(p => p.map(r => r.idx===accredito.idx ? {...r, riconciliato:true} : r));
      if (recoTab === "assegni") {
        const sel = new Set(Object.keys(recoSel));
        setAssegni(p => p.map(a => sel.has(String(a._id)) ? { ...a, "STATO TITOLO": "INCASSATO" } : a));
      }
      setAccrediti([]);
      setRecoSel({});
      setRecoSearch("");
      notify(`✓ Riconciliato — ${nItems} elementi, ${dettaglio.length} documenti collegati`, "success");
    } catch(err) {
      notify("Errore: "+err.message, "error");
      console.error("handleConfirmReco:", err);
    }
    setRecoSaving(false);
  };

  /* KPIs */
  const open=docs.filter(d=>d[COL.stato]?.toUpperCase()==="APERTO");
  const totFVE=open.filter(d=>d[COL.tipoDocumento]==="FVE").reduce((s,d)=>s+parseNum(d[COL.saldoResiduo]),0);
  const totNAC=open.filter(d=>d[COL.tipoDocumento]==="NAC").reduce((s,d)=>s+parseNum(d[COL.saldoResiduo]),0);
  const todayIso = new Date().toISOString().slice(0,10);
  const accreditoOggi = assegni.filter(a => {
    const dtTitolo = toISO(a["DATA TITOLO"] || "");
    const dtIncassoPrev = toISO(a["DATA INCASSO PREVISTA"] || "");
    return dtTitolo === todayIso || dtIncassoPrev === todayIso;
  });
  const accreditoOggiTot = accreditoOggi.reduce((s,a)=>s+parseNum(a["IMPORTO TITOLO"]),0);
  const accreditoOggiDaRic = accreditoOggi.filter(a => (String(a["STATO TITOLO"]||"").toUpperCase() !== "INCASSATO")).length;





  /* ── ICONE SIDEBAR ── */
  const TABS = [
    {id:"dashboard", lbl:"Dashboard",   icon:"◍"},
    {id:"documenti", lbl:"Documenti",   icon:"◧"},
    {id:"incassi",   lbl:"Incassi",     icon:"⊚"},
    {id:"assegni",   lbl:"Assegni",     icon:"◉"},
    {id:"riconcilia",lbl:"Riconcilia",  icon:"⇆"},
    {id:"storico",   lbl:"Storico",     icon:"◎"},
    {id:"migrazione",lbl:"Migrazione",  icon:"↥"},
  ];

  /* ── RENDER ── */
  return (
    <div className="app-shell">

      <aside className="mono-sidebar">
        <div className="mono-logo">MH</div>
        <div style={{fontSize:9,color:"var(--text-2)",fontWeight:700,letterSpacing:".08em",textTransform:"uppercase",marginBottom:8}}>MarcosHUB</div>
        <div style={{marginTop:"auto",fontSize:10,color:"var(--text-2)",textAlign:"center",lineHeight:1.35,padding:"0 6px"}}>
          Cash Flow<br/>Control
        </div>

        <div style={{width:"100%",marginTop:"auto",display:"grid",gap:6}}>
          <div style={{textAlign:"center",fontSize:9,color:"var(--text-2)",lineHeight:1.3,paddingTop:4}}>{authed?.[0]?.toUpperCase()||"U"}</div>
        </div>
      </aside>

      <div className="mono-main">

        <div className="mono-topbar">
          <div style={{display:"flex",alignItems:"center",gap:12,minWidth:0}}>
            <div style={{color:"var(--text-1)",fontSize:14.5,fontWeight:800,letterSpacing:"-.2px",whiteSpace:"nowrap"}}>
              {TABS.find(t=>t.id===tab)?.lbl||""}
            </div>
            <div style={{color:"var(--text-2)",fontSize:10,paddingLeft:12,borderLeft:"1px solid var(--border)",whiteSpace:"nowrap"}}>
              {new Date().toLocaleDateString("it-IT",{weekday:"long",day:"2-digit",month:"long",year:"numeric"})}
            </div>
          </div>
          <div className="topbar-actions" style={{display:"flex",alignItems:"center",gap:8}}>
            <input
              value={globalSearch}
              onChange={e=>setGlobalSearch(e.target.value)}
              placeholder="Ricerca globale"
              style={{...S.input,width:isNarrow?160:250,height:36,fontSize:12,background:"rgba(255,255,255,.08)",border:"1px solid rgba(255,255,255,.14)",color:"var(--text-1)",borderRadius:"999px",paddingLeft:16,boxShadow:"none"}}
            />
            {!!globalSearch && (
              <button onClick={()=>setGlobalSearch("")} style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.16)",color:"var(--text-2)",borderRadius:"var(--radius-s)",padding:"7px 9px",cursor:"pointer",fontSize:11,fontWeight:600,transition:"all .15s ease"}}>
                ✕
              </button>
            )}
            <button onClick={exportCurrentTab} className="row-hover" style={{background:"rgba(255,255,255,.07)",border:"1px solid rgba(255,255,255,.16)",color:"var(--text-1)",borderRadius:"999px",padding:"8px 16px",cursor:"pointer",fontSize:11,fontFamily:"var(--font)",fontWeight:600,transition:"all .15s cubic-bezier(.34,.1,.64,.1)"}}>
              Export
            </button>
            <button onClick={runBackupExport} className="row-hover" style={{background:showBackupReminder?"var(--warn-s)":"rgba(255,255,255,.07)",border:`1px solid ${showBackupReminder?"var(--warn)":"rgba(255,255,255,.16)"}`,color:showBackupReminder?"var(--warn)":"var(--text-1)",borderRadius:"999px",padding:"8px 16px",cursor:"pointer",fontSize:11,fontFamily:"var(--font)",fontWeight:600,transition:"all .15s cubic-bezier(.34,.1,.64,.1)"}}>

            {demo&&<span style={{color:"#b08366",fontSize:9,background:"rgba(199,171,143,.08)",border:"1px solid rgba(199,171,143,.2)",padding:"5px 9px",borderRadius:20,fontWeight:700}}>DEMO</span>}
            {loading&&<Spinner/>}
            <button className="btn-primary row-hover" onClick={()=>setShowPay(true)} style={{background:"var(--text-1)",color:"#101010",border:"1px solid var(--text-1)",borderRadius:"999px",padding:"9px 18px",cursor:"pointer",fontSize:12,fontWeight:700,fontFamily:"var(--font)",transition:"all .15s cubic-bezier(.34,.1,.64,.1)",boxShadow:"0 4px 12px rgba(255,255,255,.12)"}}>
              + Pagamento
            </button>
          </div>
        </div>

        <main style={{flex:1,overflowY:"auto",padding:"24px 24px 128px",width:"100%",maxWidth:1480,margin:"0 auto"}}>

        {/* DASHBOARD */}
        {tab==="dashboard"&&(
          <div className="tab-content">
            <div style={{display:"grid",gridTemplateColumns:"repeat(auto-fit,minmax(230px,1fr))",gap:12,marginBottom:20}}>
              {(() => {
                // Conditional KPI colors and icons based on accredito value
                const accreditoColor = accreditoOggiTot > 1000 ? "#4ade80" : (accreditoOggiTot > 0 ? "#fbbf24" : "#94a3b8");
                const accreditoIcon = accreditoOggiTot > 1000 ? "⚡" : (accreditoOggiTot > 0 ? "→" : "·");
                const kpis = [
                  {lbl:"Crediti Aperti",    val:eur(totFVE),           color:"#8cc9ff",
                   sub:`${open.filter(d=>d[COL.tipoDocumento]==="FVE").length} fatture aperte`},
                  {lbl:"Note di Credito",   val:eur(totNAC),           color:"#5f5f5f",
                   sub:`${open.filter(d=>d[COL.tipoDocumento]==="NAC").length} documenti`},
                  {lbl:"Esposizione Netta", val:eur(totFVE+totNAC),    color:"var(--text-1)",
                   sub:"saldo residuo netto"},
                  {lbl:"In Accredito Oggi", val:eur(accreditoOggiTot), color:accreditoColor,
                   sub:`${accreditoIcon} ${accreditoOggi.length} assegni · da riconciliare ${accreditoOggiDaRic}`},
                ];
                return kpis;
              })().map(({lbl,val,color,sub},i)=>(
                <div key={lbl} className="kpi-card card" style={{
                  padding:"18px 20px",
                  animation:`countUp .28s ease ${i*0.06}s both`,
                  ...(lbl==="In Accredito Oggi"&&accreditoOggiTot>1000 ? {
                    borderColor:"rgba(74,222,128,.4)",
                    boxShadow:"0 0 20px rgba(74,222,128,.15)"
                  } : {})
                }}>
                  <div style={{color:"var(--text-2)",fontSize:9.5,fontWeight:700,
                    letterSpacing:".8px",marginBottom:12,textTransform:"uppercase"}}>{lbl}</div>
                  <div style={{color,fontSize:23,fontFamily:"var(--mono)",
                    fontWeight:500,letterSpacing:"-.5px",lineHeight:1,marginBottom:6}}>{val}</div>
                  <div style={{color:"var(--text-2)",fontSize:10}}>{sub}</div>
                </div>
              ))}
            </div>

            {/* Cash Flow */}
            <div className="glass-card" style={{borderRadius:"var(--radius)",padding:"18px 20px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <span style={{fontSize:9.5,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",color:"var(--text-2)"}}>
                  Cash Flow — Scadenze assegni
                </span>
              </div>
              <CashChart assegni={assegni} onNavigate={(k,items)=>{ setTab("storico"); setStoricoSezione("assegni"); setStoricoFiltroAssegno(k); }}/>
            </div>

            {/* Assegni per ragione sociale */}
            {(()=>{

              const grouped = {};
              assegni.filter(a=>["IN ARCHIVIO","CONSEGNATO A PINO"].includes(a["STATO TITOLO"])).forEach(a=>{
                const cli = a["CLIENTE"]||"";
                const stato = a["STATO TITOLO"]||"";
                if(!grouped[cli]) grouped[cli]={pino:[],arch:[]};
                if(stato==="CONSEGNATO A PINO") grouped[cli].pino.push(a);
                else grouped[cli].arch.push(a);
              });
              const clienti = Object.keys(grouped).sort();
              const totAss = assegni.filter(a=>["IN ARCHIVIO","CONSEGNATO A PINO"].includes(a["STATO TITOLO"])).length;
              const totImp = assegni.filter(a=>["IN ARCHIVIO","CONSEGNATO A PINO"].includes(a["STATO TITOLO"])).reduce((s,a)=>s+(parseFloat(a["IMPORTO TITOLO"])||0),0);
              return (
                <div className="glass-card" style={{borderRadius:"var(--radius)",padding:"16px 18px"}}>
                  {/* Header */}
                  <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
                    <div style={{display:"flex",alignItems:"center",gap:14}}>
                      <span style={{fontSize:9.5,fontWeight:600,letterSpacing:"1px",textTransform:"uppercase",color:"var(--text-2)"}}>
                        Assegni per ragione sociale
                      </span>
                      <span style={{display:"flex",alignItems:"center",gap:6}}>
                        <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:"#4f4f4f"}}/>
                        <span style={{fontSize:9,color:"var(--text-2)"}}>Cons. a Pino</span>
                        <span style={{display:"inline-block",width:7,height:7,borderRadius:"50%",background:"#808080",marginLeft:6}}/>
                        <span style={{fontSize:9,color:"var(--text-2)"}}>In Archivio</span>
                      </span>
                    </div>
                    <span style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text-2)"}}>
                      {totAss} ass · {eur(totImp)}
                    </span>
                  </div>

                  {/* Intestazione colonne */}
                  <div style={{display:"grid",gridTemplateColumns:"1fr 110px 120px 60px",
                    padding:"0 10px 6px",marginBottom:4,borderBottom:"1px solid var(--border-2)"}}>
                    {["Cliente","Stato","Importo","N°"].map((h,i)=>(
                      <span key={h} style={{fontSize:8.5,fontWeight:600,letterSpacing:".5px",
                        textTransform:"uppercase",color:"var(--text-2)",
                        textAlign:i>0?"right":"left"}}>{h}</span>
                    ))}
                  </div>

                  {/* Righe */}
                  {clienti.length===0&&(
                    <div style={{color:"var(--text-2)",fontSize:12,textAlign:"center",padding:"20px 0"}}>
                      Nessun assegno presente
                    </div>
                  )}
                  {clienti.map((cli,idx)=>{
                    const g = grouped[cli];
                    const totPino = g.pino.reduce((s,a)=>s+(parseFloat(a["IMPORTO TITOLO"])||0),0);
                    const totArch = g.arch.reduce((s,a)=>s+(parseFloat(a["IMPORTO TITOLO"])||0),0);
                    const totTot  = totPino+totArch;
                    const dateAll = [...g.pino,...g.arch].map(a=>a["DATA TITOLO"]||"").filter(Boolean).sort();
                    const dMin = dateAll[0]||"";
                    const dMax = dateAll[dateAll.length-1]||"";
                    const fmt = d=>{ if(!d) return "—"; const p=d.split("-"); return p[1]+"/"+p[0].slice(2); };
                    return (
                      <div key={cli} className="ass-row" style={{
                        display:"grid",gridTemplateColumns:"1fr 110px 120px 60px",
                        padding:"8px 10px",borderRadius:"var(--radius-s)",marginBottom:2,
                        cursor:"default",transition:"background .1s",
                      }}
                      onMouseEnter={e=>e.currentTarget.style.background="var(--raised)"}
                      onMouseLeave={e=>e.currentTarget.style.background="transparent"}>
                        {/* Cliente */}
                        <div>
                          <div style={{fontSize:12,fontWeight:600,color:"var(--text-1)",
                            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>{cli}</div>
                          <div style={{fontSize:9,color:"var(--text-2)",marginTop:1}}>
                            {fmt(dMin)}{dMax&&dMax!==dMin?" → "+fmt(dMax):""}
                          </div>
                        </div>
                        {/* Stato badges */}
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                          {g.pino.length>0&&<span style={{display:"inline-block",padding:"2px 7px",borderRadius:20,
                            fontSize:8.5,fontWeight:600,background:"var(--raised)",color:"var(--text-1)",border:"1px solid var(--border)"}}>Cons. Pino</span>}
                          {g.arch.length>0&&<span style={{display:"inline-block",padding:"2px 7px",borderRadius:20,
                            fontSize:8.5,fontWeight:600,background:"var(--surface)",color:"var(--text-2)",border:"1px solid var(--border)"}}>In Archivio</span>}
                        </div>
                        {/* Importi */}
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                          {g.pino.length>0&&<span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-1)"}}>{eur(totPino)}</span>}
                          {g.arch.length>0&&<span style={{fontFamily:"var(--mono)",fontSize:11,color:"var(--text-2)"}}>{eur(totArch)}</span>}
                        </div>
                        {/* Conteggi */}
                        <div style={{display:"flex",flexDirection:"column",alignItems:"flex-end",gap:2}}>
                          {g.pino.length>0&&<span style={{fontSize:10,color:"var(--text-2)"}}>{g.pino.length}</span>}
                          {g.arch.length>0&&<span style={{fontSize:10,color:"var(--text-2)"}}>{g.arch.length}</span>}
                        </div>
                        {/* Tooltip hover */}
                        <div className="ass-tooltip">
                          <div style={{fontSize:10,fontWeight:600,color:"var(--text-1)",marginBottom:8,
                            letterSpacing:".2px"}}>{cli}</div>
                          {[
                            g.pino.length>0&&["Consegnato a Pino", g.pino.length+" ass.", eur(totPino), "#4f4f4f"],
                            g.arch.length>0&&["In Archivio",       g.arch.length+" ass.", eur(totArch), "#808080"],
                          ].filter(Boolean).map(([lbl,n,imp,col])=>(
                            <div key={lbl} style={{display:"flex",justifyContent:"space-between",
                              alignItems:"center",padding:"4px 0",
                              borderBottom:"1px solid var(--border-2)"}}>
                              <span style={{fontSize:10.5,color:"var(--text-2)"}}>{lbl}</span>
                              <span style={{display:"flex",gap:8,alignItems:"center"}}>
                                <span style={{fontSize:9,color:"var(--text-2)",fontWeight:500}}>{n}</span>
                                <span style={{fontFamily:"var(--mono)",fontSize:10.5,color:col,fontWeight:500}}>{imp}</span>
                              </span>
                            </div>
                          ))}
                          <div style={{display:"flex",justifyContent:"space-between",
                            alignItems:"center",paddingTop:6,marginTop:2}}>
                            <span style={{fontSize:10,color:"var(--text-2)"}}>Scadenze</span>
                            <span style={{fontSize:10,color:"var(--text-1)",fontFamily:"var(--mono)"}}>
                              {fmt(dMin)}{dMax&&dMax!==dMin?" → "+fmt(dMax):""}
                            </span>
                          </div>
                          <div style={{display:"flex",justifyContent:"space-between",
                            alignItems:"center",paddingTop:6,borderTop:"1px solid var(--border)",marginTop:4}}>
                            <span style={{fontSize:10,fontWeight:600,color:"var(--text-1)"}}>Totale</span>
                            <span style={{fontFamily:"var(--mono)",fontSize:12,fontWeight:600,
                              color:"var(--text-1)"}}>{eur(totTot)}</span>
                          </div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })()}
          </div>
        )}

        {/* DOCUMENTI */}
        {tab==="documenti"&&(
          <div className="tab-content">
            <div className="tab-toolbar">
              <input value={search} onChange={e=>setSearch(e.target.value)}
                aria-label="Cerca documenti"
                placeholder="Cerca..." style={{...S.input,width:180}}/>
              <div className="filter-group">
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>DATA DOC:</span>
                <input type="date" value={docDateDa} onChange={e=>setDocDateDa(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>A:</span>
                <input type="date" value={docDateA} onChange={e=>setDocDateA(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                {(docDateDa||docDateA) && <button onClick={()=>{setDocDateDa("");setDocDateA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:4}}>✕</button>}
              </div>
              <div className="filter-group">
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>SCADENZA:</span>
                <input type="date" value={docDatePagDa} onChange={e=>setDocDatePagDa(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>A:</span>
                <input type="date" value={docDatePagA} onChange={e=>setDocDatePagA(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                {(docDatePagDa||docDatePagA) && <button onClick={()=>{setDocDatePagDa("");setDocDatePagA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:4}}>✕</button>}
              </div>
              <select value={fState} onChange={e=>setFState(e.target.value)} aria-label="Filtra per stato" style={{...S.input,width:130}}>
                {["Tutti","APERTO","DA RICONCILIARE","DA INCASSARE","CHIUSO","PARZIALE"].map(o=><option key={o}>{o}</option>)}
              </select>
              <select value={fType} onChange={e=>setFType(e.target.value)} aria-label="Filtra per tipo" style={{...S.input,width:90}}>
                {["Tutti","FVE","NAC"].map(o=><option key={o}>{o}</option>)}
              </select>
              {isAdmin&&(
                <button
                  onClick={()=>setShowAdvancedDocStates(v=>!v)}
                  className={`micro-btn ${showAdvancedDocStates?"is-active":""}`}
                  style={{width:170}}
                >
                  {showAdvancedDocStates?"Avanzato ON":"Avanzato OFF"}
                </button>
              )}
              <span className="tab-toolbar-meta">
                {filtered.length} doc visualizzati
                {docs.length >= 2000 && <span style={{color:"var(--warn)",marginLeft:6}}>⚠ Limite 2000 — usa i filtri per cercare</span>}

                    <tr style={{background:"var(--raised)",borderBottom:"1px solid var(--border)"}}>
                      <DocSortTh label="Tipo"           colKey={COL.tipoDocumento}/>
                      <DocSortTh label="N° Doc"         colKey={COL.numeroDocumento}/>
                      <DocSortTh label="Data"           colKey={COL.dataDocumento}/>
                      <DocSortTh label="Cliente"        colKey={COL.ragioneSociale}/>
                      <DocSortTh label="Importo"        colKey={COL.importoDocumento} style={{textAlign:"right"}}/>
                      <DocSortTh label="Saldo Residuo"  colKey={COL.saldoResiduo} style={{textAlign:"right"}}/>
                      <DocSortTh label="Scadenza"       colKey={COL.dataPagamento}/>
                      <DocSortTh label="N° Assegno"     colKey={COL.nAssegno}/>
                      <DocSortTh label="Note"           colKey={COL.note} style={{width:170}}/>
                      <DocSortTh label="Stato"          colKey={COL.stato} style={{width:190}}/>
                    </tr>
                  </thead>
                  <tbody>
                    {docVisible.map((doc,i)=>{
                      const st = (doc[COL.stato]||"").toUpperCase();
                      const allowedSt = allowedTransitions(DOC_STATUS_TRANSITIONS, st);
                      const baseStatusOptions = ["APERTO", "PARZIALE", "DA INCASSARE", "DA RICONCILIARE", "CHIUSO"];
                      const advancedStatusOptions = ["PAGATO", "STORNATO"];
                      const showAdvanced = isAdmin && showAdvancedDocStates;
                      const statusOptions = showAdvanced ? [...baseStatusOptions, ...advancedStatusOptions] : baseStatusOptions;
                      const di=st==="DA INCASSARE" || st==="DA RICONCILIARE";
                      const origIdx=docs.indexOf(doc);
                      const base=i%2===0?"var(--raised)":"var(--surface)";
                      return (
                        <tr key={doc[COL.numeroDocumento]+i} className="row-hover"
                          onClick={e=>onDataRowClick(e, "documento", doc)}
                          title="Clicca per vedere percorsi collegati"
                          style={{borderBottom:"1px solid var(--border-2)",background:base,cursor:"pointer"}}>
                          <td style={{padding:"9px 11px"}}><Badge label={doc[COL.tipoDocumento]}/></td>
                          <td style={{padding:"9px 11px",color:"var(--accent)",fontWeight:700}}>
                            <EditCell value={doc[COL.numeroDocumento]} onSave={v=>handleEdit(origIdx,COL.numeroDocumento,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)",fontWeight:600}}>
                            <EditCell value={doc[COL.dataDocumento]} onSave={v=>handleEdit(origIdx,COL.dataDocumento,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)"}}>
                            <EditCell value={doc[COL.ragioneSociale]} onSave={v=>handleEdit(origIdx,COL.ragioneSociale,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)",textAlign:"right"}}>
                            <EditCell value={doc[COL.importoDocumento]} numeric onSave={v=>handleEdit(origIdx,COL.importoDocumento,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",textAlign:"right",fontWeight:700,
                            color:parseNum(doc[COL.saldoResiduo])>0?"var(--text-1)":"var(--success)"}}>
                            <EditCell value={doc[COL.saldoResiduo]} numeric onSave={v=>handleEdit(origIdx,COL.saldoResiduo,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)",fontSize:11}}>
                            {toIT(doc[COL.dataPagamento])}
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)",fontSize:11}}>
                            <EditCell value={doc[COL.nAssegno]||""} onSave={v=>handleEdit(origIdx,COL.nAssegno,v)}/>
                          </td>
                          <td style={{padding:"9px 11px",color:"var(--text-1)",fontSize:11,maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                            <EditCell value={doc[COL.note]||""} onSave={v=>handleEdit(origIdx,COL.note,v)}/>
                          </td>
                          {/* Stato — cliccabile se PAGATO per riaprire */}
                          {/* Stato — Menu a tendina per modifca manuale statto */}
                          <td style={{padding:"9px 11px",width:190,minWidth:190}}>
                            <select
                              value={doc[COL.stato] || "APERTO"}
                              title={`Da ${st||"(vuoto)"} puoi passare a: ${allowedSt.join(", ")||"n/d"}`}
                              onChange={e => {
                                if(!canTransition(DOC_STATUS_TRANSITIONS, doc[COL.stato], e.target.value)){
                                  notify(`Transizione non consentita: ${doc[COL.stato]||"(vuoto)"} -> ${e.target.value}. Consentiti: ${allowedSt.join(", ")||"n/d"}`,"error");
                                  return;
                                }
                                if(window.confirm(`Stai per forzare lo stato a "${e.target.value}". Sei sicuro?`)){
                                  handleEdit(origIdx, COL.stato, e.target.value);
                                }
                              }}
                              style={{
                                background: "var(--surface)",
                                color: "var(--text-1)",
                                border: "1px solid var(--border)",
                                borderRadius: "var(--radius-s)",
                                padding: "4px 8px",
                                fontSize: "10px",
                                fontWeight: "700",
                                cursor: "pointer",
                                width: "100%",
                                outline: "none"
                              }}
                            >
                              {statusOptions.map(s => (
                                <option key={s} value={s}>{s}</option>
                              ))}
                            </select>
                            <div style={{fontSize:8,color:"var(--text-2)",fontWeight:500,marginTop:3,whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}>
                              Da <strong style={{color:"var(--text-2)"}}>{st||"—"}</strong>{" -> "}{allowedSt.join(" · ")||"n/d"}
                            </div>
                            {(doc[COL.stato]==="PAGATO"||doc[COL.stato]==="PARZIALE"||doc[COL.stato]==="CHIUSO"||doc[COL.stato]==="DA INCASSARE") && (
                               <span
                                 onClick={async()=>{
                                   if(!window.confirm(`Vuoi azzerare il saldo e rimetterlo ad APERTO?`)) return;
                                   const imp = parseNum(doc[COL.importoDocumento]);
                                   await handleEdit(origIdx, COL.saldoResiduo, String(imp));
                                   await handleEdit(origIdx, COL.stato, "APERTO");
                                   notify("Documento riaperto ✓","success");
                                 }}
                                   className="micro-link-action">
                                 Ripristina saldo e riapri
                               </span>
                            )}
                          </td>
                        </tr>
                      );
                    })}
                  </tbody>
                </table>
              </div>
              {docSorted.length > docRowsLimit && (
                <div style={{padding:10,textAlign:"center",borderTop:"1px solid var(--border)",background:"var(--bg)"}}>
                  <button onClick={()=>setDocRowsLimit(v=>v+VIRTUAL_STEP)} className="micro-btn micro-btn--accent" style={{padding:"7px 12px"}}>
                    Mostra altri {Math.min(VIRTUAL_STEP, docSorted.length - docRowsLimit)}
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* INCASSI */}
        {tab==="incassi"&&(
          <div className="tab-content">
            <div className="tab-toolbar" style={{justifyContent:"space-between"}}>
              <span style={{color:"var(--text-2)",fontSize:12}}>{filteredIncs.length} incassi visualizzati</span>
              <button onClick={()=>setShowPay(true)} style={{...S.btn,background:"var(--grad-accent)",color:"#0f172a"}}>
                + Nuovo Incasso
              </button>
            </div>
            <div className="tab-toolbar">
              <input value={incTabSearch} onChange={e=>setIncTabSearch(e.target.value)} placeholder="Cerca incassi..." aria-label="Cerca incassi" style={{...S.input,width:210}}/>
              <div className="filter-group">
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>DATA:</span>
                <input type="date" value={incDateDa} onChange={e=>setIncDateDa(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>A:</span>
                <input type="date" value={incDateA} onChange={e=>setIncDateA(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                {(incDateDa||incDateA) && <button onClick={()=>{setIncDateDa("");setIncDateA("");}} style={{background:"none",border:"none",color:"var(--danger)",cursor:"pointer",padding:4}}>✕</button>}
              </div>
              <button onClick={()=>{setIncTabSearch("");setIncDateDa("");setIncDateA("");}} className="reset-btn">
                Reset filtri
              </button>
            </div>
            <div className="table-shell">
              <table className="data-table-dark" role="table" aria-label="Lista incassi" style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"var(--raised)",borderBottom:"1px solid var(--border)"}}>
                    <IncSortTh label="ID Incasso" colKey="ID Incasso"/>
                    <IncSortTh label="Metodo"     colKey="Metodo"/>
                    <IncSortTh label="Data"       colKey="Data Ricezione"/>
                    <IncSortTh label="Importo"    colKey="Importo Totale" style={{textAlign:"right"}}/>
                    <IncSortTh label="Cliente"    colKey="Cliente"/>
                    <IncSortTh label="Note"       colKey="Note"/>
                    {isAdmin && <th style={{padding:"10px 13px",textAlign:"center",color:"var(--text-2)",fontSize:11,fontWeight:600}}>Azioni</th>}
                  </tr>
                </thead>
                <tbody>
                  {incVisible.map((inc,i)=>{
                    const origIdx = incs.indexOf(inc);
                    return (
                    <tr key={inc["ID Incasso"]||i} className="row-hover"
                      onClick={e=>onDataRowClick(e, "incasso", inc)}
                      title="Clicca per vedere percorsi collegati"
                      style={{borderBottom:"1px solid var(--border-2)",background:i%2===0?"var(--raised)":"var(--surface)",cursor:"pointer"}}>
                      <td style={{padding:"10px 13px",color:"var(--accent)",fontFamily:"var(--font)",fontSize:11,whiteSpace:"nowrap"}}>{inc["ID Incasso"]||"—"}</td>
                      <td style={{padding:"10px 13px"}}><EditCell value={inc["Metodo"]||""} color={inc["Metodo"]==="Assegno"?"#fb923c":"#38bdf8"} onSave={v=>handleEditIncasso(origIdx,"Metodo",v)}/></td>
                      <td style={{padding:"10px 13px",color:"var(--text-1)",whiteSpace:"nowrap"}}><EditCell value={inc["Data Ricezione"]||""} display={toIT(inc["Data Ricezione"])} color="#e2e2e2" onSave={v=>handleEditIncasso(origIdx,"Data Ricezione",v)}/></td>
                      <td style={{padding:"10px 13px",color:"var(--success)",fontWeight:700,textAlign:"right",whiteSpace:"nowrap"}}><EditCell value={inc["Importo Totale"]||""} display={eur(inc["Importo Totale"])} color="#74d39d" numeric onSave={v=>handleEditIncasso(origIdx,"Importo Totale",v)}/></td>
                      <td style={{padding:"10px 13px",color:"var(--text-1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}><EditCell value={inc["Cliente"]||""} color="#f2f2f2" onSave={v=>handleEditIncasso(origIdx,"Cliente",v)}/></td>
                      <td style={{padding:"10px 13px",color:"var(--text-1)",whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis"}}><EditCell value={inc["Note"]||""} color="#d9d9d9" onSave={v=>handleEditIncasso(origIdx,"Note",v)}/></td>
                      {isAdmin && (
                        <td style={{padding:"10px 13px",textAlign:"center"}}>
                          <button

                            onClick={()=>handleDeleteIncasso(origIdx)}
                            className="micro-btn micro-btn--danger"
                            style={{padding:"4px 8px",fontSize:12}}>
                            🗑
                          </button>
                        </td>
                      )}
                    </tr>
                    );
                  })}
                </tbody>
              </table>
              {incSorted.length > incRowsLimit && (
                <div style={{padding:10,textAlign:"center",borderTop:"1px solid var(--border)",background:"var(--bg)"}}>
                  <button onClick={()=>setIncRowsLimit(v=>v+VIRTUAL_STEP)} className="micro-btn micro-btn--accent" style={{padding:"7px 12px"}}>
                    Mostra altri {Math.min(VIRTUAL_STEP, incSorted.length - incRowsLimit)}
                  </button>
                </div>
              )}
            </div>
          </div>
        )}

        {/* ASSEGNI */}
        {tab==="assegni"&&(
          <div className="tab-content">
            <div className="tab-toolbar" style={{justifyContent:"space-between"}}>
              <span style={{color:"var(--text-2)",fontSize:12}}>{filteredAssegni.length} assegni visualizzati</span>
              <div style={{display:"flex",gap:10,alignItems:"center"}}>
                <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--radius-s)",
                  padding:"8px 16px",fontSize:12,color:"var(--accent)"}}>
                  Totale: <strong>{eur(assSorted.reduce((s,a)=>s+parseNum(a["IMPORTO TITOLO"]),0))}</strong>
                </div>
              </div>
            </div>
            <div className="tab-toolbar">
              <input value={assTabSearch} onChange={e=>setAssTabSearch(e.target.value)} placeholder="Cerca assegni..." style={{...S.input,width:210}}/>
              <div className="filter-group">
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>DATA TITOLO:</span>
                <input type="date" value={assDateDa} onChange={e=>setAssDateDa(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>A:</span>
                <input type="date" value={assDateA} onChange={e=>setAssDateA(e.target.value)} style={{...S.input,width:115,border:"none",padding:"6px 0",background:"transparent"}}/>
              </div>
              <div className="filter-group">
                <span style={{fontSize:10,color:"var(--text-2)",fontWeight:700}}>DATA INCASSO:</span>
