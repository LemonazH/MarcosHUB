/* ──────────────────────────────────────────────
   ALGORITMO PREDIZIONE PAGAMENTI
────────────────────────────────────────────── */
function findExact(target, docs, i=0, acc=[]) {
  if (Math.abs(target) < 0.01) return acc;
  if (i >= docs.length || target < 0) return null;
  const s = parseNum(docs[i][COL.saldoResiduo]);
  return findExact(target-s, docs, i+1, [...acc, docs[i]]) || findExact(target, docs, i+1, acc);
}

function predictAllocation(amount, clientId, docs) {
  const mine = docs.filter(d => d[COL.codiceCliente]===clientId && d[COL.stato]?.toUpperCase()==="APERTO");
  const nacs = mine.filter(d => d[COL.tipoDocumento]==="NAC");
  const nacTotal = nacs.reduce((s,d) => s+parseNum(d[COL.saldoResiduo]), 0);
  const net = amount - nacTotal;

  const fves = mine
    .filter(d => d[COL.tipoDocumento]==="FVE")
    .sort((a,b) => new Date(a[COL.dataDocumento])-new Date(b[COL.dataDocumento]));

  let rem = net;
  const full=[], partial=[];
  for (const f of fves) {
    if (rem<=0) break;
    const s = parseNum(f[COL.saldoResiduo]);
    if (rem>=s) { full.push({...f,allocato:s}); rem-=s; }
    else         { partial.push({...f,allocato:rem}); rem=0; }
  }
  const uncovered = fves.filter(f => ![...full,...partial].find(c=>c[COL.numeroDocumento]===f[COL.numeroDocumento]));
  const exact = rem>0.01 ? findExact(rem, uncovered) : null;

  return { nacs, nacTotal, net, full, partial, exact, residual: Math.max(0,rem) };
}

// Converte stringa numerica italiana (virgola decimale) o inglese (punto) in float
const parseNum = s => {
  if(s===null||s===undefined||s==="") return 0;
  const str = String(s).trim();
  // Formato italiano: 1.234,56 → rimuovi punti migliaia, sostituisci virgola con punto
  if(str.includes(",")) return parseFloat(str.replace(/\./g,"").replace(",",".")) || 0;
  // Formato standard con punto decimale
  return parseFloat(str) || 0;
};
const eur = n => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(parseNum(n));
// Converti qualsiasi formato data → gg/mm/aaaa (display)
const toISO = v => {
  if(!v) return "";
  const s = String(v).trim();
  if(/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);           // già ISO
  const it = s.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})/);
  if(it) return `${it[3]}-${it[2].padStart(2,"0")}-${it[1].padStart(2,"0")}`;
  if(typeof v==="number"&&v>40000) {                                   // seriale Excel
    const d=new Date(Date.UTC(1899,11,30)+Math.round(v)*86400000);
    return isNaN(d)?"":d.toISOString().slice(0,10);
  }
  return s;
};
const toIT = v => {
  if(!v) return "—";
  const iso = toISO(v);
  if(!iso) return String(v);
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
};
const dFmt = toIT; // alias per compatibilità
const ageDays = s => (Date.now()-new Date(s))/(86400000);
const isOver  = s => ageDays(s)>90;

/* ──────────────────────────────────────────────
   SORT HOOK — riutilizzabile per tutte le tabelle
────────────────────────────────────────────── */
// Funzione pura di ordinamento (senza hook interni)
function sortData(data, sortKey, sortDir) {
  const parseDate = v => {
    const s = String(v||"").trim();
    const itMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (itMatch) return new Date(itMatch[3], itMatch[2]-1, itMatch[1]);
    const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return new Date(isoMatch[1], isoMatch[2]-1, isoMatch[3]);
    return null;
  };
  if(!sortKey) return [...data];
  return [...data].sort((a,b)=>{
    const av=a[sortKey]||"", bv=b[sortKey]||"";
    const ad=parseDate(av), bd=parseDate(bv);
    let cmp;
    if(ad&&bd) cmp=ad-bd;
    else {
      const an=parseFloat(String(av).replace(/\./g,"").replace(",","."));
      const bn=parseFloat(String(bv).replace(/\./g,"").replace(",","."));
      if(!isNaN(an)&&!isNaN(bn)) cmp=an-bn;
      else cmp=String(av).localeCompare(String(bv),"it");
    }
    return sortDir==="asc"?cmp:-cmp;
  });
}

function EditCell({value, onSave, numeric, display, color}) {
  const [ed,setEd]=useState(false);
  const [v,setV]=useState(value);
  const ref=useRef();
  useEffect(()=>{ setV(value); },[value]);
  useEffect(()=>{ if(ed&&ref.current) ref.current.focus(); },[ed]);
  const commit=()=>{ setEd(false); if(String(v)!==String(value)) onSave(v); };
  if(ed) return (
    <input ref={ref} value={v} type={numeric?"number":"text"}
      onChange={e=>setV(e.target.value)}
      onBlur={commit}
      onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape"){setV(value);setEd(false);} }}
      style={{...S.input,padding:"3px 7px",width:"100%",fontSize:12,color:color||"inherit"}} />
  );
  const shown = display !== undefined ? display : (value||"—");
  return (
    <span onDoubleClick={()=>setEd(true)} title="Doppio click per modificare"
      style={{cursor:"text",display:"block",padding:"2px 3px",borderRadius:4,
              color:color||"inherit",transition:"background .15s"}}
      onMouseEnter={e=>e.target.style.background="#1e293b"}
      onMouseLeave={e=>e.target.style.background="transparent"}>
      {shown}
    </span>
  );
}

  const FilBtn = ({label,active,onClick,color}) => (
    React.createElement("button",{onClick,style:{
      background:active?(color||"#1e3a5f"):"transparent",
      border:`1px solid ${active?(color||"#3b82f6"):"#1e293b"}`,
      color:active?"#f1f5f9":"#475569",
      borderRadius:6,padding:"4px 10px",cursor:"pointer",
      fontSize:10,fontWeight:active?700:400,
      fontFamily:"IBM Plex Mono,monospace",transition:"all .12s",
    }},label)
  );

  const filtriUI = (
    <div style={{display:"flex",gap:8,marginBottom:14,flexWrap:"wrap",alignItems:"center"}}>
      <div style={{display:"flex",gap:3,background:"#070d18",border:"1px solid #0f1f35",borderRadius:8,padding:3}}>
        {[["TUTTI","Tutti"],["IN ARCHIVIO","In Archivio"],["CONSEGNATO A PINO","Cons. Pino"]].map(([v,l])=>(
          <FilBtn key={v} label={l} active={statoFil===v}
            color={v==="IN ARCHIVIO"?"#78350f":v==="CONSEGNATO A PINO"?"#1e3a5f":"#1e293b"}
            onClick={()=>setStatoFil(v)}/>
        ))}
      </div>
      <div style={{width:1,height:20,background:"#1e293b",flexShrink:0}}/>
      <div style={{display:"flex",gap:3,background:"#070d18",border:"1px solid #0f1f35",borderRadius:8,padding:3}}>
        {PRESETS.map((p,i)=>(
          <FilBtn key={i} label={p.label} color="#1e3a5f"
            active={preset===i&&!fromDate&&!toDate}
            onClick={()=>{setPreset(i);setFromDate("");setToDate("");}}/>
        ))}
      </div>
      <div style={{display:"flex",gap:4,alignItems:"center"}}>
        <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)}
          style={{background:"#070d18",border:"1px solid #1e293b",borderRadius:6,
            color:"#94a3b8",fontSize:10,padding:"4px 8px",fontFamily:"IBM Plex Mono,monospace"}}/>
        <span style={{color:"#334155",fontSize:10}}>→</span>
        <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)}
          style={{background:"#070d18",border:"1px solid #1e293b",borderRadius:6,
            color:"#94a3b8",fontSize:10,padding:"4px 8px",fontFamily:"IBM Plex Mono,monospace"}}/>
        {(fromDate||toDate)&&(
          <button onClick={()=>{setFromDate("");setToDate("");}}
            style={{background:"#1e293b",border:"none",color:"#ef4444",borderRadius:5,
              padding:"3px 7px",cursor:"pointer",fontSize:11}}>✕</button>
        )}
      </div>
    </div>
  );

  if(!entries.length) return (
    <div>
      {filtriUI}
      <div style={{padding:"48px 0",textAlign:"center"}}>
        <div style={{fontSize:32,marginBottom:8,opacity:.3}}>◈</div>
        <div style={{color:"#334155",fontSize:12}}>Nessun assegno nel periodo selezionato</div>
      </div>
    </div>
  );


  // ── layout SVG ──────────────────────────────────────────
  const W=820, H=220, P={t:24,r:20,b:44,l:72};
  const iW=W-P.l-P.r, iH=H-P.t-P.b;
  const n=entries.length;
  const gap=iW/n;
  const barW=Math.max(5, Math.min(32, gap*0.65));
  const xOf=i=>P.l+i*gap+gap/2;
  const maxVal=Math.max(...entries.map(([,v])=>v.total),1);
  const labelStep=Math.max(1,Math.ceil(n/12));

  // griglia Y — 4 livelli
  const gridLines=[0.25,0.5,0.75,1].map(r=>({
    r, y:P.t+iH*r, val:maxVal*(1-r)
  }));
  const fmtY=v=>v>=10000?`${(v/1000).toFixed(0)}k`:v>=1000?`${(v/1000).toFixed(1)}k`:Math.round(v).toString();

  const handleMouseMove = e => {
    if(!svgRef.current) return;
    const rect=svgRef.current.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    let best=null, bestD=Infinity;
    entries.forEach(([,],i)=>{ const d=Math.abs(mx-xOf(i)); if(d<bestD&&d<gap/2+2){bestD=d;best=i;} });
    setHoverIdx(best);
    setMousePos({x:e.clientX-rect.left, y:e.clientY-rect.top});
  };

  const totGlobale = entries.reduce((s,[,v])=>s+v.total,0);
  const nGlobale   = entries.reduce((s,[,v])=>s+v.items.length,0);

  return (
    <div style={{userSelect:"none"}}>

      {/* ── filtri ─────────────────────────────────────────── */}
      {filtriUI}

      {/* ── KPI strip ─────────────────────────────────────── */}
      <div style={{display:"flex",gap:2,marginBottom:14,flexWrap:"wrap"}}>
        {[
          {label:"Totale periodo",  val:eur(totGlobale), color:"#4ade80"},
          {label:"In Archivio",     val:eur(entries.reduce((s,[,v])=>s+v.archivio,0)), color:"#fb923c"},
          {label:"Cons. a Pino",    val:eur(entries.reduce((s,[,v])=>s+v.pino,0)),     color:"#60a5fa"},
          {label:"Assegni · Date",  val:`${nGlobale} · ${entries.length}`,             color:"#64748b"},
        ].map(({label,val,color},i)=>(
          <div key={i} style={{flex:"1 1 130px",background:"#070d18",
            border:"1px solid #0f1f35",borderRadius:10,padding:"10px 16px"}}>
            <div style={{color:"#334155",fontSize:9,fontWeight:700,
              textTransform:"uppercase",letterSpacing:.8,marginBottom:4}}>{label}</div>
            <div style={{color,fontSize:14,fontWeight:800,
              fontFamily:"IBM Plex Mono,monospace",lineHeight:1}}>{val}</div>
          </div>
        ))}
      </div>

      {/* ── grafico ──────────────────────────────────────── */}
      <div style={{position:"relative"}}>
        <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
          style={{overflow:"visible",cursor:"crosshair",display:"block"}}
          onMouseMove={handleMouseMove}
          onMouseLeave={()=>setHoverIdx(null)}>
          <defs>
            {/* barra normale */}
            <linearGradient id="ccBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#22c55e" stopOpacity=".9"/>
              <stop offset="100%" stopColor="#052e16" stopOpacity=".5"/>
            </linearGradient>
            {/* barra hover */}
            <linearGradient id="ccBh" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#4ade80"/>
              <stop offset="100%" stopColor="#15803d" stopOpacity=".7"/>
            </linearGradient>
            {/* barra tolleranza */}
            <linearGradient id="ccBt" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#fb923c" stopOpacity=".9"/>
              <stop offset="100%" stopColor="#431407" stopOpacity=".5"/>
            </linearGradient>
            {/* barra tolleranza hover */}
            <linearGradient id="ccBth" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#fdba74"/>
              <stop offset="100%" stopColor="#9a3412" stopOpacity=".7"/>
            </linearGradient>
            {/* barra pino (consegnato) */}
            <linearGradient id="ccBp" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#60a5fa" stopOpacity=".9"/>
              <stop offset="100%" stopColor="#1e3a5f" stopOpacity=".5"/>
            </linearGradient>
            {/* barra pino hover */}
            <linearGradient id="ccBph" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%"   stopColor="#93c5fd"/>
              <stop offset="100%" stopColor="#1d4ed8" stopOpacity=".7"/>
            </linearGradient>
          </defs>

          {/* area plot sfondo */}
          <rect x={P.l} y={P.t} width={iW} height={iH} fill="#050b15" rx={4}/>

          {/* linee griglia */}
          {gridLines.map(({r,y,val})=>(
            <g key={r}>
              <line x1={P.l} x2={P.l+iW} y1={y} y2={y}
                stroke={r===1?"#0f1f35":"#0d1a2a"} strokeWidth={1}
                strokeDasharray={r===1?"":"4,5"}/>
              <text x={P.l-6} y={y+3.5} textAnchor="end"
                fill="#334155" fontSize={9} fontFamily="IBM Plex Mono,monospace">
                {fmtY(val)}
              </text>
            </g>
          ))}
          {/* barre stackate: blu (pino) in basso, arancione/verde (archivio) sopra */}
          {entries.map(([k,v],i)=>{
            const hTot  = Math.max(2,(v.total/maxVal)*iH);
            const hArch = v.total>0 ? Math.max(0,(v.archivio/v.total)*hTot) : 0;
            const hPino = hTot - hArch;
            const x=xOf(i)-barW/2;
            const yTot=P.t+iH-hTot;
            const isHov=hoverIdx===i;
            const inTol=isInTol(k);
            const isToday=k===todayKey;
            const nA=v.items.length;
            // Solo archivio presenti
            const gradArch = isHov ? (inTol?"url(#ccBth)":"url(#ccBh)") : (inTol?"url(#ccBt)":"url(#ccBg)");
            const gradPino = isHov ? "url(#ccBph)" : "url(#ccBp)";
            return (
              <g key={k}>
                {/* sfondo hover */}
                {isHov&&<rect x={x-3} y={P.t} width={barW+6} height={iH}
                  fill="#ffffff" opacity={.025} rx={2}/>}

                {/* linea oggi */}
                {isToday&&<line x1={xOf(i)} x2={xOf(i)} y1={P.t} y2={P.t+iH}
                  stroke="#818cf8" strokeWidth={1} strokeDasharray="2,3" opacity={.4}/>}

                {/* segmento PINO (blu) — in basso */}
                {hPino>0&&<rect x={x} y={yTot+hArch} width={barW} height={hPino}
                  rx={hArch>0?0:3} fill={gradPino} opacity={isHov?1:.85}/>}
                {/* segmento ARCHIVIO (arancio/verde) — sopra */}
                {hArch>0&&<rect x={x} y={yTot} width={barW} height={hArch}
                  rx={3} fill={gradArch} opacity={isHov?1:.85}/>}

                {/* totale sopra la barra */}
                {(isHov||(n<=8))&&(
                  <text x={xOf(i)} y={yTot-5} textAnchor="middle"
                    fill={inTol?"#fb923c":v.archivio>0?"#4ade80":"#60a5fa"} fontSize={8}
                    fontFamily="IBM Plex Mono,monospace" fontWeight="bold">
                    {fmtY(v.total)}
                  </text>
                )}

                {/* badge n° assegni */}
                {nA>1&&!isHov&&(
                  <g>
                    <circle cx={xOf(i)} cy={yTot-10} r={6}
                      fill="#070d18" stroke="#1e293b" strokeWidth={1}/>
                    <text x={xOf(i)} y={yTot-6.5} textAnchor="middle"
                      fill="#475569" fontSize={6.5}
                      fontFamily="IBM Plex Mono,monospace" fontWeight="bold">{nA}</text>
                  </g>
                )}

                {/* label asse X */}
                {(i%labelStep===0||n<=15)&&(
                  <text x={xOf(i)} y={H-P.b+14} textAnchor="middle"
                    fill={isToday?"#818cf8":isHov?"#94a3b8":"#334155"}
                    fontSize={8.5} fontFamily="IBM Plex Mono,monospace"
                    fontWeight={isToday||isHov?"bold":"normal"}>
                    {fmtDay(k)}
                  </text>
                )}
              </g>
            );
          })}

          {/* asse sinistro */}
          <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+iH} stroke="#0f1f35" strokeWidth={1}/>
          {/* asse inferiore */}
          <line x1={P.l} x2={P.l+iW} y1={P.t+iH} y2={P.t+iH} stroke="#0f1f35" strokeWidth={1}/>
        </svg>

        {/* ── TOOLTIP ──────────────────────────────────────── */}
        {hoverIdx!==null&&(()=>{
          const [k,v]=entries[hoverIdx];
          if(!svgRef.current) return null;
          const svgRect=svgRef.current.getBoundingClientRect();
          const pctX=xOf(hoverIdx)/W;
          const flipL=pctX>0.55;
          const TW=290;
          const inTol=isInTol(k);
          const accentColor=inTol?"#fb923c":"#22c55e";
          const accentBg=inTol?"#1c0a00":"#041510";

          return (
            <div style={{
              position:"absolute",
              top:Math.max(4, mousePos.y-20),
              left:flipL?`calc(${pctX*100}% - ${TW+14}px)`:`calc(${pctX*100}% + 14px)`,
              width:TW,
              background:"#060e1c",
              border:`1px solid ${accentColor}33`,
              borderRadius:12,
              boxShadow:`0 20px 60px #00000099, 0 0 0 1px ${accentColor}11`,
              zIndex:300,
              pointerEvents:"none",
              overflow:"hidden",
            }}>

              {/* header data */}
              <div style={{background:accentBg,padding:"11px 14px",
                borderBottom:`1px solid ${accentColor}22`}}>
                <div style={{color:accentColor,fontSize:11,fontWeight:800,
                  letterSpacing:.3,marginBottom:5}}>
                  {fmtFullLong(k)}
                </div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{color:"#475569",fontSize:10}}>
                    {v.items.length} assegn{v.items.length===1?"o":"i"} in scadenza
                  </span>
                  <span style={{color:accentColor,fontSize:17,fontWeight:900,
                    fontFamily:"'IBM Plex Mono',monospace",lineHeight:1}}>
                    {eur(v.total)}
                  </span>
                </div>
              </div>

              {/* lista assegni */}
              <div style={{maxHeight:280,overflowY:"auto",
                scrollbarWidth:"thin",scrollbarColor:"#1e293b transparent"}}>
                {v.items.map((a,j)=>{
                  const imp=parseNum(a["IMPORTO TITOLO"]);
                  const fatture=a["FATTURE PAGATE"]||"";
                  const nc=a["NC SCALATE"]||"";
                  const docsColl=a["DOCUMENTI COLLEGATI"]||"";
                  return (
                    <div key={j} style={{
                      padding:"9px 14px",
                      borderBottom:j<v.items.length-1?"1px solid #080f1e":"none",
                    }}>
                      {/* riga 1: cliente + importo */}
                      <div style={{display:"flex",justifyContent:"space-between",
                        alignItems:"flex-start",marginBottom:4}}>
                        <div style={{color:"#e2e8f0",fontSize:11,fontWeight:700,
                          flex:1,minWidth:0,overflow:"hidden",
                          textOverflow:"ellipsis",whiteSpace:"nowrap",
                          paddingRight:8}}>
                          {a["CLIENTE"]||"—"}
                        </div>
                        <div style={{color:accentColor,fontSize:12,fontWeight:900,
                          fontFamily:"'IBM Plex Mono',monospace",
                          whiteSpace:"nowrap",flexShrink:0}}>
                          {eur(imp)}
                        </div>
                      </div>
                      {/* riga 2: n° titolo + stato */}
                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                        <span style={{color:"#38bdf8",fontSize:9,
                          fontFamily:"'IBM Plex Mono',monospace",fontWeight:700}}>
                          {a["N TITOLO"]||"—"}
                        </span>
                        <span style={{color:"#334155",fontSize:8}}>·</span>
                        <span style={{
                          fontSize:8,padding:"1px 5px",borderRadius:3,fontWeight:700,
                          background: inTol?"#1c0a00":"#071510",
                          color:inTol?"#fb923c":"#22c55e",
                          border:`1px solid ${inTol?"#7c2d12":"#14532d"}`,
                        }}>
                          {a["STATO TITOLO"]||""}
                        </span>
                      </div>
                      {/* riga 3: riferimenti documenti */}
                      {(fatture||nc||docsColl)&&(
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:3}}>
                          {fatture&&(
                            <div style={{display:"flex",gap:3,alignItems:"center"}}>
                              <span style={{color:"#334155",fontSize:8,fontWeight:700}}>FATT.</span>
                              <span style={{color:"#64748b",fontSize:9,
                                fontFamily:"'IBM Plex Mono',monospace"}}>
                                {fmtDocList(fatture)}
                              </span>
                            </div>
                          )}
                          {nc&&(
                            <div style={{display:"flex",gap:3,alignItems:"center"}}>
                              <span style={{color:"#4c1d95",fontSize:8,fontWeight:700}}>NC</span>
                              <span style={{color:"#a78bfa",fontSize:9,
                                fontFamily:"'IBM Plex Mono',monospace"}}>
                                {fmtDocList(nc)}
                              </span>
                            </div>
                          )}
                          {docsColl&&!fatture&&(
                            <div style={{display:"flex",gap:3,alignItems:"center"}}>
                              <span style={{color:"#334155",fontSize:8,fontWeight:700}}>DOC.</span>
                              <span style={{color:"#64748b",fontSize:9,
                                fontFamily:"'IBM Plex Mono',monospace"}}>
                                {fmtDocList(docsColl)}
                              </span>
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              {/* footer tooltip: breakdown archivio/pino + barra % */}
              <div style={{padding:"8px 14px",borderTop:"1px solid #080f1e",
                background:"#050b17"}}>
                {v.archivio>0&&v.pino>0&&(
                  <div style={{display:"flex",justifyContent:"space-between",
                    fontSize:9,marginBottom:5}}>
                    <span style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{width:6,height:6,borderRadius:1,background:"#fb923c",display:"inline-block"}}/>
                      <span style={{color:"#64748b"}}>Arch. {eur(v.archivio)}</span>
                    </span>
                    <span style={{display:"flex",alignItems:"center",gap:4}}>
                      <span style={{width:6,height:6,borderRadius:1,background:"#60a5fa",display:"inline-block"}}/>
                      <span style={{color:"#64748b"}}>Pino {eur(v.pino)}</span>
                    </span>
                  </div>
                )}
                <div style={{display:"flex",justifyContent:"space-between",
                  fontSize:9,color:"#334155",marginBottom:4}}>
                  <span>% sul totale periodo</span>
                  <span style={{color:"#475569",fontFamily:"IBM Plex Mono,monospace"}}>
                    {((v.total/totGlobale)*100).toFixed(1)}%
                  </span>
                </div>
                <div style={{height:3,background:"#0f1f35",borderRadius:2,overflow:"hidden"}}>
                  <div style={{height:"100%",background:accentColor,
                    width:`${(v.total/totGlobale)*100}%`,
                    borderRadius:2}}/>
                </div>
              </div>
            </div>
          );
        })()}
      </div>

      {/* ── legenda footer ─────────────────────────────── */}
      <div style={{display:"flex",gap:12,marginTop:10,
        fontSize:10,color:"#475569",flexWrap:"wrap",alignItems:"center"}}>
        <span style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:10,height:10,borderRadius:2,
            background:"linear-gradient(#4ade80,#052e16)",display:"inline-block"}}/>
          <span style={{color:"#64748b"}}>In Archivio</span>
        </span>
        <span style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:10,height:10,borderRadius:2,
            background:"linear-gradient(#60a5fa,#1e3a5f)",display:"inline-block"}}/>
          <span style={{color:"#64748b"}}>Cons. a Pino</span>
        </span>
        <span style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:10,height:10,borderRadius:2,
            background:"linear-gradient(#fb923c,#431407)",display:"inline-block"}}/>
          <span style={{color:"#64748b"}}>Scaduto ±4gg</span>
        </span>
        <span style={{display:"flex",alignItems:"center",gap:5}}>
          <span style={{width:2,height:10,background:"#818cf8",display:"inline-block"}}/>
          <span style={{color:"#64748b"}}>Oggi</span>
        </span>
        <span style={{marginLeft:"auto",color:"#334155",fontSize:9,
          fontFamily:"IBM Plex Mono,monospace"}}>
          {winFrom.slice(8,10)}/{winFrom.slice(5,7)}/{winFrom.slice(0,4)} → {winTo.slice(8,10)}/{winTo.slice(5,7)}/{winTo.slice(0,4)}
        </span>
      </div>
    </div>
  );
}


function PayModal({docs,onSave,onClose,user,onLogout}) {
  // ── STEP: 1=tipo+cliente, 2=partitario+abbina, 3=conferma
  const [step,setStep]=useState(1);
  const [tipo,setTipo]=useState(""); // "assegno" | "bonifico"
  const [clientSearch,setClientSearch]=useState("");
  const [cid,setCid]=useState("");
  const [clientName,setClientName]=useState("");
  const [showDropdown,setShowDropdown]=useState(false);

  // Dati assegno
  const [nAssegno,setNAssegno]=useState("");
  const [dataTitolo,setDataTitolo]=useState(""); // data scritta sul titolo
  const [dataIncasso,setDataIncasso]=useState(""); // primo giorno lavorativo >= dataTitolo

  // Dati bonifico
  const [dataBonifico,setDataBonifico]=useState(new Date().toISOString().slice(0,10));

  // Abbinamento fatture
  const [rows,setRows]=useState([]); // [{doc, checked, importoAllocato}]
  const [saving,setSaving]=useState(false);

  // ── Helpers
  const primoGiornoLavorativo = isoDate => {
    if(!isoDate) return "";
    const d = new Date(isoDate);
    // 0=Dom, 6=Sab
    while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  };

  const fmtIso = iso => {
    if(!iso) return "";
    const [y,m,g] = iso.split("-");
    return `${g}/${m}/${y}`;
  };

  const parseIso = ddmmyyyy => {
    if(!ddmmyyyy) return "";
    const p = ddmmyyyy.split("/");
    if(p.length===3) return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
    return ddmmyyyy;
  };

  const dayName = iso => {
    if(!iso) return "";
    return ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(iso).getDay()];
  };

  // Clienti unici (documenti aperti)
  const allClients = [];
  const seen = new Set();
  docs.filter(d=>d[COL.stato]?.toUpperCase()==="APERTO").forEach(d=>{
    const k = d[COL.codiceCliente];
    if(!seen.has(k)){ seen.add(k); allClients.push({id:k,name:d[COL.ragioneSociale]}); }
  });
  const filteredClients = clientSearch.length>1
    ? allClients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase())||c.id.includes(clientSearch))
    : allClients;

  const selectClient = (id,name) => {
    setCid(id); setClientName(name); setClientSearch(name); setShowDropdown(false);
    // Carica partitario: FVE FIFO + NAC in fondo
    const fves = docs.filter(d=>d[COL.codiceCliente]===id&&d[COL.stato]?.toUpperCase()==="APERTO"&&d[COL.tipoDocumento]==="FVE")
      .sort((a,b)=>new Date(parseIso(a[COL.dataDocumento]))-new Date(parseIso(b[COL.dataDocumento])));
    const nacs = docs.filter(d=>d[COL.codiceCliente]===id&&d[COL.stato]?.toUpperCase()==="APERTO"&&d[COL.tipoDocumento]==="NAC");
    setRows([...fves,...nacs].map(doc=>({doc,checked:false,importoAllocato:parseNum(doc[COL.saldoResiduo])})));
  };

  // Totali calcolati
  const fveSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE");
  const nacSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="NAC");
  const totFve = fveSel.reduce((s,r)=>s+r.importoAllocato,0);
  const totNac = nacSel.reduce((s,r)=>s+Math.abs(r.importoAllocato),0);
  const netto = totFve - totNac;

  const toggleRow = i => setRows(p=>{
    const r=[...p]; r[i]={...r[i],checked:!r[i].checked}; return r;
  });
  const setAlloc = (i,val) => setRows(p=>{
    const r=[...p];
    const max = Math.abs(parseNum(r[i].doc[COL.saldoResiduo]));
    r[i]={...r[i],importoAllocato:Math.min(Math.max(0,parseNum(val)),max),checked:true};
    return r;
  });

  // Data incasso effettivo
  const dataEff = tipo==="assegno" ? dataIncasso : dataBonifico;

  // ── SAVE
  const save = async () => {
    if(saving) return;
    const selected = rows.filter(r=>r.checked&&r.importoAllocato>0);
    if(!selected.length) return;
    setSaving(true);

    const nacNums = nacSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const fveNums = fveSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const noteBase = tipo==="assegno"
      ? `DA INCASSARE ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}`
      : `DA INCASSARE BONIF ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}`;

    const pred = {
      full: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))<0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      partial: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))>=0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacs: nacSel.map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacTotal: totNac,
      net: netto,
      residual:0,
      exact:[],
    };

    await onSave({
      method: tipo==="assegno"?"ASSEGNO":"BONIFICO",
      amount: netto,
      cid, date: dataEff, notes: noteBase,
      nAssegno: tipo==="assegno"?nAssegno:"",
      dataTitolo: tipo==="assegno"?dataTitolo:"",
      fveNums, nacNums,
      pred,
    });
    setSaving(false);
    onClose();
  };

  // ── STYLES locali
  const inp = {background:"#070c18",border:"1px solid #1e293b",borderRadius:8,
    padding:"9px 12px",color:"#f1f5f9",fontSize:13,fontFamily:"'IBM Plex Mono',monospace",
    width:"100%",outline:"none"};
  const card = (active,accent="#6366f1") => ({
    border:`2px solid ${active?accent:"#1e293b"}`,borderRadius:12,padding:"18px 20px",
    cursor:"pointer",background:active?`${accent}11`:"#070c18",
    transition:"all .15s",textAlign:"center",flex:1,
  });

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s"}}>
      <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,
        width:700,maxHeight:"94vh",overflowY:"auto",
        boxShadow:"0 24px 80px rgba(0,0,0,.9)",fontFamily:"'IBM Plex Mono',monospace"}}>

        {/* ── HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"18px 24px",borderBottom:"1px solid #1e293b",position:"sticky",top:0,
          background:"#0f172a",zIndex:10}}>
          <div>
            <div style={{color:"#f1f5f9",fontSize:15,fontWeight:700}}>⟁ Registra Incasso</div>
            <div style={{display:"flex",gap:16,marginTop:6}}>
              {["Tipo & Cliente","Abbina Documenti","Conferma"].map((lbl,i)=>(
                <span key={i} style={{fontSize:10,color:step===i+1?"#6366f1":"#334155",
                  fontWeight:step===i+1?700:400}}>
                  {step===i+1?"● ":""}{i+1}. {lbl}
                </span>
              ))}
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:"#475569",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        <div style={{padding:"24px"}}>

        {/* ══ STEP 1 — Tipo pagamento + Cliente ══ */}
        {step===1&&(
          <>
            {/* Tipo */}
            <div style={{marginBottom:24}}>
              <div style={{color:"#64748b",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                TIPO PAGAMENTO
              </div>
              <div style={{display:"flex",gap:12}}>
                <div style={card(tipo==="assegno","#6366f1")} onClick={()=>setTipo("assegno")}>
                  <div style={{fontSize:28,marginBottom:6}}>🏷️</div>
                  <div style={{color:tipo==="assegno"?"#a5b4fc":"#94a3b8",fontWeight:700,fontSize:13}}>Assegno</div>
                  <div style={{color:"#475569",fontSize:10,marginTop:4}}>Titolo fisico</div>
                </div>
                <div style={card(tipo==="bonifico","#0ea5e9")} onClick={()=>setTipo("bonifico")}>
                  <div style={{fontSize:28,marginBottom:6}}>🏦</div>
                  <div style={{color:tipo==="bonifico"?"#7dd3fc":"#94a3b8",fontWeight:700,fontSize:13}}>Bonifico</div>
                  <div style={{color:"#475569",fontSize:10,marginTop:4}}>Trasferimento bancario</div>
                </div>
              </div>
            </div>

            {/* Dati specifici per tipo */}
            {tipo==="assegno"&&(
              <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI ASSEGNO
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                      Numero Assegno
                    </label>
                    <input value={nAssegno} onChange={e=>setNAssegno(e.target.value)}
                      placeholder="AB - XXXXX" style={inp}/>
                  </div>
                  <div>
                    <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                      Data sul Titolo
                    </label>
                    <input type="date" value={dataTitolo}
                      onChange={e=>{
                        setDataTitolo(e.target.value);
                        setDataIncasso(primoGiornoLavorativo(e.target.value));
                      }}
                      style={inp}/>
                  </div>
                </div>
                {dataTitolo&&(
                  <div style={{marginTop:12,background:"#0a0f1e",borderRadius:8,padding:"10px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data sul titolo</div>
                        <div style={{color:"#94a3b8",fontSize:12}}>
                          {fmtIso(dataTitolo)} — <span style={{color:["Sab","Dom"].includes(dayName(dataTitolo))?"#fb923c":"#64748b"}}>
                            {dayName(dataTitolo)}
                          </span>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data incasso previsto</div>
                        <div style={{color:"#4ade80",fontSize:13,fontWeight:700}}>
                          {fmtIso(dataIncasso)} — {dayName(dataIncasso)}
                        </div>
                        {dataTitolo!==dataIncasso&&(
                          <div style={{color:"#fb923c",fontSize:10,marginTop:2}}>
                            ↑ spostato (weekend)
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{marginTop:10}}>
                      <label style={{color:"#475569",fontSize:10,display:"block",marginBottom:4}}>
                        Correggi data incasso (se necessario)
                      </label>
                      <input type="date" value={dataIncasso}
                        onChange={e=>setDataIncasso(e.target.value)} style={{...inp,fontSize:12}}/>
                    </div>
                  </div>
                )}
              </div>
            )}

            {tipo==="bonifico"&&(
              <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI BONIFICO
                </div>
                <div>
                  <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                    Data contabile bonifico
                  </label>
                  <input type="date" value={dataBonifico}
                    onChange={e=>setDataBonifico(e.target.value)} style={inp}/>
                </div>
              </div>
            )}

            {/* Selezione cliente */}
            {tipo&&(
              <div style={{marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                  CLIENTE
                </div>
                <div style={{position:"relative"}}>
                  <input value={clientSearch}
                    onChange={e=>{setClientSearch(e.target.value);setShowDropdown(true);setCid("");}}
                    onFocus={()=>setShowDropdown(true)}
                    placeholder="🔍 Cerca per nome o codice..."
                    style={inp}/>
                  {showDropdown&&filteredClients.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,
                      background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,
                      maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px #000a"}}>
                      {filteredClients.slice(0,10).map(c=>(
                        <div key={c.id} onClick={()=>selectClient(c.id,c.name)}
                          style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #0f172a"}}
                          className="row-hover">
                          <div style={{color:"#f1f5f9",fontSize:12}}>{c.name}</div>
                          <div style={{color:"#475569",fontSize:10}}>cod. {c.id}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {cid&&(
                  <div style={{marginTop:10,background:"#0a1628",border:"1px solid #1e3a5f",
                    borderRadius:8,padding:"10px 14px",fontSize:12,color:"#60a5fa"}}>
                    ✓ <strong>{clientName}</strong> — {rows.filter(r=>r.doc[COL.tipoDocumento]==="FVE").length} FVE aperte,{" "}
                    {rows.filter(r=>r.doc[COL.tipoDocumento]==="NAC").length} NAC disponibili
                  </div>
                )}
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={onClose} style={{background:"#1e293b",border:"none",borderRadius:8,
                padding:"10px 20px",color:"#94a3b8",cursor:"pointer",fontSize:13}}>Annulla</button>
              <button
                disabled={!tipo||!cid||(tipo==="assegno"&&!dataIncasso)||(tipo==="bonifico"&&!dataBonifico)}
                onClick={()=>setStep(2)}
                style={{background:tipo&&cid?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#1e293b",
                  border:"none",borderRadius:8,padding:"10px 24px",
                  color:tipo&&cid?"#fff":"#475569",cursor:tipo&&cid?"pointer":"not-allowed",
                  fontSize:13,fontWeight:700}}>
                Avanti → Abbina Documenti
              </button>
            </div>
          </>
        )}

        {/* ══ STEP 2 — Partitario cliente + Abbinamento ══ */}
        {step===2&&(
          <>
            {/* Riepilogo testata */}
            <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:10,
              padding:"12px 16px",marginBottom:18,display:"flex",gap:20,flexWrap:"wrap"}}>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Cliente</div>
                <div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{clientName}</div>
              </div>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Tipo</div>
                <div style={{color:"#a5b4fc",fontSize:13,fontWeight:700}}>
                  {tipo==="assegno"?`🏷️ Assegno ${nAssegno}`:"🏦 Bonifico"}
                </div>
              </div>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Data incasso previsto</div>
                <div style={{color:"#4ade80",fontSize:13,fontWeight:700}}>{fmtIso(dataEff)}</div>
              </div>
            </div>

            {/* Contatori live */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
              {[
                {lbl:"FVE selezionate",val:eur(totFve),c:"#4ade80"},
                {lbl:"NAC scalate",val:eur(totNac),c:"#c084fc"},
                {lbl:"Netto da incassare",val:eur(netto),c:"#38bdf8"},
              ].map(({lbl,val,c})=>(
                <div key={lbl} style={{background:"#070c18",border:"1px solid #1e293b",
                  borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                  <div style={{color:"#475569",fontSize:10,marginBottom:4}}>{lbl}</div>
                  <div style={{color:c,fontSize:15,fontWeight:700}}>{val}</div>
                </div>
              ))}
            </div>

            {/* Tabella partitario */}
            <div style={{border:"1px solid #1e293b",borderRadius:10,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"10px 14px",background:"#070c18",borderBottom:"1px solid #1e293b",
                display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#94a3b8",fontSize:11,fontWeight:700}}>◈ PARTITARIO APERTO</span>
                <span style={{color:"#475569",fontSize:10}}>
                  FVE = verde • NAC = viola (scalano dal netto)
                </span>
              </div>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                <thead>
                  <tr style={{background:"#070c18",borderBottom:"1px solid #1e293b"}}>
                    {["","Tipo","N° Doc","Data","Scadenza","Saldo","Importo"].map(h=>(
                      <th key={h} style={{padding:"8px 12px",textAlign:h==="Importo"||h==="Saldo"?"right":"left",
                        color:"#475569",fontWeight:600,fontSize:10}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {rows.map((row,i)=>{
                    const isNac = row.doc[COL.tipoDocumento]==="NAC";
                    const saldo = parseNum(row.doc[COL.saldoResiduo]);
                    const statoDoc = row.doc[COL.stato]?.toUpperCase();
                    const ov = statoDoc==="APERTO" && isOver(row.doc[COL.dataDocumento]);
                    const wr = statoDoc==="APERTO" && isWarn(row.doc[COL.dataDocumento]);
                    return (
                      <tr key={i} style={{borderBottom:"1px solid #0a0f1e",cursor:"pointer",
                        background:isNac?(row.checked?"#1a0f2e":"#0f0a1a"):(row.checked?"#0a1628":"#070c18"),
                        opacity:row.checked?1:0.65}}
                        onClick={()=>toggleRow(i)}>
                        <td style={{padding:"9px 12px",width:36,textAlign:"center"}}>
                          <input type="checkbox" checked={row.checked} onChange={()=>toggleRow(i)}
                            style={{width:15,height:15,accentColor:isNac?"#c084fc":"#6366f1",cursor:"pointer"}}
                            onClick={e=>e.stopPropagation()}/>
                        </td>
                        <td style={{padding:"9px 12px"}}>
                          <span style={{background:isNac?"#2a1040":"#1e1a40",color:isNac?"#c084fc":"#818cf8",
                            borderRadius:4,padding:"2px 7px",fontSize:10,fontWeight:700}}>
                            {row.doc[COL.tipoDocumento]}
                          </span>
                        </td>
                        <td style={{padding:"9px 12px",color:"#60a5fa",fontWeight:600}}>
                          {row.doc[COL.numeroDocumento]}
                        </td>
                        <td style={{padding:"9px 12px",color:"#64748b",fontSize:11}}>
                          {dFmt(row.doc[COL.dataDocumento])}
                        </td>
                        <td style={{padding:"9px 12px",color:ov?"#ef4444":wr?"#fb923c":"#64748b",fontSize:11}}>
                          {row.doc[COL.dataPagamento]?dFmt(row.doc[COL.dataPagamento]):"—"}
                        </td>
                        <td style={{padding:"9px 12px",textAlign:"right",color:"#94a3b8"}}>
                          {eur(saldo)}
                        </td>
                        <td style={{padding:"9px 12px",textAlign:"right"}}>
                          {row.checked
                            ? <input type="number" value={row.importoAllocato}
                                onChange={e=>setAlloc(i,e.target.value)}
                                onClick={e=>e.stopPropagation()}
                                min={0} max={saldo} step={0.01}
                                style={{width:100,background:"#0a0f1e",
                                  border:`1px solid ${isNac?"#a855f744":"#1e3a5f"}`,
                                  borderRadius:6,padding:"4px 8px",
                                  color:isNac?"#c084fc":"#4ade80",
                                  fontSize:12,textAlign:"right",fontWeight:700}}/>
                            : <span style={{color:"#334155",fontSize:11}}>—</span>
                          }
                        </td>
                      </tr>
                    );
                  })}
                </tbody>
              </table>
            </div>

            <div style={{display:"flex",gap:10,justifyContent:"space-between"}}>
              <button onClick={()=>setStep(1)} style={{background:"#1e293b",border:"none",
                borderRadius:8,padding:"10px 20px",color:"#94a3b8",cursor:"pointer",fontSize:13}}>
                ← Indietro
              </button>
              <button disabled={!rows.some(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE")}
                onClick={()=>setStep(3)}
                style={{background:rows.some(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE")
                  ?"linear-gradient(135deg,#059669,#10b981)":"#1e293b",
                  border:"none",borderRadius:8,padding:"10px 24px",
                  color:rows.some(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE")?"#fff":"#475569",
                  cursor:rows.some(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE")?"pointer":"not-allowed",
                  fontSize:13,fontWeight:700}}>
                Avanti → Conferma
              </button>
            </div>
          </>
        )}

        {/* ══ STEP 3 — Riepilogo + Conferma ══ */}
        {step===3&&(
          <>
            <div style={{color:"#94a3b8",fontSize:11,fontWeight:700,
              marginBottom:16,letterSpacing:1}}>◈ RIEPILOGO OPERAZIONE</div>

            {/* Card riepilogo */}
            <div style={{background:"#070c18",border:"1px solid #1e293b",
              borderRadius:12,padding:18,marginBottom:16}}>
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,marginBottom:14}}>
                <div>
                  <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Cliente</div>
                  <div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{clientName}</div>
                </div>
                <div>
                  <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Tipo</div>
                  <div style={{color:"#a5b4fc",fontSize:13,fontWeight:700}}>
                    {tipo==="assegno"?`🏷️ Assegno`:"🏦 Bonifico"}
                  </div>
                </div>
                {tipo==="assegno"&&<>
                  <div>
                    <div style={{color:"#475569",fontSize:10,marginBottom:3}}>N° Assegno</div>
                    <div style={{color:"#60a5fa",fontSize:13,fontWeight:700}}>{nAssegno||"—"}</div>
                  </div>
                  <div>
                    <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data titolo</div>
                    <div style={{color:"#94a3b8",fontSize:13}}>{fmtIso(dataTitolo)}</div>
                  </div>
                </>}
                <div>
                  <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data incasso previsto</div>
                  <div style={{color:"#4ade80",fontSize:14,fontWeight:800}}>{fmtIso(dataEff)}</div>
                </div>
                <div>
                  <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Netto da incassare</div>
                  <div style={{color:"#38bdf8",fontSize:14,fontWeight:800}}>{eur(netto)}</div>
                </div>
              </div>

              {/* FVE */}
              <div style={{borderTop:"1px solid #1e293b",paddingTop:12,marginBottom:8}}>
                <div style={{color:"#4ade80",fontSize:10,fontWeight:700,marginBottom:6}}>
                  FATTURE (FVE) — {fveSel.length} selezionate
                </div>
                {fveSel.map((r,i)=>(
                  <div key={i} style={{display:"flex",justifyContent:"space-between",
                    padding:"5px 0",borderBottom:"1px solid #0f172a",fontSize:12}}>
                    <span style={{color:"#94a3b8"}}>{r.doc[COL.numeroDocumento]} — {dFmt(r.doc[COL.dataDocumento])}</span>
                    <span style={{color:"#4ade80",fontWeight:700}}>{eur(r.importoAllocato)}</span>
                  </div>
                ))}
              </div>

              {/* NAC */}
              {nacSel.length>0&&(
                <div style={{paddingTop:8}}>
                  <div style={{color:"#c084fc",fontSize:10,fontWeight:700,marginBottom:6}}>
                    NOTE DI CREDITO (NAC) scalate — {nacSel.length}
                  </div>
                  {nacSel.map((r,i)=>(
                    <div key={i} style={{display:"flex",justifyContent:"space-between",
                      padding:"5px 0",borderBottom:"1px solid #0f172a",fontSize:12}}>
                      <span style={{color:"#a855f7"}}>{r.doc[COL.numeroDocumento]}</span>
                      <span style={{color:"#c084fc",fontWeight:700}}>-{eur(r.importoAllocato)}</span>
                    </div>
                  ))}
                </div>
              )}
            </div>

            {/* Nota che verrà scritta */}
            <div style={{background:"#0a1a10",border:"1px solid #22c55e33",borderRadius:8,
              padding:"10px 14px",marginBottom:16,fontSize:11}}>
              <div style={{color:"#475569",marginBottom:4}}>📝 Nota che verrà scritta sul documento:</div>
              <div style={{color:"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>
                {tipo==="assegno"
                  ? `DA INCASSARE ${fmtIso(dataEff)}${nacSel.length?` | NAC: ${nacSel.map(r=>r.doc[COL.numeroDocumento]).join(", ")}`:""}` 
                  : `DA INCASSARE BONIF ${fmtIso(dataEff)}${nacSel.length?` | NAC: ${nacSel.map(r=>r.doc[COL.numeroDocumento]).join(", ")}`:""}`}
              </div>
            </div>

  );
}



/* ──────────────────────────────────────────────
   IMPORT EXCEL DAL GESTIONALE
────────────────────────────────────────────── */
function MigrazioneTab({docs, authed, notify, onComplete}) {
  const [phase, setPhase] = React.useState("idle"); // idle | preview | importing | done
  const [parsed, setParsed] = React.useState(null); // {nuovi, duplicati, fve, nac}
  const [log, setLog] = React.useState([]);
  const fileRef = React.useRef();

  const addLog = msg => setLog(p => [...p, msg]);

  // Formatta data Excel (numero seriale o Date JS) → "YYYY-MM-DD"
  const excelDateToISO = val => {
    if (!val) return null;
    if (val instanceof Date) {
      return val.toISOString().slice(0,10);
    }
    if (typeof val === "number") {
      // Numero seriale Excel
      const d = new Date((val - 25569) * 86400 * 1000);
      return d.toISOString().slice(0,10);
    }
    if (typeof val === "string" && val.match(/^\d{4}-\d{2}-\d{2}/)) return val.slice(0,10);
    return String(val);
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setPhase("idle"); setParsed(null); setLog([]);

    try {
      // Legge il file come ArrayBuffer
      const buf = await file.arrayBuffer();
      const XLSX = window.XLSX;
      const wb = XLSX.read(buf, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

      if (rows.length < 2) { notify("File vuoto o non valido","error"); return; }

      // Colonne: A=0 Data, D=3 Tipo, F=5 Num.Doc, I=8 CodPV, J=9 Cliente, N=13 Tot.lordo
      const righe = rows.slice(1).filter(r => r[3] === "FVE" || r[3] === "NAC");

      if (righe.length === 0) { notify("Nessuna riga FVE/NAC trovata","error"); return; }

      // Costruisce set dei documenti già presenti per deduplicazione
      // Chiave: numero_documento + "|" + tipo_documento + "|" + data_documento
      const esistenti = new Set(
        docs.map(d => `${d[COL.numeroDocumento]}|${d[COL.tipoDocumento]}|${d[COL.dataDocumento]}`)
      );

      const nuovi = [], duplicati = [];

      righe.forEach(r => {
        const tipo      = r[3];  // D
        const numDoc    = String(r[5] || "").trim();  // F
        const data      = excelDateToISO(r[0]);       // A
        const codCliente= String(r[8] || "").trim();  // I
        const cliente   = String(r[9] || "").trim();  // J
        let importo     = parseFloat(r[13]) || 0;    // N

        // NAC → importo negativo
        if (tipo === "NAC" && importo > 0) importo = -importo;

        const chiave = `${numDoc}|${tipo}|${data}`;

        const doc = {
          numero_documento: numDoc,
          tipo_documento: tipo,
          data_documento: data,
          codice_cliente: codCliente,
          ragione_sociale: cliente,
          importo_totale: importo,
          saldo_residuo: importo,
          stato: "APERTO",
        };

        if (esistenti.has(chiave)) {
          duplicati.push(doc);
        } else {
          nuovi.push(doc);
          esistenti.add(chiave); // evita duplicati interni al file stesso
        }
      });

      const fve = nuovi.filter(d => d.tipo_documento === "FVE");
      const nac = nuovi.filter(d => d.tipo_documento === "NAC");

      setParsed({ nuovi, duplicati, fve, nac });
      addLog(`📂 File letto: ${righe.length} righe totali`);
      addLog(`✅ Nuovi da importare: ${nuovi.length} (${fve.length} FVE, ${nac.length} NAC)`);
      addLog(`⏭ Già presenti (saltati): ${duplicati.length}`);
      setPhase("preview");
    } catch(err) {
      notify("Errore lettura file: " + err.message, "error");
      addLog("❌ " + err.message);
    }
  };

  const handleImport = async () => {
    if (!parsed?.nuovi?.length) { notify("Nessun documento nuovo da importare","error"); return; }
    setPhase("importing");
    addLog("Avvio importazione...");
    try {
      const BATCH = 50;
      let tot = 0;
      for (let i = 0; i < parsed.nuovi.length; i += BATCH) {
        const batch = parsed.nuovi.slice(i, i + BATCH);
        const res = await d1API.migrate("documenti", batch);
        tot += res.inserted || 0;
        addLog(`Inseriti ${tot}/${parsed.nuovi.length}...`);
      }
      addLog(`✅ Importazione completata! ${tot} documenti aggiunti.`);
      setPhase("done");
      setTimeout(() => { onComplete(); notify(`${tot} documenti importati ✓`, "success"); }, 800);
    } catch(err) {
      addLog("❌ Errore: " + err.message);
      notify("Errore: " + err.message, "error");
      setPhase("preview");
    }
  };

  const reset = () => { setParsed(null); setLog([]); setPhase("idle"); if(fileRef.current) fileRef.current.value=""; };

  return (
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,marginBottom:4}}>
        ⬆ Importa da Excel
      </h2>
      <p style={{color:"#64748b",fontSize:12,marginBottom:24}}>
        Carica il file Excel esportato dal gestionale. Vengono letti solo i documenti FVE e NAC,
        scartando automaticamente i duplicati già presenti.
      </p>

      {/* Drop area file */}
      <div style={{border:"2px dashed #1e293b",borderRadius:12,padding:"32px",textAlign:"center",
        marginBottom:20,background:"#0a0f1e",cursor:"pointer"}}
        onClick={()=>fileRef.current?.click()}>
        <div style={{fontSize:32,marginBottom:8}}>📊</div>
        <div style={{color:"#94a3b8",fontSize:13}}>Clicca per selezionare il file <strong style={{color:"#f1f5f9"}}>.xlsx</strong></div>
        <div style={{color:"#475569",fontSize:11,marginTop:4}}>Colonne usate: A (data), D (tipo), F (num.doc), I (cod.cliente), J (cliente), N (importo)</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile}
          style={{display:"none"}} />
      </div>

      {/* Preview risultato parsing */}
      {parsed && (
        <div style={{marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
            {[
              {label:"Nuovi totali", val:parsed.nuovi.length, color:"#4ade80"},
              {label:"FVE nuove",    val:parsed.fve.length,   color:"#60a5fa"},
              {label:"NAC nuove",    val:parsed.nac.length,   color:"#f59e0b"},
              {label:"Duplicati",    val:parsed.duplicati.length, color:"#475569"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"#0a0f1e",border:"1px solid #1e293b",
                borderRadius:8,padding:"12px",textAlign:"center"}}>
                <div style={{color,fontSize:22,fontWeight:800}}>{val}</div>
                <div style={{color:"#64748b",fontSize:10,marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Anteprima prime righe nuove */}
          {parsed.nuovi.length > 0 && (
            <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:8,
              overflow:"auto",marginBottom:16,maxHeight:180}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{background:"#0f172a"}}>
                    {["Tipo","N.Doc","Data","Cliente","Importo"].map(h=>(
                      <th key={h} style={{padding:"6px 10px",color:"#64748b",fontWeight:600,textAlign:"left"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {parsed.nuovi.slice(0,8).map((d,i)=>(
                    <tr key={i} style={{borderTop:"1px solid #1e293b"}}>
                      <td style={{padding:"5px 10px"}}>
                        <span style={{background:d.tipo_documento==="FVE"?"#1e3a5f":"#3a1f0a",
                          color:d.tipo_documento==="FVE"?"#60a5fa":"#f59e0b",
                          padding:"1px 6px",borderRadius:4,fontSize:10}}>{d.tipo_documento}</span>
                      </td>
                      <td style={{padding:"5px 10px",color:"#f1f5f9"}}>{d.numero_documento}</td>
                      <td style={{padding:"5px 10px",color:"#94a3b8"}}>{toIT(d.data_documento)}</td>
                      <td style={{padding:"5px 10px",color:"#f1f5f9",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.ragione_sociale}</td>
                      <td style={{padding:"5px 10px",color:d.importo_totale<0?"#f87171":"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>
                        {new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(d.importo_totale)}
                      </td>
                    </tr>
                  ))}
                  {parsed.nuovi.length > 8 && (
                    <tr><td colSpan={5} style={{padding:"6px 10px",color:"#475569",fontSize:10}}>
                      ... e altri {parsed.nuovi.length - 8} documenti
                    </td></tr>
                  )}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Bottoni azione */}
      <div style={{display:"flex",gap:10}}>
        {phase === "preview" && parsed?.nuovi?.length > 0 && (
          <button onClick={handleImport}
            style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",
              border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,
              fontSize:13,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            ⬆ Importa {parsed.nuovi.length} documenti
          </button>
        )}
        {phase === "preview" && parsed?.nuovi?.length === 0 && (
          <div style={{color:"#f59e0b",fontSize:13,padding:"12px 0"}}>
            ✓ Tutti i documenti del file sono già presenti nel database.
          </div>
        )}
        {phase === "importing" && (
          <button disabled style={{background:"#1e293b",color:"#475569",border:"none",
            borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:13,fontFamily:"'Syne',sans-serif"}}>
            Importazione in corso...
          </button>
        )}
        {phase === "done" && (
          <button onClick={reset}
            style={{background:"#1e293b",color:"#94a3b8",border:"none",borderRadius:10,
              padding:"12px 28px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            ↺ Importa un altro file
          </button>
        )}
        {(phase === "preview" || phase === "done") && (
          <button onClick={reset}
            style={{background:"transparent",color:"#475569",border:"1px solid #1e293b",
              borderRadius:10,padding:"12px 20px",fontWeight:600,fontSize:13,
              cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            Annulla
          </button>
        )}
      </div>

      {/* Log */}
      {log.length > 0 && (
        <div style={{marginTop:20,background:"#070c18",border:"1px solid #1e293b",
          borderRadius:8,padding:12,maxHeight:150,overflow:"auto"}}>
          {log.map((l,i)=><div key={i} style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>{l}</div>)}
        </div>
      )}
    </div>
  );
}

  const [recoSearch,setRecoSearch]=useState(""); // ricerca fatture nel pannello
  const [storicoPopup,setStoricoPopup]=useState(null); // riconciliazione aperta in popup
  const [assShowAltri,setAssShowAltri]=useState(false); // espandi altri assegni in riconciliazione
  // ── Pannello assegni manuale ──
  const [assManData,setAssManData]=useState(()=>new Date().toISOString().slice(0,10)); // data selezionata
  const [assManDa,setAssManDa]=useState("");    // filtro data da
  const [assManA,setAssManA]=useState("");      // filtro data a

  const [assManSearch,setAssManSearch]=useState(""); // ricerca cliente/numero

  const [recoSel,setRecoSel]=useState({}); // {numDoc: importoAllocato}

    finally { setLoading(false); }

  useEffect(()=>{

    <div style={{minHeight:"100vh",background:"#070c18",display:"flex",alignItems:"center",justifyContent:"center"}}>

            onKeyDown={e=>e.key==="Enter"&&handleLogin()} placeholder="••••••••"
            style={{width:"100%",background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,
              padding:"10px 14px",color:"#f1f5f9",fontSize:13,fontFamily:"'IBM Plex Mono',monospace",

  /* ── RICONCILIAZIONE BANCARIA ── */
  const parseBankFile = async (file) => {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: "array", cellDates: true, cellNF: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
    if (rows.length < 1) throw new Error("File vuoto");

    // Debug
    console.log("=== BANK FILE DEBUG ===");
    console.log("Fogli:", wb.SheetNames, "| Righe:", rows.length);
    // Rileggi raw:true per avere i numeri veri (raw:false li converte in stringhe formattate)
    const rowsRaw = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

    console.log("=== BANK FILE DEBUG ===");
    console.log("Fogli:", wb.SheetNames, "| Righe:", rowsRaw.length);
    rowsRaw.slice(0, 12).forEach((r, i) => console.log(`R${i}:`, JSON.stringify(r)));

    // ── Converti data: stringa "09.03.2026", "09/03/2026", seriale Excel, Date JS ──
    const toDateStr = v => {
      if (v == null) return null;
      if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
      // Seriale Excel (numero > 40000 = post 2009)
      if (typeof v === "number" && v > 40000 && v < 100000) {
        const d = new Date(Date.UTC(1899,11,30) + Math.round(v)*86400000);
        return isNaN(d) ? null : d.toISOString().slice(0,10);
      }
      const s = String(v).trim();
      // ISO: 2026-03-09
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      // IT punto: 09.03.2026
      const dot = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      if (dot) return `${dot[3]}-${dot[2].padStart(2,"0")}-${dot[1].padStart(2,"0")}`;
      // IT slash: 09/03/2026
      const sl = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (sl) return `${sl[3]}-${sl[2].padStart(2,"0")}-${sl[1].padStart(2,"0")}`;
      return null;
    };

    // ── Converti numero: gestisce 1.234,56 (IT) e 1234.56 (EN) e stringhe ──
    const toNum = v => {
      if (v == null || v === "") return null;
      if (typeof v === "number") return v;
      const s = String(v).trim().replace(/\s/g,"");
      // formato italiano: 1.234,56 o 1.234 o 1.234,00
      if (/^-?\d{1,3}(\.\d{3})*(,\d*)?$/.test(s)) return parseFloat(s.replace(/\./g,"").replace(",","."));
      // semplice con virgola: 1234,56
      if (/^-?\d+(,\d+)?$/.test(s)) return parseFloat(s.replace(",","."));
      // fallback
      const n = parseFloat(s.replace(",",".").replace(/[^\d.\-]/g,""));
      return isNaN(n) ? null : n;
    };

    // ── Trova riga intestazione: quella con più parole chiave bancarie ──
    const HDR_WORDS = ["data","avere","dare","causale","descrizione","valuta","saldo","accredito","addebito","importo","movimento","aggiunt"];
    let hdrIdx = -1, bestScore = 0;
    for (let i = 0; i < Math.min(rowsRaw.length, 20); i++) {
      if (!rowsRaw[i]) continue;
      const txt = rowsRaw[i].map(c => String(c||"").toLowerCase()).join(" ");
      const score = HDR_WORDS.filter(w => txt.includes(w)).length;
      if (score > bestScore) { bestScore = score; hdrIdx = i; }
    }
    if (hdrIdx < 0) hdrIdx = rowsRaw.findIndex(r => r && r.some(c => c != null));
    if (hdrIdx < 0) throw new Error("Intestazione non trovata nel file");

    const hdr = rowsRaw[hdrIdx].map(h => String(h||"").toLowerCase().trim());
    console.log("Header @ riga", hdrIdx, "(score "+bestScore+"):", hdr);

    const findCol = (...keys) => {
      for (const k of keys) { const i = hdr.findIndex(h => h.includes(k)); if (i>=0) return i; }
      return -1;
    };

    // Colonne formato: Data Contabile | Data Valuta | Dare | Avere | Descrizione Causale ABI/SWIFT | Descrizioni Aggiuntive
    const colDataC   = findCol("data cont","data op","data mov");
    const colDataV   = findCol("data val","valuta");
    const colDataGen = findCol("data");
    const colAvere   = findCol("avere","accredito","entrate","credito","entrata");
    const colDare    = findCol("dare","addebito","uscite","debito","uscita");
    const colImporto = findCol("importo","amount","valore","mov");
    const colCausale = findCol("causale","descrizione causale","descri");
    const colDescAdd = findCol("aggiunt","descrizioni aggiunt","note aggiunt");

    // Priorità data: Contabile (col A) > Valuta (col B) > generica
    const colData = colDataC >= 0 ? colDataC : colDataV >= 0 ? colDataV : colDataGen;

    console.log("Colonne:", {colData,colAvere,colDare,colImporto,colCausale,colDescAdd});

    const result = [];
    for (let i = hdrIdx + 1; i < rowsRaw.length; i++) {
      const row = rowsRaw[i];
      if (!row || row.every(v => v == null || v === "")) continue;

      // Data — obbligatoria
      const data = toDateStr(colData >= 0 ? row[colData] : null);
      if (!data) continue;

      // Avere: colonna dedicata oppure importo positivo
      let avere = 0;
      if (colAvere >= 0) {
        const v = toNum(row[colAvere]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0 && colImporto >= 0) {
        const v = toNum(row[colImporto]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0) continue; // addebito (dare > 0, avere = 0) → skip

      const dare    = colDare    >= 0 ? (toNum(row[colDare]) || 0) : 0;
      const desc    = colCausale >= 0 ? String(row[colCausale]||"").trim() : "";
      const descAdd = colDescAdd >= 0 ? String(row[colDescAdd]||"").trim() : "";

      result.push({ idx: result.length, data, avere, dare, desc, descAdd, riconciliato: false });
    }

    console.log("Accrediti trovati:", result.length, result.slice(0,2));

    if (result.length === 0) {
      const hdrStr = hdr.map((h,i) => `[${i}]${h||"vuoto"}`).join(" | ");
      throw new Error(`Nessun accredito (Avere > 0) trovato.\nColonne rilevate: ${hdrStr}`);
    }
    return result;
  };

                        <div style={{

                          borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11}}>
                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>
                            <span style={{color:"#475569"}}>Accredito banca:</span>
                            <span style={{color:"#4ade80",fontWeight:700,fontFamily:"'IBM Plex Mono',monospace"}}>

                          <div style={{display:"flex",justifyContent:"space-between",marginBottom:3}}>

                            <span style={{fontWeight:800,fontFamily:"'IBM Plex Mono',monospace",
                              color:isDone?"#22c55e":diff<0?"#ef4444":"#fb923c"}}>
                              {isDone?"✓ pareggio":diff>0?`scoperto ${eur(diff)}`:`eccedente ${eur(-diff)}`}

                          </div>

                        <input value={recoSearch} onChange={e=>setRecoSearch(e.target.value)}

                        <div style={{maxHeight:360,overflowY:"auto",marginBottom:12}}>
                          {(()=>{
                            const q = recoSearch.toLowerCase();
                            const lista = assegni
                              .filter(a=>{
                                if(q && !a["CLIENTE"]?.toLowerCase().includes(q) &&
                                   !a["N TITOLO"]?.toLowerCase().includes(q) &&
                                   !(a["DOCUMENTI COLLEGATI"]||a["FATTURE PAGATE"]||"").toLowerCase().includes(q)) return false;
                                return true;
                              })
                              .sort((a,b)=>{
                                // Prima: assegni con data vicina all'accredito bancario
                                const da = toISO(a["DATA TITOLO"])||"";
                                const db = toISO(b["DATA TITOLO"])||"";
                                const dataAcc = accrediti[0].data||"";
                                const diffA = Math.abs(new Date(da)-new Date(dataAcc));
                                const diffB = Math.abs(new Date(db)-new Date(dataAcc));
                                if(diffA!==diffB) return diffA-diffB;
                                return 0;

                              <div style={{padding:20,textAlign:"center",color:"#334155",fontSize:11}}>

                                <div key={i}
                                  onClick={()=>setRecoSel(p=>{
                                    const n={...p};
                                    if(aid in n) delete n[aid];
                                    else n[aid]=String(imp);
                                    return n;
                                  })}
                                  style={{
                                    padding:"9px 11px",marginBottom:6,borderRadius:8,cursor:"pointer",
                                    border:`1px solid ${checked?"#3b82f6":nearDate?"#d9770644":"#1e293b"}`,

                                        {eur(imp)}
                                      </div>
                                    </div>
                                  </div>
                                </div>

                            });
                          })()}

                      </>

                <span style={{color:"#60a5fa"}}>

                <span style={{color:"#475569"}}>
                  Totale incassato: <strong style={{color:"#38bdf8"}}>{eur(riconciliazioni.reduce((s,r)=>s+(parseNum(r.accredito||r["ACCREDITO"]||0)),0))}</strong>

                    </tr>
                  </thead>
                  <tbody>
                    {[...riconciliazioni].reverse().map((r,i)=>{
                      const fatture    = Array.isArray(r.fatture) ? r.fatture : [];

                      const data       = r.data || "—";
                      const desc       = r.descrizione || "—";
                      const id         = r.id || "—";

                      return (
                      <tr key={i} style={{borderBottom:"1px solid #0f172a",cursor:"pointer"}} className="row-hover"
                        onClick={()=>setStoricoPopup({r, fatture, tipo, data, desc, accredito, id, descAdd:r.descAdd||"", utente:r.utente||""})}>
