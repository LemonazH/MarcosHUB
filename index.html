/* ──────────────────────────────────────────────
   ALGORITMO PREDIZIONE PAGAMENTI
────────────────────────────────────────────── */
function findExact(target, docs, i=0, acc=[]) {
  if (Math.abs(target) < 0.01) return acc;
  if (i >= docs.length || target < 0) return null;
  const s = parseNum(docs[i][COL.saldoResiduo]);
  return findExact(target-s, docs, i+1, [...acc, docs[i]]) || findExact(target, docs, i+1, acc);
}

function predictAllocation(amount, clientId, docs) {
  const mine = docs.filter(d => d[COL.codiceCliente]===clientId && d[COL.stato]?.toUpperCase()==="APERTO");
  const nacs = mine.filter(d => d[COL.tipoDocumento]==="NAC");
  const nacTotal = nacs.reduce((s,d) => s+parseNum(d[COL.saldoResiduo]), 0);
  const net = amount - nacTotal;

  const fves = mine
    .filter(d => d[COL.tipoDocumento]==="FVE")
    .sort((a,b) => new Date(a[COL.dataDocumento])-new Date(b[COL.dataDocumento]));

  let rem = net;
  const full=[], partial=[];
  for (const f of fves) {
    if (rem<=0) break;
    const s = parseNum(f[COL.saldoResiduo]);
    if (rem>=s) { full.push({...f,allocato:s}); rem-=s; }
    else         { partial.push({...f,allocato:rem}); rem=0; }
  }
  const uncovered = fves.filter(f => ![...full,...partial].find(c=>c[COL.numeroDocumento]===f[COL.numeroDocumento]));
  const exact = rem>0.01 ? findExact(rem, uncovered) : null;

  return { nacs, nacTotal, net, full, partial, exact, residual: Math.max(0,rem) };
}

// Converte stringa numerica italiana (virgola decimale) o inglese (punto) in float
const parseNum = s => {
  if(s===null||s===undefined||s==="") return 0;
  const str = String(s).trim();
  // Formato italiano: 1.234,56 → rimuovi punti migliaia, sostituisci virgola con punto
  if(str.includes(",")) return parseFloat(str.replace(/\./g,"").replace(",",".")) || 0;
  // Formato standard con punto decimale
  return parseFloat(str) || 0;
};
const eur = n => new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(parseNum(n));
const dFmt = s => { if(!s) return "—"; const d=new Date(s); return isNaN(d)?s:d.toLocaleDateString("it-IT"); };
const ageDays = s => (Date.now()-new Date(s))/(86400000);
const isOver  = s => ageDays(s)>90;
const isWarn  = s => ageDays(s)>60 && ageDays(s)<=90;

/* ──────────────────────────────────────────────
   SORT HOOK — riutilizzabile per tutte le tabelle
────────────────────────────────────────────── */
// Funzione pura di ordinamento (senza hook interni)
function sortData(data, sortKey, sortDir) {
  const parseDate = v => {
    const s = String(v||"").trim();
    const itMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (itMatch) return new Date(itMatch[3], itMatch[2]-1, itMatch[1]);
    const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return new Date(isoMatch[1], isoMatch[2]-1, isoMatch[3]);
    return null;
  };
  if(!sortKey) return [...data];
  return [...data].sort((a,b)=>{
    const av=a[sortKey]||"", bv=b[sortKey]||"";
    const ad=parseDate(av), bd=parseDate(bv);
    let cmp;
    if(ad&&bd) cmp=ad-bd;
    else {
      const an=parseFloat(String(av).replace(/\./g,"").replace(",","."));
      const bn=parseFloat(String(bv).replace(/\./g,"").replace(",","."));
      if(!isNaN(an)&&!isNaN(bn)) cmp=an-bn;
      else cmp=String(av).localeCompare(String(bv),"it");
    }
    return sortDir==="asc"?cmp:-cmp;
  });
}

function EditCell({value, onSave, numeric, display, color}) {
  const [ed,setEd]=useState(false);
  const [v,setV]=useState(value);
  const ref=useRef();
  useEffect(()=>{ setV(value); },[value]);
  useEffect(()=>{ if(ed&&ref.current) ref.current.focus(); },[ed]);

    <input ref={ref} value={v} type={numeric?"number":"text"}
      onChange={e=>setV(e.target.value)}

/* ──────────────────────────────────────────────
   CASH FLOW SVG CHART — giorno per giorno
────────────────────────────────────────────── */
function CashChart({assegni}) {
  const [hoverIdx, setHoverIdx] = React.useState(null);
  const [mousePos, setMousePos] = React.useState({x:0, y:0});
  const svgRef = React.useRef(null);

  const parseDateKey = v => {
    if(!v) return null;
    const s = String(v).trim();
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso) return s.slice(0,10);
    const it = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(it) return `${it[3]}-${it[2].padStart(2,"0")}-${it[1].padStart(2,"0")}`;
    return null;
  };

  const todayKey = new Date().toISOString().slice(0,10);
  const cutoffDate = new Date(); cutoffDate.setDate(cutoffDate.getDate()+45);
  const cutoffKey = cutoffDate.toISOString().slice(0,10);

  // Raggruppa SOLO assegni IN ARCHIVIO per data titolo esatta
  const byDay = {};
  (assegni||[]).forEach(a => {
    if(!(a["STATO TITOLO"]||"").toUpperCase().includes("ARCHIVIO")) return;
    const k = parseDateKey(a["DATA TITOLO"]);
    if(!k || k < todayKey || k > cutoffKey) return;
    if(!byDay[k]) byDay[k] = {total:0, items:[]};
    byDay[k].total += parseNum(a["IMPORTO TITOLO"]);
    byDay[k].items.push(a);
  });

  const entries = Object.entries(byDay).sort(([a],[b])=>a.localeCompare(b));

  if(!entries.length) return (
    <div style={{color:"#475569",textAlign:"center",padding:40,fontSize:12}}>
      Nessun assegno IN ARCHIVIO nei prossimi 45 giorni
    </div>
  );

  // Dimensioni SVG
  const W = 800, H = 240, P = {t:32, r:24, b:48, l:76};
  const iW = W - P.l - P.r, iH = H - P.t - P.b;
  const n = entries.length;
  const gap = iW / n;
  const barW = Math.max(6, Math.min(36, gap * 0.72));
  const xOf = i => P.l + i * gap + gap / 2;
  const maxVal = Math.max(...entries.map(([,v]) => v.total), 1);

  // griglia Y — 5 linee pulite
  const gridVals = [0, 0.25, 0.5, 0.75, 1].map(r => ({
    r, y: P.t + iH * r, val: maxVal * (1 - r)
  }));

  const fmtDay  = k => `${k.slice(8,10)}/${k.slice(5,7)}`;
  const fmtFull = k => {
    const d = new Date(k + "T00:00:00");
    return d.toLocaleDateString("it-IT",{weekday:"short",day:"2-digit",month:"short"});
  };

  // Ogni quante label mostrare sull'asse X (max ~10 visibili)
  const labelStep = Math.max(1, Math.ceil(n / 10));

  const handleMouseMove = (e) => {
    if(!svgRef.current) return;
    const rect = svgRef.current.getBoundingClientRect();
    const scaleX = W / rect.width;
    const mx = (e.clientX - rect.left) * scaleX;
    // Trova barra più vicina
    let closest = null, minDist = Infinity;
    entries.forEach(([,], i) => {
      const dist = Math.abs(mx - xOf(i));
      if(dist < minDist && dist < gap/2) { minDist = dist; closest = i; }
    });
    setHoverIdx(closest);
    setMousePos({x: e.clientX - rect.left, y: e.clientY - rect.top});
  };

  return (
    <div style={{position:"relative", userSelect:"none"}}>
      <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`}
        style={{overflow:"visible", cursor:"crosshair"}}
        onMouseMove={handleMouseMove}
        onMouseLeave={()=>setHoverIdx(null)}>
        <defs>
          <linearGradient id="bG"  x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor="#22c55e" stopOpacity="0.95"/>
            <stop offset="100%" stopColor="#14532d" stopOpacity="0.7"/>
          </linearGradient>
          <linearGradient id="bGh" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%"   stopColor="#4ade80"/>
            <stop offset="100%" stopColor="#16a34a"/>
          </linearGradient>
          <filter id="glow">
            <feGaussianBlur stdDeviation="2" result="blur"/>
            <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
          </filter>
        </defs>

        {/* Griglia */}
        {gridVals.map(({r, y, val}) => (
          <g key={r}>
            <line x1={P.l} x2={W-P.r} y1={y} y2={y}
              stroke="#1e293b" strokeWidth={r===1?1.5:1} strokeDasharray={r===1?"":"3,4"}/>
            <text x={P.l-8} y={y+4} textAnchor="end" fill="#475569" fontSize={9}
              fontFamily="IBM Plex Mono,monospace">
              {val>=1000 ? `${(val/1000).toFixed(1)}k` : Math.round(val)}
            </text>
          </g>
        ))}

        {/* Barre */}
        {entries.map(([k,v], i) => {
          const h = Math.max(3, (v.total / maxVal) * iH);
          const x = xOf(i) - barW/2;
          const y = P.t + iH - h;
          const isHov = hoverIdx === i;
          const isToday = k === todayKey;
          const nA = v.items.length;

          return (
            <g key={k}>
              {/* colonna hover sfondo */}
              {isHov && <rect x={x - gap*0.15} y={P.t} width={barW + gap*0.3} height={iH}
                rx={3} fill="#22c55e" opacity={0.07}/>}

              {/* barra */}
              <rect x={x} y={y} width={barW} height={h} rx={3}
                fill={isHov ? "url(#bGh)" : "url(#bG)"}
                filter={isHov ? "url(#glow)" : ""}
                opacity={isHov ? 1 : 0.8}/>

              {/* pallino multi-assegno */}
              {nA > 1 && (
                <g>
                  <circle cx={x+barW/2} cy={y-8} r={7} fill="#1e3a5f" stroke="#38bdf8" strokeWidth={1}/>
                  <text x={x+barW/2} y={y-4} textAnchor="middle" fill="#38bdf8"
                    fontSize={7} fontFamily="IBM Plex Mono,monospace" fontWeight="bold">
                    {nA}
                  </text>
                </g>
              )}

              {/* linea oggi */}
              {isToday && <line x1={x+barW/2} x2={x+barW/2} y1={P.t} y2={P.t+iH}
                stroke="#818cf8" strokeWidth={1} strokeDasharray="3,3" opacity={0.5}/>}

              {/* label asse X */}
              {(i % labelStep === 0 || n <= 15) && (
                <text x={x+barW/2} y={H-P.b+15} textAnchor="middle"
                  fill={isToday ? "#818cf8" : isHov ? "#94a3b8" : "#475569"}
                  fontSize={8} fontFamily="IBM Plex Mono,monospace"
                  fontWeight={isToday||isHov ? "bold" : "normal"}>
                  {fmtDay(k)}
                </text>
              )}
            </g>
          );
        })}

        {/* Asse Y */}
        <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+iH} stroke="#1e293b" strokeWidth={1}/>
      </svg>

      {/* ── TOOLTIP DETTAGLIATO ── */}
      {hoverIdx !== null && (() => {
        const [k, v] = entries[hoverIdx];
        const svgEl = svgRef.current;
        if(!svgEl) return null;
        const rect = svgEl.getBoundingClientRect();
        const pct = (xOf(hoverIdx) / W);
        // flip verso sinistra se troppo vicino al bordo destro
        const flipLeft = pct > 0.58;
        const tooltipW = 260;

        return (
          <div style={{
            position:"absolute",
            top: Math.max(0, mousePos.y - 16),
            left: flipLeft
              ? `calc(${pct*100}% - ${tooltipW+12}px)`
              : `calc(${pct*100}% + 12px)`,
            width: tooltipW,
            background:"#050d1a",
            border:"1px solid #22c55e55",
            borderRadius:12,
            zIndex:200,
            pointerEvents:"none",
            boxShadow:"0 12px 40px #00000099, 0 0 0 1px #22c55e22",
            overflow:"hidden",
          }}>
            {/* Header */}
            <div style={{
              background:"linear-gradient(135deg,#0a2218,#071810)",
              padding:"10px 14px",
              borderBottom:"1px solid #1e293b"
            }}>
              <div style={{color:"#4ade80",fontWeight:800,fontSize:13,
                fontFamily:"'IBM Plex Mono',monospace"}}>
                📅 {fmtFull(k)}
              </div>
              <div style={{display:"flex",justifyContent:"space-between",
                alignItems:"center",marginTop:4}}>
                <span style={{color:"#64748b",fontSize:10}}>
                  {v.items.length} assegn{v.items.length===1?"o":"i"}
                </span>
                <span style={{color:"#4ade80",fontWeight:800,fontSize:14,
                  fontFamily:"'IBM Plex Mono',monospace"}}>
                  {eur(v.total)}
                </span>
              </div>
            </div>

            {/* Lista assegni scrollabile */}
            <div style={{
              maxHeight: 220,
              overflowY:"auto",
              padding:"6px 0",
              scrollbarWidth:"thin",
              scrollbarColor:"#1e293b transparent"
            }}>
              {v.items.map((a, j) => (
                <div key={j} style={{
                  padding:"7px 14px",
                  borderBottom: j < v.items.length-1 ? "1px solid #0f172a" : "none",
                  background: j%2===0 ? "transparent" : "#050d1a"
                }}>
                  {/* Cliente */}
                  <div style={{color:"#e2e8f0",fontSize:11,fontWeight:700,
                    overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",
                    marginBottom:3}}>
                    {a["CLIENTE"]||"—"}
                  </div>
                  {/* Riga importo + n.titolo */}
                  <div style={{display:"flex",justifyContent:"space-between",
                    alignItems:"center"}}>
                    <span style={{color:"#38bdf8",fontSize:10,
                      fontFamily:"'IBM Plex Mono',monospace"}}>
                      {a["N TITOLO"]||"—"}
                    </span>
                    <span style={{color:"#4ade80",fontSize:12,fontWeight:800,
                      fontFamily:"'IBM Plex Mono',monospace"}}>
                      {eur(a["IMPORTO TITOLO"])}
                    </span>
                  </div>
                  {/* Fatture / NC */}
                  {(a["FATTURE PAGATE"]||a["NC SCALATE"]) && (
                    <div style={{marginTop:3,display:"flex",gap:8,flexWrap:"wrap"}}>
                      {a["FATTURE PAGATE"]&&<span style={{color:"#64748b",fontSize:9}}>
                        Fatt: {fmtDocList(a["FATTURE PAGATE"])}
                      </span>}
                      {a["NC SCALATE"]&&<span style={{color:"#c084fc",fontSize:9}}>
                        NC: {fmtDocList(a["NC SCALATE"])}
                      </span>}
                    </div>
                  )}
                </div>
              ))}
            </div>
          </div>
        );
      })()}

      {/* Footer */}
      <div style={{display:"flex",gap:20,justifyContent:"center",
        marginTop:8,fontSize:11,color:"#475569",flexWrap:"wrap"}}>
        <span><span style={{color:"#22c55e"}}>■</span> Assegni IN ARCHIVIO — prossimi 45 gg</span>
        <span>Totale: <strong style={{color:"#4ade80"}}>
          {eur(entries.reduce((s,[,v])=>s+v.total,0))}
        </strong></span>
        <span>{entries.reduce((s,[,v])=>s+v.items.length,0)} assegni · {entries.length} date</span>
      </div>
    </div>
  );
}


function PayModal({docs,onSave,onClose,user,onLogout}) {
  // ── STEP: 1=tipo+cliente, 2=partitario+abbina, 3=conferma
  const [step,setStep]=useState(1);
  const [tipo,setTipo]=useState(""); // "assegno" | "bonifico"
  const [clientSearch,setClientSearch]=useState("");
  const [cid,setCid]=useState("");
  const [clientName,setClientName]=useState("");
  const [showDropdown,setShowDropdown]=useState(false);

  // Dati assegno
  const [nAssegno,setNAssegno]=useState("");
  const [dataTitolo,setDataTitolo]=useState(""); // data scritta sul titolo
  const [dataIncasso,setDataIncasso]=useState(""); // primo giorno lavorativo >= dataTitolo

  // Dati bonifico
  const [dataBonifico,setDataBonifico]=useState(new Date().toISOString().slice(0,10));

  // Abbinamento fatture
  const [rows,setRows]=useState([]); // [{doc, checked, importoAllocato}]
  const [saving,setSaving]=useState(false);

  // ── Helpers
  const primoGiornoLavorativo = isoDate => {
    if(!isoDate) return "";
    const d = new Date(isoDate);
    // 0=Dom, 6=Sab
    while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  };

  const fmtIso = iso => {
    if(!iso) return "";
    const [y,m,g] = iso.split("-");
    return `${g}/${m}/${y}`;
  };

  const parseIso = ddmmyyyy => {
    if(!ddmmyyyy) return "";
    const p = ddmmyyyy.split("/");
    if(p.length===3) return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
    return ddmmyyyy;
  };

  const dayName = iso => {
    if(!iso) return "";
    return ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(iso).getDay()];
  };

  // Clienti unici (documenti aperti)
  const allClients = [];
  const seen = new Set();
  docs.filter(d=>d[COL.stato]?.toUpperCase()==="APERTO").forEach(d=>{
    const k = d[COL.codiceCliente];
    if(!seen.has(k)){ seen.add(k); allClients.push({id:k,name:d[COL.ragioneSociale]}); }
  });
  const filteredClients = clientSearch.length>1
    ? allClients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase())||c.id.includes(clientSearch))
    : allClients;

  const selectClient = (id,name) => {
    setCid(id); setClientName(name); setClientSearch(name); setShowDropdown(false);
    // Carica partitario: FVE FIFO + NAC in fondo
    const fves = docs.filter(d=>d[COL.codiceCliente]===id&&d[COL.stato]?.toUpperCase()==="APERTO"&&d[COL.tipoDocumento]==="FVE")
      .sort((a,b)=>new Date(parseIso(a[COL.dataDocumento]))-new Date(parseIso(b[COL.dataDocumento])));
    const nacs = docs.filter(d=>d[COL.codiceCliente]===id&&d[COL.stato]?.toUpperCase()==="APERTO"&&d[COL.tipoDocumento]==="NAC");
    setRows([...fves,...nacs].map(doc=>({doc,checked:false,importoAllocato:parseNum(doc[COL.saldoResiduo])})));
  };

  // Totali calcolati
  const fveSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE");
  const nacSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="NAC");
  const totFve = fveSel.reduce((s,r)=>s+r.importoAllocato,0);
  const totNac = nacSel.reduce((s,r)=>s+Math.abs(r.importoAllocato),0);
  const netto = totFve - totNac;

  const toggleRow = i => setRows(p=>{
    const r=[...p]; r[i]={...r[i],checked:!r[i].checked}; return r;
  });
  const setAlloc = (i,val) => setRows(p=>{
    const r=[...p];
    const max = Math.abs(parseNum(r[i].doc[COL.saldoResiduo]));
    r[i]={...r[i],importoAllocato:Math.min(Math.max(0,parseNum(val)),max),checked:true};
    return r;
  });

  // Data incasso effettivo
  const dataEff = tipo==="assegno" ? dataIncasso : dataBonifico;

  // ── SAVE
  const save = async () => {
    if(saving) return;
    const selected = rows.filter(r=>r.checked&&r.importoAllocato>0);
    if(!selected.length) return;
    setSaving(true);

    const nacNums = nacSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const fveNums = fveSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const noteBase = tipo==="assegno"
      ? `DA INCASSARE ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}`
      : `DA INCASSARE BONIF ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}`;

    const pred = {
      full: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))<0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      partial: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))>=0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacs: nacSel.map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacTotal: totNac,
      net: netto,
      residual:0,
      exact:[],
    };

    await onSave({
      method: tipo==="assegno"?"ASSEGNO":"BONIFICO",
      amount: netto,
      cid, date: dataEff, notes: noteBase,
      nAssegno: tipo==="assegno"?nAssegno:"",
      dataTitolo: tipo==="assegno"?dataTitolo:"",
      fveNums, nacNums,
      pred,
    });
    setSaving(false);
    onClose();
  };

  // ── STYLES locali
  const inp = {background:"#070c18",border:"1px solid #1e293b",borderRadius:8,
    padding:"9px 12px",color:"#f1f5f9",fontSize:13,fontFamily:"'IBM Plex Mono',monospace",
    width:"100%",outline:"none"};
  const card = (active,accent="#6366f1") => ({
    border:`2px solid ${active?accent:"#1e293b"}`,borderRadius:12,padding:"18px 20px",
    cursor:"pointer",background:active?`${accent}11`:"#070c18",
    transition:"all .15s",textAlign:"center",flex:1,
  });

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",animation:"fadeIn .2s"}}>
      <div style={{background:"#0f172a",border:"1px solid #1e293b",borderRadius:16,
        width:700,maxHeight:"94vh",overflowY:"auto",
        boxShadow:"0 24px 80px rgba(0,0,0,.9)",fontFamily:"'IBM Plex Mono',monospace"}}>

        {/* ── HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"18px 24px",borderBottom:"1px solid #1e293b",position:"sticky",top:0,
          background:"#0f172a",zIndex:10}}>
          <div>
            <div style={{color:"#f1f5f9",fontSize:15,fontWeight:700}}>⟁ Registra Incasso</div>
            <div style={{display:"flex",gap:16,marginTop:6}}>
              {["Tipo & Cliente","Abbina Documenti","Conferma"].map((lbl,i)=>(
                <span key={i} style={{fontSize:10,color:step===i+1?"#6366f1":"#334155",
                  fontWeight:step===i+1?700:400}}>
                  {step===i+1?"● ":""}{i+1}. {lbl}
                </span>
              ))}
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:"#475569",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        <div style={{padding:"24px"}}>

        {/* ══ STEP 1 — Tipo pagamento + Cliente ══ */}
        {step===1&&(
          <>
            {/* Tipo */}
            <div style={{marginBottom:24}}>
              <div style={{color:"#64748b",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                TIPO PAGAMENTO
              </div>
              <div style={{display:"flex",gap:12}}>
                <div style={card(tipo==="assegno","#6366f1")} onClick={()=>setTipo("assegno")}>
                  <div style={{fontSize:28,marginBottom:6}}>🏷️</div>
                  <div style={{color:tipo==="assegno"?"#a5b4fc":"#94a3b8",fontWeight:700,fontSize:13}}>Assegno</div>
                  <div style={{color:"#475569",fontSize:10,marginTop:4}}>Titolo fisico</div>
                </div>
                <div style={card(tipo==="bonifico","#0ea5e9")} onClick={()=>setTipo("bonifico")}>
                  <div style={{fontSize:28,marginBottom:6}}>🏦</div>
                  <div style={{color:tipo==="bonifico"?"#7dd3fc":"#94a3b8",fontWeight:700,fontSize:13}}>Bonifico</div>
                  <div style={{color:"#475569",fontSize:10,marginTop:4}}>Trasferimento bancario</div>
                </div>
              </div>
            </div>

            {/* Dati specifici per tipo */}
            {tipo==="assegno"&&(
              <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI ASSEGNO
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:12}}>
                  <div>
                    <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                      Numero Assegno
                    </label>
                    <input value={nAssegno} onChange={e=>setNAssegno(e.target.value)}
                      placeholder="AB - XXXXX" style={inp}/>
                  </div>
                  <div>
                    <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                      Data sul Titolo
                    </label>
                    <input type="date" value={dataTitolo}
                      onChange={e=>{
                        setDataTitolo(e.target.value);
                        setDataIncasso(primoGiornoLavorativo(e.target.value));
                      }}
                      style={inp}/>
                  </div>
                </div>
                {dataTitolo&&(
                  <div style={{marginTop:12,background:"#0a0f1e",borderRadius:8,padding:"10px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data sul titolo</div>
                        <div style={{color:"#94a3b8",fontSize:12}}>
                          {fmtIso(dataTitolo)} — <span style={{color:["Sab","Dom"].includes(dayName(dataTitolo))?"#fb923c":"#64748b"}}>
                            {dayName(dataTitolo)}
                          </span>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"#475569",fontSize:10,marginBottom:3}}>Data incasso previsto</div>
                        <div style={{color:"#4ade80",fontSize:13,fontWeight:700}}>
                          {fmtIso(dataIncasso)} — {dayName(dataIncasso)}
                        </div>
                        {dataTitolo!==dataIncasso&&(
                          <div style={{color:"#fb923c",fontSize:10,marginTop:2}}>
                            ↑ spostato (weekend)
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{marginTop:10}}>
                      <label style={{color:"#475569",fontSize:10,display:"block",marginBottom:4}}>
                        Correggi data incasso (se necessario)
                      </label>
                      <input type="date" value={dataIncasso}
                        onChange={e=>setDataIncasso(e.target.value)} style={{...inp,fontSize:12}}/>
                    </div>
                  </div>
                )}
              </div>
            )}

            {tipo==="bonifico"&&(
              <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI BONIFICO
                </div>
                <div>
                  <label style={{color:"#475569",fontSize:11,display:"block",marginBottom:5}}>
                    Data contabile bonifico
                  </label>
                  <input type="date" value={dataBonifico}
                    onChange={e=>setDataBonifico(e.target.value)} style={inp}/>
                </div>
              </div>
            )}

            {/* Selezione cliente */}
            {tipo&&(
              <div style={{marginBottom:20}}>
                <div style={{color:"#64748b",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                  CLIENTE
                </div>
                <div style={{position:"relative"}}>
                  <input value={clientSearch}
                    onChange={e=>{setClientSearch(e.target.value);setShowDropdown(true);setCid("");}}
                    onFocus={()=>setShowDropdown(true)}
                    placeholder="🔍 Cerca per nome o codice..."
                    style={inp}/>
                  {showDropdown&&filteredClients.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,
                      background:"#0f172a",border:"1px solid #1e293b",borderRadius:8,
                      maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px #000a"}}>
                      {filteredClients.slice(0,10).map(c=>(
                        <div key={c.id} onClick={()=>selectClient(c.id,c.name)}
                          style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid #0f172a"}}
                          className="row-hover">
                          <div style={{color:"#f1f5f9",fontSize:12}}>{c.name}</div>
                          <div style={{color:"#475569",fontSize:10}}>cod. {c.id}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {cid&&(
                  <div style={{marginTop:10,background:"#0a1628",border:"1px solid #1e3a5f",
                    borderRadius:8,padding:"10px 14px",fontSize:12,color:"#60a5fa"}}>
                    ✓ <strong>{clientName}</strong> — {rows.filter(r=>r.doc[COL.tipoDocumento]==="FVE").length} FVE aperte,{" "}
                    {rows.filter(r=>r.doc[COL.tipoDocumento]==="NAC").length} NAC disponibili
                  </div>
                )}
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={onClose} style={{background:"#1e293b",border:"none",borderRadius:8,
                padding:"10px 20px",color:"#94a3b8",cursor:"pointer",fontSize:13}}>Annulla</button>
              <button
                disabled={!tipo||!cid||(tipo==="assegno"&&!dataIncasso)||(tipo==="bonifico"&&!dataBonifico)}
                onClick={()=>setStep(2)}
                style={{background:tipo&&cid?"linear-gradient(135deg,#4f46e5,#7c3aed)":"#1e293b",
                  border:"none",borderRadius:8,padding:"10px 24px",
                  color:tipo&&cid?"#fff":"#475569",cursor:tipo&&cid?"pointer":"not-allowed",
                  fontSize:13,fontWeight:700}}>
                Avanti → Abbina Documenti
              </button>
            </div>
          </>
        )}

        {/* ══ STEP 2 — Partitario cliente + Abbinamento ══ */}
        {step===2&&(
          <>
            {/* Riepilogo testata */}
            <div style={{background:"#070c18",border:"1px solid #1e293b",borderRadius:10,
              padding:"12px 16px",marginBottom:18,display:"flex",gap:20,flexWrap:"wrap"}}>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Cliente</div>
                <div style={{color:"#f1f5f9",fontSize:13,fontWeight:700}}>{clientName}</div>
              </div>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Tipo</div>
                <div style={{color:"#a5b4fc",fontSize:13,fontWeight:700}}>
                  {tipo==="assegno"?`🏷️ Assegno ${nAssegno}`:"🏦 Bonifico"}
                </div>
              </div>
              <div>
                <div style={{color:"#475569",fontSize:10}}>Data incasso previsto</div>
                <div style={{color:"#4ade80",fontSize:13,fontWeight:700}}>{fmtIso(dataEff)}</div>
              </div>
            </div>

            {/* Contatori live */}
            <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:10,marginBottom:18}}>
              {[
                {lbl:"FVE selezionate",val:eur(totFve),c:"#4ade80"},
                {lbl:"NAC scalate",val:eur(totNac),c:"#c084fc"},
                {lbl:"Netto da incassare",val:eur(netto),c:"#38bdf8"},
              ].map(({lbl,val,c})=>(
                <div key={lbl} style={{background:"#070c18",border:"1px solid #1e293b",
                  borderRadius:8,padding:"10px 14px",textAlign:"center"}}>
                  <div style={{color:"#475569",fontSize:10,marginBottom:4}}>{lbl}</div>
                  <div style={{color:c,fontSize:15,fontWeight:700}}>{val}</div>
                </div>
              ))}
            </div>

            {/* Tabella partitario */}
            <div style={{border:"1px solid #1e293b",borderRadius:10,overflow:"hidden",marginBottom:20}}>
              <div style={{padding:"10px 14px",background:"#070c18",borderBottom:"1px solid #1e293b",
                display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"#94a3b8",fontSize:11,fontWeight:700}}>◈ PARTITARIO APERTO</span>
                <span style={{color:"#475569",fontSize:10}}>
                  FVE = verde • NAC = viola (scalano dal netto)

/* ──────────────────────────────────────────────
   IMPORT EXCEL DAL GESTIONALE
────────────────────────────────────────────── */
function MigrazioneTab({docs, authed, notify, onComplete}) {
  const [phase, setPhase] = React.useState("idle"); // idle | preview | importing | done
  const [parsed, setParsed] = React.useState(null); // {nuovi, duplicati, fve, nac}
  const [log, setLog] = React.useState([]);
  const fileRef = React.useRef();

  const addLog = msg => setLog(p => [...p, msg]);

  // Formatta data Excel (numero seriale o Date JS) → "YYYY-MM-DD"
  const excelDateToISO = val => {
    if (!val) return null;
    if (val instanceof Date) {
      return val.toISOString().slice(0,10);
    }
    if (typeof val === "number") {
      // Numero seriale Excel
      const d = new Date((val - 25569) * 86400 * 1000);
      return d.toISOString().slice(0,10);
    }
    if (typeof val === "string" && val.match(/^\d{4}-\d{2}-\d{2}/)) return val.slice(0,10);
    return String(val);
  };

  const handleFile = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    setPhase("idle"); setParsed(null); setLog([]);

    try {
      // Legge il file come ArrayBuffer
      const buf = await file.arrayBuffer();
      const XLSX = window.XLSX;
      const wb = XLSX.read(buf, { type: "array", cellDates: true });
      const ws = wb.Sheets[wb.SheetNames[0]];
      const rows = XLSX.utils.sheet_to_json(ws, { header: 1, defval: null });

      if (rows.length < 2) { notify("File vuoto o non valido","error"); return; }

      // Colonne: A=0 Data, D=3 Tipo, F=5 Num.Doc, I=8 CodPV, J=9 Cliente, N=13 Tot.lordo
      const righe = rows.slice(1).filter(r => r[3] === "FVE" || r[3] === "NAC");

      if (righe.length === 0) { notify("Nessuna riga FVE/NAC trovata","error"); return; }

      // Costruisce set dei documenti già presenti per deduplicazione
      // Chiave: numero_documento + "|" + tipo_documento + "|" + data_documento
      const esistenti = new Set(
        docs.map(d => `${d[COL.numeroDocumento]}|${d[COL.tipoDocumento]}|${d[COL.dataDocumento]}`)
      );

      const nuovi = [], duplicati = [];

      righe.forEach(r => {
        const tipo      = r[3];  // D
        const numDoc    = String(r[5] || "").trim();  // F
        const data      = excelDateToISO(r[0]);       // A
        const codCliente= String(r[8] || "").trim();  // I
        const cliente   = String(r[9] || "").trim();  // J
        let importo     = parseFloat(r[13]) || 0;    // N

        // NAC → importo negativo
        if (tipo === "NAC" && importo > 0) importo = -importo;

        const chiave = `${numDoc}|${tipo}|${data}`;

        const doc = {
          numero_documento: numDoc,
          tipo_documento: tipo,
          data_documento: data,
          codice_cliente: codCliente,
          ragione_sociale: cliente,
          importo_totale: importo,
          saldo_residuo: importo,
          stato: "APERTO",
        };

        if (esistenti.has(chiave)) {
          duplicati.push(doc);
        } else {
          nuovi.push(doc);
          esistenti.add(chiave); // evita duplicati interni al file stesso
        }
      });

      const fve = nuovi.filter(d => d.tipo_documento === "FVE");
      const nac = nuovi.filter(d => d.tipo_documento === "NAC");

      setParsed({ nuovi, duplicati, fve, nac });
      addLog(`📂 File letto: ${righe.length} righe totali`);
      addLog(`✅ Nuovi da importare: ${nuovi.length} (${fve.length} FVE, ${nac.length} NAC)`);
      addLog(`⏭ Già presenti (saltati): ${duplicati.length}`);
      setPhase("preview");
    } catch(err) {
      notify("Errore lettura file: " + err.message, "error");
      addLog("❌ " + err.message);
    }
  };

  const handleImport = async () => {
    if (!parsed?.nuovi?.length) { notify("Nessun documento nuovo da importare","error"); return; }
    setPhase("importing");
    addLog("Avvio importazione...");
    try {
      const BATCH = 50;
      let tot = 0;
      for (let i = 0; i < parsed.nuovi.length; i += BATCH) {
        const batch = parsed.nuovi.slice(i, i + BATCH);
        const res = await d1API.migrate("documenti", batch);
        tot += res.inserted || 0;
        addLog(`Inseriti ${tot}/${parsed.nuovi.length}...`);
      }
      addLog(`✅ Importazione completata! ${tot} documenti aggiunti.`);
      setPhase("done");
      setTimeout(() => { onComplete(); notify(`${tot} documenti importati ✓`, "success"); }, 800);
    } catch(err) {
      addLog("❌ Errore: " + err.message);
      notify("Errore: " + err.message, "error");
      setPhase("preview");
    }
  };

  const reset = () => { setParsed(null); setLog([]); setPhase("idle"); if(fileRef.current) fileRef.current.value=""; };

  return (
    <div style={{maxWidth:700,margin:"0 auto"}}>
      <h2 style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:20,marginBottom:4}}>
        ⬆ Importa da Excel
      </h2>
      <p style={{color:"#64748b",fontSize:12,marginBottom:24}}>
        Carica il file Excel esportato dal gestionale. Vengono letti solo i documenti FVE e NAC,
        scartando automaticamente i duplicati già presenti.
      </p>

      {/* Drop area file */}
      <div style={{border:"2px dashed #1e293b",borderRadius:12,padding:"32px",textAlign:"center",
        marginBottom:20,background:"#0a0f1e",cursor:"pointer"}}
        onClick={()=>fileRef.current?.click()}>
        <div style={{fontSize:32,marginBottom:8}}>📊</div>
        <div style={{color:"#94a3b8",fontSize:13}}>Clicca per selezionare il file <strong style={{color:"#f1f5f9"}}>.xlsx</strong></div>
        <div style={{color:"#475569",fontSize:11,marginTop:4}}>Colonne usate: A (data), D (tipo), F (num.doc), I (cod.cliente), J (cliente), N (importo)</div>
        <input ref={fileRef} type="file" accept=".xlsx,.xls" onChange={handleFile}
          style={{display:"none"}} />
      </div>

      {/* Preview risultato parsing */}
      {parsed && (
        <div style={{marginBottom:20}}>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:10,marginBottom:16}}>
            {[
              {label:"Nuovi totali", val:parsed.nuovi.length, color:"#4ade80"},
              {label:"FVE nuove",    val:parsed.fve.length,   color:"#60a5fa"},
              {label:"NAC nuove",    val:parsed.nac.length,   color:"#f59e0b"},
              {label:"Duplicati",    val:parsed.duplicati.length, color:"#475569"},
            ].map(({label,val,color})=>(
              <div key={label} style={{background:"#0a0f1e",border:"1px solid #1e293b",
                borderRadius:8,padding:"12px",textAlign:"center"}}>
                <div style={{color,fontSize:22,fontWeight:800}}>{val}</div>
                <div style={{color:"#64748b",fontSize:10,marginTop:2}}>{label}</div>
              </div>
            ))}
          </div>

          {/* Anteprima prime righe nuove */}
          {parsed.nuovi.length > 0 && (
            <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:8,
              overflow:"auto",marginBottom:16,maxHeight:180}}>
              <table style={{width:"100%",borderCollapse:"collapse",fontSize:11}}>
                <thead>
                  <tr style={{background:"#0f172a"}}>
                    {["Tipo","N.Doc","Data","Cliente","Importo"].map(h=>(
                      <th key={h} style={{padding:"6px 10px",color:"#64748b",fontWeight:600,textAlign:"left"}}>{h}</th>
                    ))}
                  </tr>
                </thead>
                <tbody>
                  {parsed.nuovi.slice(0,8).map((d,i)=>(
                    <tr key={i} style={{borderTop:"1px solid #1e293b"}}>
                      <td style={{padding:"5px 10px"}}>
                        <span style={{background:d.tipo_documento==="FVE"?"#1e3a5f":"#3a1f0a",
                          color:d.tipo_documento==="FVE"?"#60a5fa":"#f59e0b",
                          padding:"1px 6px",borderRadius:4,fontSize:10}}>{d.tipo_documento}</span>
                      </td>
                      <td style={{padding:"5px 10px",color:"#f1f5f9"}}>{d.numero_documento}</td>
                      <td style={{padding:"5px 10px",color:"#94a3b8"}}>{d.data_documento}</td>
                      <td style={{padding:"5px 10px",color:"#f1f5f9",maxWidth:160,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{d.ragione_sociale}</td>
                      <td style={{padding:"5px 10px",color:d.importo_totale<0?"#f87171":"#4ade80",fontFamily:"'IBM Plex Mono',monospace"}}>
                        {new Intl.NumberFormat("it-IT",{style:"currency",currency:"EUR"}).format(d.importo_totale)}
                      </td>
                    </tr>
                  ))}
                  {parsed.nuovi.length > 8 && (
                    <tr><td colSpan={5} style={{padding:"6px 10px",color:"#475569",fontSize:10}}>
                      ... e altri {parsed.nuovi.length - 8} documenti
                    </td></tr>
                  )}
                </tbody>
              </table>
            </div>
          )}
        </div>
      )}

      {/* Bottoni azione */}
      <div style={{display:"flex",gap:10}}>
        {phase === "preview" && parsed?.nuovi?.length > 0 && (
          <button onClick={handleImport}
            style={{background:"linear-gradient(135deg,#059669,#10b981)",color:"#fff",
              border:"none",borderRadius:10,padding:"12px 28px",fontWeight:700,
              fontSize:13,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            ⬆ Importa {parsed.nuovi.length} documenti
          </button>
        )}
        {phase === "preview" && parsed?.nuovi?.length === 0 && (
          <div style={{color:"#f59e0b",fontSize:13,padding:"12px 0"}}>
            ✓ Tutti i documenti del file sono già presenti nel database.
          </div>
        )}
        {phase === "importing" && (
          <button disabled style={{background:"#1e293b",color:"#475569",border:"none",
            borderRadius:10,padding:"12px 28px",fontWeight:700,fontSize:13,fontFamily:"'Syne',sans-serif"}}>
            Importazione in corso...
          </button>
        )}
        {phase === "done" && (
          <button onClick={reset}
            style={{background:"#1e293b",color:"#94a3b8",border:"none",borderRadius:10,
              padding:"12px 28px",fontWeight:700,fontSize:13,cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            ↺ Importa un altro file
          </button>
        )}
        {(phase === "preview" || phase === "done") && (
          <button onClick={reset}
            style={{background:"transparent",color:"#475569",border:"1px solid #1e293b",
              borderRadius:10,padding:"12px 20px",fontWeight:600,fontSize:13,
              cursor:"pointer",fontFamily:"'Syne',sans-serif"}}>
            Annulla
          </button>
        )}
      </div>

      {/* Log */}
      {log.length > 0 && (
        <div style={{marginTop:20,background:"#070c18",border:"1px solid #1e293b",
          borderRadius:8,padding:12,maxHeight:150,overflow:"auto"}}>
          {log.map((l,i)=><div key={i} style={{fontSize:11,color:"#94a3b8",marginBottom:3}}>{l}</div>)}
        </div>
      )}
    </div>
  );
}

  /* ── RICONCILIAZIONE BANCARIA ── */
  const parseBankFile = async (file) => {
    const buf = await file.arrayBuffer();
    const wb = window.XLSX.read(buf, { type: "array", cellDates: true, cellNF: true });
    const ws = wb.Sheets[wb.SheetNames[0]];
    const rows = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: false });
    if (rows.length < 1) throw new Error("File vuoto");

    // Debug
    console.log("=== BANK FILE DEBUG ===");
    console.log("Fogli:", wb.SheetNames, "| Righe:", rows.length);
    // Rileggi raw:true per avere i numeri veri (raw:false li converte in stringhe formattate)
    const rowsRaw = window.XLSX.utils.sheet_to_json(ws, { header: 1, defval: null, raw: true });

    console.log("=== BANK FILE DEBUG ===");
    console.log("Fogli:", wb.SheetNames, "| Righe:", rowsRaw.length);
    rowsRaw.slice(0, 12).forEach((r, i) => console.log(`R${i}:`, JSON.stringify(r)));

    // ── Converti data: stringa "09.03.2026", "09/03/2026", seriale Excel, Date JS ──
    const toDateStr = v => {
      if (v == null) return null;
      if (v instanceof Date && !isNaN(v)) return v.toISOString().slice(0,10);
      // Seriale Excel (numero > 40000 = post 2009)
      if (typeof v === "number" && v > 40000 && v < 100000) {
        const d = new Date(Date.UTC(1899,11,30) + Math.round(v)*86400000);
        return isNaN(d) ? null : d.toISOString().slice(0,10);
      }
      const s = String(v).trim();
      // ISO: 2026-03-09
      if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
      // IT punto: 09.03.2026
      const dot = s.match(/^(\d{1,2})\.(\d{1,2})\.(\d{4})/);
      if (dot) return `${dot[3]}-${dot[2].padStart(2,"0")}-${dot[1].padStart(2,"0")}`;
      // IT slash: 09/03/2026
      const sl = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})/);
      if (sl) return `${sl[3]}-${sl[2].padStart(2,"0")}-${sl[1].padStart(2,"0")}`;
      return null;
    };

    // ── Converti numero: gestisce 1.234,56 (IT) e 1234.56 (EN) e stringhe ──
    const toNum = v => {
      if (v == null || v === "") return null;
      if (typeof v === "number") return v;
      const s = String(v).trim().replace(/\s/g,"");
      // formato italiano: 1.234,56 o 1.234 o 1.234,00
      if (/^-?\d{1,3}(\.\d{3})*(,\d*)?$/.test(s)) return parseFloat(s.replace(/\./g,"").replace(",","."));
      // semplice con virgola: 1234,56
      if (/^-?\d+(,\d+)?$/.test(s)) return parseFloat(s.replace(",","."));
      // fallback
      const n = parseFloat(s.replace(",",".").replace(/[^\d.\-]/g,""));
      return isNaN(n) ? null : n;
    };

    // ── Trova riga intestazione: quella con più parole chiave bancarie ──
    const HDR_WORDS = ["data","avere","dare","causale","descrizione","valuta","saldo","accredito","addebito","importo","movimento","aggiunt"];
    let hdrIdx = -1, bestScore = 0;
    for (let i = 0; i < Math.min(rowsRaw.length, 20); i++) {
      if (!rowsRaw[i]) continue;
      const txt = rowsRaw[i].map(c => String(c||"").toLowerCase()).join(" ");
      const score = HDR_WORDS.filter(w => txt.includes(w)).length;
      if (score > bestScore) { bestScore = score; hdrIdx = i; }
    }
    if (hdrIdx < 0) hdrIdx = rowsRaw.findIndex(r => r && r.some(c => c != null));
    if (hdrIdx < 0) throw new Error("Intestazione non trovata nel file");

    const hdr = rowsRaw[hdrIdx].map(h => String(h||"").toLowerCase().trim());
    console.log("Header @ riga", hdrIdx, "(score "+bestScore+"):", hdr);

    const findCol = (...keys) => {
      for (const k of keys) { const i = hdr.findIndex(h => h.includes(k)); if (i>=0) return i; }
      return -1;
    };

    // Colonne formato: Data Contabile | Data Valuta | Dare | Avere | Descrizione Causale ABI/SWIFT | Descrizioni Aggiuntive
    const colDataC   = findCol("data cont","data op","data mov");
    const colDataV   = findCol("data val","valuta");
    const colDataGen = findCol("data");
    const colAvere   = findCol("avere","accredito","entrate","credito","entrata");
    const colDare    = findCol("dare","addebito","uscite","debito","uscita");
    const colImporto = findCol("importo","amount","valore","mov");
    const colCausale = findCol("causale","descrizione causale","descri");
    const colDescAdd = findCol("aggiunt","descrizioni aggiunt","note aggiunt");

    // Priorità data: Valuta > Contabile > generica
    const colData = colDataV >= 0 ? colDataV : colDataC >= 0 ? colDataC : colDataGen;

    console.log("Colonne:", {colData,colAvere,colDare,colImporto,colCausale,colDescAdd});

    const result = [];
    for (let i = hdrIdx + 1; i < rowsRaw.length; i++) {
      const row = rowsRaw[i];
      if (!row || row.every(v => v == null || v === "")) continue;

      // Data — obbligatoria
      const data = toDateStr(colData >= 0 ? row[colData] : null);
      if (!data) continue;

      // Avere: colonna dedicata oppure importo positivo
      let avere = 0;
      if (colAvere >= 0) {
        const v = toNum(row[colAvere]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0 && colImporto >= 0) {
        const v = toNum(row[colImporto]);
        if (v != null && v > 0) avere = v;
      }
      if (avere <= 0) continue; // addebito (dare > 0, avere = 0) → skip

      const dare    = colDare    >= 0 ? (toNum(row[colDare]) || 0) : 0;
      const desc    = colCausale >= 0 ? String(row[colCausale]||"").trim() : "";
      const descAdd = colDescAdd >= 0 ? String(row[colDescAdd]||"").trim() : "";

      result.push({ idx: result.length, data, avere, dare, desc, descAdd, riconciliato: false });
    }

    console.log("Accrediti trovati:", result.length, result.slice(0,2));

    if (result.length === 0) {
      const hdrStr = hdr.map((h,i) => `[${i}]${h||"vuoto"}`).join(" | ");
      throw new Error(`Nessun accredito (Avere > 0) trovato.\nColonne rilevate: ${hdrStr}`);
    }
    return result;
  };

        // Slot libero per data/pagamento
        const slots=[{dc:COL.dataAcc1,pc:COL.pagamento1},{dc:COL.dataAcc2,pc:COL.pagamento2},{dc:COL.dataAcc3,pc:COL.pagamento3},{dc:COL.dataAcc4,pc:COL.pagamento4}];

        await d1API.updateDocumento(doc._id, {

          saldo_residuo: nuovoSaldo,
          stato: nuovoStato,
          utente: authed,
        });

        dettaglio.push({
          documento_id: doc._id,
          importo: Math.abs(imp),
          tipo: doc[COL.tipoDocumento] || "FVE",
        });

        aggiornamenti.push({ docIdx, slot, nuovoSaldo, nuovoStato });
      }

      if(dettaglio.length === 0) { notify("Nessun documento valido selezionato","error"); setRecoSaving(false); return; }

      // Una sola chiamata POST /api/riconciliazioni
      await d1API.postRiconciliazione({
        data_accredito: dataAccredito,
        importo: selAccredito.avere,
        causale: selAccredito.desc || "",
        descrizione_aggiuntiva: selAccredito.descAdd || "",
        utente: authed,
        dettaglio,
      });

      // Aggiorna stato locale documenti
      setDocs(p => {
        const d = [...p];

            [slot.pc]: String(Math.abs(parseNum(Object.entries(recoSel).find(([k])=>docs[docIdx][COL.numeroDocumento]===k)?.[1]||0))),
            [COL.saldoResiduo]: String(nuovoSaldo.toFixed(2)),
            [COL.stato]: nuovoStato,
          };
        }
        return d;
      });

      // Segna accredito come riconciliato
      setBankRows(p => p.map(r => r.idx===selAccredito.idx ? {...r, riconciliato:true} : r));
      setSelAccredito(null);
      setRecoSel({});
      notify(`Riconciliazione salvata ✓ — ${dettaglio.length} documento${dettaglio.length>1?"i":""}`, "success");

                          </div>
                          {/* Riga 2: Causale ABI (codice breve) */}
                          {row.desc&&<div style={{color:"#38bdf8",fontSize:9,marginBottom:2,
                            whiteSpace:"nowrap",overflow:"hidden",textOverflow:"ellipsis",
                            fontFamily:"'IBM Plex Mono',monospace"}}>
                            {row.desc}
                          </div>}
                          {/* Riga 3: Descrizione aggiuntiva (la più utile per identificare) */}
                          {row.descAdd&&<div style={{
                            color: isSel?"#94a3b8":"#64748b",
                            fontSize:10,lineHeight:1.35,
                            display:"-webkit-box",WebkitLineClamp: isSel?5:2,
                            WebkitBoxOrient:"vertical",overflow:"hidden"}}>
                            {row.descAdd}
                          </div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              )}

              {bankRows.length===0&&(
                <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:14,
                  padding:60,textAlign:"center",color:"#334155"}}>
                  <div style={{fontSize:32,marginBottom:12}}>🏦</div>
                  <div style={{fontSize:13}}>Carica un file Excel della banca per iniziare la riconciliazione</div>
                </div>
              )}
            </div>

            {/* COLONNA DESTRA — Pannello abbinamento */}
            <div style={{position:"sticky",top:20}}>
              {selAccredito?(
                <div style={{background:"#0a0f1e",border:"1px solid #1e3a5f",borderRadius:14,padding:18}}>
                  {/* Header accredito selezionato */}
                  <div style={{background:"#0f1f35",borderRadius:10,padding:"12px 14px",marginBottom:16}}>
                    <div style={{color:"#60a5fa",fontSize:11,marginBottom:4}}>Accredito selezionato</div>
                    <div style={{color:"#4ade80",fontSize:20,fontWeight:800,
                      fontFamily:"'IBM Plex Mono',monospace"}}>+{eur(selAccredito.avere)}</div>
                    <div style={{color:"#94a3b8",fontSize:11,marginTop:4}}>📅 {selAccredito.data}</div>
                    {selAccredito.desc&&<div style={{color:"#60a5fa",fontSize:10,marginTop:4,
                      padding:"4px 8px",background:"#0a1628",borderRadius:4,
                      wordBreak:"break-word",lineHeight:1.4}}>
                      {selAccredito.desc}
                    </div>}
                    {selAccredito.descAdd&&<div style={{color:"#475569",fontSize:10,marginTop:4,
                      padding:"4px 8px",background:"#050d1a",borderRadius:4,
                      wordBreak:"break-word",lineHeight:1.4,maxHeight:80,overflowY:"auto"}}>
                      {selAccredito.descAdd}
                    </div>}
                  </div>

                  {/* Totale allocato */}
                  {Object.keys(recoSel).length>0&&(()=>{
                    const tot = Object.values(recoSel).reduce((s,v)=>s+parseNum(v),0); // NAC sono negativi
                    const diff = selAccredito.avere - tot;
                    return (
                      <div style={{background: Math.abs(diff)<0.01?"#0a1a0a":"#1a0f00",
                        border:`1px solid ${Math.abs(diff)<0.01?"#22c55e":"#fb923c"}`,
                        borderRadius:8,padding:"8px 12px",marginBottom:12,fontSize:11}}>
                        <div style={{display:"flex",justifyContent:"space-between"}}>
                          <span style={{color:"#475569"}}>Allocato:</span>
                          <span style={{color:"#f1f5f9",fontWeight:700}}>{eur(tot)}</span>
                        </div>
                        <div style={{display:"flex",justifyContent:"space-between",marginTop:3}}>
                          <span style={{color:"#475569"}}>Residuo:</span>
                          <span style={{color:Math.abs(diff)<0.01?"#22c55e":"#fb923c",fontWeight:700}}>
                            {eur(Math.abs(diff))} {Math.abs(diff)<0.01?"✓":""}
                          </span>
                        </div>
                      </div>
                    );
                  })()}

                  {/* Ricerca fatture */}
                  <input value={recoSearch} onChange={e=>setRecoSearch(e.target.value)}
                    placeholder="🔍 Cerca cliente o numero doc..."
                    style={{...S.input,marginBottom:10,fontSize:11}}/>

                  {/* Lista fatture abbinabili */}
                  <div style={{maxHeight:320,overflowY:"auto",marginBottom:12}}>
                    {(()=>{
                    const allOpen = docs.filter(d=>d[COL.stato]?.toUpperCase()==="APERTO")
                      .filter(d=>!recoSearch||
                        d[COL.ragioneSociale]?.toLowerCase().includes(recoSearch.toLowerCase())||
                        d[COL.numeroDocumento]?.includes(recoSearch));
                    const fves = allOpen.filter(d=>d[COL.tipoDocumento]==="FVE")
                      .sort((a,b)=>Math.abs(parseNum(a[COL.saldoResiduo])-selAccredito.avere)-Math.abs(parseNum(b[COL.saldoResiduo])-selAccredito.avere))
                      .slice(0,20);
                    const nacs = allOpen.filter(d=>d[COL.tipoDocumento]==="NAC");

                    const renderDocRow = (doc, prefix) => {
                      const num = doc[COL.numeroDocumento];
                      const checked = num in recoSel;
                      const saldo = parseNum(doc[COL.saldoResiduo]);
                      const isNac = doc[COL.tipoDocumento]==="NAC";
                      const match = !isNac && Math.abs(saldo-selAccredito.avere)<0.01;
                      return (
                        <div key={`${prefix}-${num}`} style={{
                          border:`1px solid ${checked?(isNac?"#a855f7":"#3b82f6"):match?"#22c55e33":isNac?"#581c8733":"#1e293b"}`,
                          background:checked?(isNac?"#1a0f2e":"#0f1f35"):match?"#0a1a10":isNac?"#0f0a1a":"transparent",
                          borderRadius:8,padding:"8px 10px",marginBottom:6,cursor:"pointer",
                        }}
                        onClick={()=>{
                          setRecoSel(p=>{
                            const n={...p};
                            if(num in n) delete n[num];
                            else n[num]=isNac?String(-Math.abs(saldo)):String(saldo);
                            return n;
                          });
                        }}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <div>
                              <div style={{display:"flex",gap:6,alignItems:"center"}}>
                                <span style={{color:checked?(isNac?"#c084fc":"#60a5fa"):(isNac?"#a855f7":"#94a3b8"),
                                  fontSize:11,fontWeight:700}}>
                                  {checked?"☑":"☐"} {num}
                                </span>
                                {match&&<span style={{color:"#22c55e",fontSize:9,background:"#0a2a15",padding:"1px 5px",borderRadius:4}}>importo esatto</span>}
                                {isNac&&<span style={{color:"#c084fc",fontSize:9,background:"#2a1040",padding:"1px 5px",borderRadius:4}}>NAC</span>}
                              </div>
                              <div style={{color:"#475569",fontSize:10,marginTop:2}}>{doc[COL.ragioneSociale]}</div>
                            </div>
                            <div style={{textAlign:"right"}}>
                              <div style={{color:isNac?"#c084fc":"#f1f5f9",fontSize:12,fontWeight:700}}>
                                {isNac?"-":""}{eur(saldo)}
                              </div>
                              {checked&&(
                                <input
                                  value={recoSel[num]||""}
                                  onChange={e=>{e.stopPropagation();setRecoSel(p=>({...p,[num]:e.target.value}));}}
                                  onClick={e=>e.stopPropagation()}
                                  style={{width:80,background:"#0a0f1e",border:`1px solid ${isNac?"#a855f7":"#3b82f6"}`,
                                    borderRadius:5,padding:"2px 6px",color:isNac?"#c084fc":"#60a5fa",
                                    fontSize:11,textAlign:"right",marginTop:3}}/>
                              )}
                            </div>
                          </div>
                        </div>
                      );
                    };

                    return <>
                      {fves.length>0&&<div style={{color:"#475569",fontSize:10,fontWeight:700,
                        marginBottom:6,textTransform:"uppercase",letterSpacing:1}}>Fatture (FVE)</div>}
                      {fves.map(doc=>renderDocRow(doc,"fve"))}
                      {nacs.length>0&&<>
                        <div style={{color:"#a855f7",fontSize:10,fontWeight:700,
                          margin:"10px 0 6px",textTransform:"uppercase",letterSpacing:1}}>
                          ◈ Note di Credito (NAC) — scalano dall'accredito
                        </div>
                        {nacs.map(doc=>renderDocRow(doc,"nac"))}
                      </>}
                    </>;
                  })()}
                  </div>

                  {/* Bottoni */}
                  <button onClick={handleConfirmReco}
                    disabled={recoSaving||Object.keys(recoSel).length===0}
                    style={{width:"100%",background:Object.keys(recoSel).length>0?
                      "linear-gradient(135deg,#059669,#10b981)":"#1e293b",
                      color:Object.keys(recoSel).length>0?"#fff":"#475569",
                      border:"none",borderRadius:10,padding:"12px",fontSize:13,fontWeight:700,
                      cursor:Object.keys(recoSel).length>0?"pointer":"not-allowed",
                      fontFamily:"'IBM Plex Mono',monospace",marginBottom:8}}>
                    {recoSaving?"Salvataggio...":"✓ Conferma Riconciliazione"}
                  </button>
                  <button onClick={()=>{setSelAccredito(null);setRecoSel({});}}
                    style={{width:"100%",background:"transparent",border:"1px solid #1e293b",
                      color:"#475569",borderRadius:10,padding:"8px",fontSize:12,cursor:"pointer"}}>
                    Annulla
                  </button>
                </div>
              ):(
                <div style={{background:"#0a0f1e",border:"1px dashed #1e293b",borderRadius:14,
                  padding:40,textAlign:"center",color:"#334155"}}>
                  <div style={{fontSize:28,marginBottom:10}}>←</div>
                  <div style={{fontSize:12}}>Seleziona un accredito dalla lista per abbinarlo alle fatture</div>
                </div>
              )}
            </div>
          </div>
        )}

        {/* STORICO RICONCILIAZIONI */}
        {tab==="storico"&&(
          <div style={{background:"#0a0f1e",border:"1px solid #1e293b",borderRadius:14,overflow:"hidden"}}>
            <div style={{padding:"14px 18px",borderBottom:"1px solid #1e293b",
              display:"flex",justifyContent:"space-between",alignItems:"center",flexWrap:"wrap",gap:10}}>
              <span style={{color:"#94a3b8",fontSize:11,fontWeight:700}}>◈ STORICO RICONCILIAZIONI</span>
              <div style={{display:"flex",gap:16,fontSize:11}}>
                <span style={{color:"#60a5fa"}}>
                  Bancarie: <strong>{riconciliazioni.filter(r=>r.tipo==="Banca"||(r.id||"").startsWith("RIC-")).length}</strong>
                </span>
                <span style={{color:"#4ade80"}}>
                  Pagamenti: <strong>{riconciliazioni.filter(r=>r.tipo==="Pagamento"||(r.id||"").startsWith("INC-")).length}</strong>
                </span>
                <span style={{color:"#475569"}}>
                  Totale incassato: <strong style={{color:"#38bdf8"}}>{eur(riconciliazioni.reduce((s,r)=>s+(parseNum(r.accredito||r["ACCREDITO"]||0)),0))}</strong>
                </span>
              </div>
            </div>
            {riconciliazioni.length===0?(
              <div style={{padding:60,textAlign:"center",color:"#334155",fontSize:12}}>
                Nessuna riconciliazione registrata
              </div>
            ):(
              <div style={{overflowX:"auto"}}>
                <table style={{width:"100%",borderCollapse:"collapse",fontSize:12}}>
                  <thead>
                    <tr style={{background:"#070c18"}}>
                      {["ID","Data","Accredito","Descrizione","Fatture/NAC collegate"].map(h=>(
                        <th key={h} style={{padding:"10px 14px",textAlign:"left",
                          color:"#475569",fontWeight:600,fontSize:11,borderBottom:"1px solid #1e293b"}}>{h}</th>
                      ))}
                    </tr>
                  </thead>
                  <tbody>
                    {[...riconciliazioni].reverse().map((r,i)=>{
                      const fatture = Array.isArray(r.fatture)
                        ? r.fatture
                        : (r["FATTURE"]||r["NUMERO DOCUMENTO"]||"").split(",").map(x=>x.trim()).filter(Boolean);
                      const accredito = r.accredito || r["ACCREDITO"] || r["IMPORTO"] || 0;
                      const data = r.data || r["DATA"] || r["Data Ricezione"] || "—";
                      const desc = r.descrizione || r["DESCRIZIONE"] || r["NOTE"] || "—";
                      const id = r.id || r["ID INCASSO"] || r["ID"] || "—";
                      const tipo = r.tipo || (id.startsWith("RIC-")?"Banca":"Pagamento");
                      return (
                      <tr key={i} style={{borderBottom:"1px solid #0f172a"}} className="row-hover">
                        <td style={{padding:"10px 14px"}}>
                          <div style={{color:"#475569",fontSize:9,fontFamily:"'IBM Plex Mono',monospace",marginBottom:2}}>{id}</div>
                          <span style={{background:tipo==="Banca"?"#0f1f35":"#0a2a1a",
                            border:`1px solid ${tipo==="Banca"?"#1e3a5f":"#22c55e33"}`,
                            borderRadius:4,padding:"1px 6px",
                            color:tipo==="Banca"?"#60a5fa":"#4ade80",fontSize:9}}>
                            {tipo}
                          </span>
                        </td>
                        <td style={{padding:"10px 14px",color:"#94a3b8",fontSize:12}}>{data}</td>
                        <td style={{padding:"10px 14px",color:"#4ade80",fontWeight:700,
                          fontFamily:"'IBM Plex Mono',monospace",fontSize:13}}>
                          {accredito?eur(accredito):"—"}
                        </td>
                        <td style={{padding:"10px 14px",color:"#64748b",fontSize:11,maxWidth:260,
                          overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                          {desc}
                        </td>
                        <td style={{padding:"10px 14px"}}>
                          {fatture.length>0 ? fatture.map((f,j)=>(
                            <span key={j} style={{display:"inline-block",background:"#0f1f35",
                              border:"1px solid #1e3a5f",borderRadius:4,padding:"1px 6px",
                              color:"#60a5fa",fontSize:10,marginRight:4,marginBottom:2}}>
                              {f}
                            </span>
                          )) : <span style={{color:"#334155"}}>—</span>}
                        </td>
                      </tr>
                    );})}
                  </tbody>
                </table>
              </div>
            )}
          </div>
        )}

        {tab==="migrazione"&&(
          <MigrazioneTab docs={docs} authed={authed} notify={notify} onComplete={loadData}/>
        )}
      </main>

      {showPay&&<PayModal docs={docs} onSave={handleSavePay} onClose={()=>setShowPay(false)} user={authed} onLogout={handleLogout}/>}
      {toast&&<Toast msg={toast.msg} type={toast.type} onClose={()=>setToast(null)}/>}
    </div>
  );
}

class ErrorBoundary extends React.Component {
  constructor(props) { super(props); this.state = { error: null }; }
  static getDerivedStateFromError(e) { return { error: e }; }
  render() {
    if (this.state.error) return (
      <div style={{padding:40,background:"#0a0f1e",minHeight:"100vh",color:"#ef4444"}}>
        <h2 style={{fontFamily:"monospace"}}>⚠ Errore App</h2>
        <pre style={{background:"#070c18",padding:20,borderRadius:8,color:"#f87171",fontSize:12,overflow:"auto"}}>
          {this.state.error.toString()}
          {this.state.error.stack}
        </pre>
      </div>
    );
    return this.props.children;
  }
}
try {
  ReactDOM.createRoot(document.getElementById("root")).render(
    <ErrorBoundary><App/></ErrorBoundary>
  );
} catch(e) {
  document.getElementById("root").innerHTML = 
    "<pre style='color:#ef4444;padding:20px;background:#0a0f1e;min-height:100vh'>" + 
    "ERRORE CRITICO:\n" + e.toString() + "\n" + (e.stack||"") + "</pre>";
}
</script>
</body>
</html>
