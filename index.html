  <style>
    :root {
      /* ════════════════════════════════════
         COLORI PRINCIPALI - Dark Theme
         ════════════════════════════════════ */
      --bg:       #0a0a0a;
      --surface:  #121212;
      --raised:   #1a1a1a;
      --paper:    #0f0f0f;
      --paper-2:  #020202;
      
      /* BORDI - Azzuro Napoli subtile */
      --border:   rgba(14, 165, 233, 0.15);
      --border-2: rgba(14, 165, 233, 0.08);
      
      /* TESTO */
      --text-1:   #f2f2f2;           /* Primary text (bianco) */
      --text-2:   #e0e7ff;           /* Secondary text (azzuro chiaro) */
      --text-3:   #cbd5e1;           /* Tertiary text (grigio chiaro) */
      
      /* ACCENT - Azzuro Napoli */
      --accent:   #0EA5E9;
      --accent-s: rgba(14, 165, 233, 0.12);
      --accent-t: rgba(14, 165, 233, 0.04);
      
      /* SECONDARY - Bianco */
      --secondary: #f2f2f2;
      
      /* SEMANTIC COLORS */
      --success:  #4ba86e;
      --warn:     #bfa973;
      --danger:   #c26f6f;
      --success-s: rgba(75, 168, 110, 0.12);
      --warn-s:    rgba(191, 169, 115, 0.12);
      --danger-s:  rgba(194, 111, 111, 0.12);
      
      /* SPACING & TYPOGRAPHY */
      --radius:   16px;
      --radius-s: 8px;
      --radius-l: 22px;
      --shadow:   0 2px 8px rgba(0,0,0,.20);
      --shadow-m: 0 12px 24px rgba(0,0,0,.26);
      --shadow-l: 0 24px 48px rgba(0,0,0,.32);
      --font:     'Sora', 'Century Gothic', CenturyGothic, 'Trebuchet MS', sans-serif;
      --mono:     'DM Mono', 'Fira Code', ui-monospace, monospace;
      
      /* GRADIENTS - Azzuro Napoli Theme */
      --grad-subtle:  linear-gradient(180deg,rgba(14,165,233,.04) 0%,rgba(14,165,233,.0) 100%);
      --grad-card:    linear-gradient(135deg,#1a1a1a 0%,#0f0f0f 100%);
      --grad-surface: linear-gradient(180deg,#1b1b1b 0%,#121212 100%);
      --grad-header:  linear-gradient(180deg,rgba(18,18,18,.96) 0%,rgba(10,10,10,.94) 100%);
      --grad-dark:    linear-gradient(135deg,#222 0%,#1a1a1a 100%);
      --grad-accent:  linear-gradient(135deg,#0EA5E9 0%,#0697D6 100%);
      --grad-body:    linear-gradient(140deg, #0a0a0a 0%, #0f0f0f 50%, #121212 100%);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body, #root { height: 100%; }
    body {
      background: var(--grad-body);
      background-attachment: fixed;
      font-family: var(--font);
      color: var(--text-1);
      font-size: 13px;
      line-height: 1.5;
      -webkit-font-smoothing: antialiased;
      position: relative;
    }
    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: repeating-linear-gradient(90deg, transparent, transparent 2px, rgba(14,165,233,.01) 2px, rgba(14,165,233,.01) 4px),
                  repeating-linear-gradient(0deg, transparent, transparent 2px, rgba(14,165,233,.01) 2px, rgba(14,165,233,.01) 4px);
      pointer-events: none;
      z-index: -1;
    }
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(14, 165, 233, 0.2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: rgba(14, 165, 233, 0.4); }

    /* ════════════════════════════════════
       ANIMATIONS
       ════════════════════════════════════ */
    @keyframes spin { to { transform: rotate(360deg); } }
    @keyframes tabIn { from { opacity:0; transform:translateY(12px); } to { opacity:1; transform:translateY(0); } }
    @keyframes fadeIn { from { opacity:0; } to { opacity:1; } }
    @keyframes slideIn { from { opacity:0; transform:translateX(-20px); } to { opacity:1; transform:translateX(0); } }
    @keyframes countUp { from { opacity:0; transform:translateY(8px); scale:.96; } to { opacity:1; transform:translateY(0); scale:1; } }
    @keyframes overlayEnter { from { opacity:0; } to { opacity:1; } }
    @keyframes modalEnter { from { opacity:0; transform:scale(.96); } to { opacity:1; transform:scale(1); } }
    @keyframes pulse { 0%, 100% { opacity:1; } 50% { opacity:0.5; } }

    /* ════════════════════════════════════
       ADDITIONAL ANIMATIONS
       ════════════════════════════════════ */
    @keyframes dockSlide { from { transform:translateY(24px); opacity:0; } to { transform:translateY(0); opacity:1; } }
    @keyframes dockBounce { 0% { transform:translateY(0); } 50% { transform:translateY(-4px); } 100% { transform:translateY(0); } }

    .tab-content { animation: tabIn .3s cubic-bezier(.34,.1,.64,.1) both; }

    .app-shell {
      height: 100vh;
      display: flex;
      background: var(--grad-body);
      backdrop-filter: blur(10px);
      overflow: hidden;
    }

    .mono-sidebar {
      width: 90px;
      flex-shrink: 0;
      background: var(--surface);
      border-right: 1px solid var(--border);
      display: none;
      flex-direction: column;
      align-items: center;
      padding: 14px 10px;
      position: sticky;
      top: 0;
      height: 100vh;
      z-index: 50;
      box-shadow: var(--shadow);
      backdrop-filter: blur(10px);
    }

    .mono-logo {
      width: 52px;
      height: 52px;
      border-radius: 16px;
      background: var(--raised);
      color: var(--text-1);
      display: grid;
      place-items: center;
      font-size: 14px;
      font-weight: 700;
      margin-bottom: 12px;
      box-shadow: 0 4px 12px rgba(0,0,0,.15);
    }

    .nav-ico {
      width: 52px;
      height: 44px;
      border: 1px solid transparent;
      border-radius: 12px;
      background: transparent;
      color: var(--text-3);
      display: grid;
      place-items: center;
      cursor: pointer;
      margin-bottom: 6px;
      position: relative;
      transition: all .14s ease;
      font-size: 18px;
      font-weight: 700;
    }

    .nav-ico:hover {
      background: rgba(14,165,233,.06);
      color: var(--accent);
      border-color: rgba(14,165,233,.12);
    }

    .nav-ico.active {
      background: rgba(14,165,233,.12);
      color: var(--accent);
      border-color: var(--accent);
      box-shadow: 0 4px 12px rgba(14,165,233,.15);
    }

    .nav-ico[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      left: 58px;
      top: 50%;
      transform: translateY(-50%);
      white-space: nowrap;
      background: var(--text-1);
      color: var(--bg);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em;
      box-shadow: var(--shadow-m);
      z-index: 20;
      pointer-events: none;
    }

    .mono-main {
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      position: relative;
      width: 100%;
    }

    .bottom-dock {
      height: 84px;
      flex-shrink: 0;
      border: 1px solid var(--border);
      background: var(--grad-card);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-radius: var(--radius-l);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      padding: 12px 16px;
      position: fixed;
      left: 0;
      right: 0;
      margin: 0 auto;
      width: calc(100% - 32px);
      max-width: 920px;
      bottom: 12px;
      z-index: 40;
      box-shadow: 0 18px 38px rgba(0,0,0,.26), 0 4px 10px rgba(0,0,0,.12);
      animation: dockSlide .4s cubic-bezier(.34,.1,.64,.1) both;
      overflow: visible;
    }

    .dock-btn {
      width: 56px;
      min-width: 56px;
      height: 48px;
      border-radius: 14px;
      border: 1px solid var(--border);
      background: var(--surface);
      color: var(--text-2);
      cursor: pointer;
      display: grid;
      place-items: center;
      font-size: 20px;
      font-weight: 700;
      position: relative;
      transition: all .18s cubic-bezier(.34,.1,.64,.1);
    }

    .dock-btn:hover {
      transform: translateY(-6px) scale(1.08);
      box-shadow: 0 12px 28px rgba(14,165,233,.2);
      color: var(--accent);
      background: var(--raised);
      border-color: var(--accent);
    }

    .dock-btn.active {
      background: rgba(14,165,233,.08);
      border-color: var(--accent);
      color: var(--accent);
      box-shadow: 0 8px 20px rgba(14,165,233,.2), inset 0 1px 0 rgba(14,165,233,.1);
      animation: dockBounce .4s ease-out;
    }

    .dock-btn[data-tip]:hover::after {
      content: attr(data-tip);
      position: absolute;
      bottom: 52px;
      left: 50%;
      transform: translateX(-50%);
      white-space: nowrap;
      background: var(--raised);
      color: var(--accent);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: .03em;
      pointer-events: none;
      box-shadow: 0 8px 24px rgba(0,0,0,.25);
      z-index: 100;
    }

    .mono-topbar {
      height: 60px;
      background: var(--grad-header);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 24px;
      flex-shrink: 0;
      animation: slideIn .3s ease-out;
      backdrop-filter: blur(10px);
      box-shadow: 0 10px 24px rgba(0,0,0,.22);
    }

    @media (max-width: 1024px) {
      .mono-sidebar { display: none; }
      .bottom-dock { width: calc(100% - 24px); gap: 8px; padding: 10px 12px; height: 78px; bottom: 10px; }
      .dock-btn { width: 48px; min-width: 48px; height: 42px; font-size: 18px; }
      .reco-grid { grid-template-columns: 1fr !important; }
      .reco-side { position: static !important; top: auto !important; }
      .mono-topbar {
        height: auto;
        min-height: 60px;
        padding: 10px 14px;
        gap: 10px;
        flex-wrap: wrap;
      }
      .topbar-actions {
        width: 100%;
        justify-content: flex-end;
        flex-wrap: wrap;
      }
    }
    @media (max-width: 680px) {
      .bottom-dock { width: calc(100% - 16px); height: 74px; gap: 4px; padding: 8px; border-radius: 16px; }
      .dock-btn { width: 34px; min-width: 34px; height: 36px; font-size: 14px; border-radius: 10px; }
      .dock-actions { margin-left: 10px; padding-left: 10px; gap: 6px; }
    }

    .card {
      background: var(--grad-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 26px rgba(0,0,0,.26);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .card:hover {
      border-color: rgba(14,165,233,.2);
      box-shadow: 0 12px 26px rgba(14,165,233,.1);
    }

    .kpi-card {
      transition: border-color .15s ease, box-shadow .15s ease;
      cursor: default;
      background: var(--grad-card);
      color: var(--text-1);
      position: relative;
      overflow: hidden;
    }
    .kpi-card::before {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, rgba(14,165,233,.04) 0%, rgba(14,165,233,0) 42%);
      pointer-events: none;
    }
    .kpi-card:hover {
      border-color: rgba(14,165,233,.2) !important;
      box-shadow: 0 12px 26px rgba(14,165,233,.1) !important;
    }

    .row-hover { transition: background .12s ease; }
    .row-hover:hover { transform: none; }

    .skeleton-row {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 10px 13px;
      animation: pulse 2s ease-in-out infinite;
    }
    .skeleton-row td {
      height: 20px;
      background: var(--raised);
      border-radius: 4px;
      animation: pulse 2s ease-in-out infinite;
    }

    .glass-card {
      background: var(--grad-card);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      border: 1px solid var(--border);
      border-radius: 16px;
      box-shadow: 0 12px 28px rgba(0,0,0,.28);
      transition: border-color .15s ease, box-shadow .15s ease;
    }
    .glass-card:hover {
      background: var(--grad-card);
      border-color: rgba(14,165,233,.15);
      box-shadow: 0 12px 28px rgba(14,165,233,.1);
    }

    .btn-primary {
      transition: all .15s cubic-bezier(.34,.1,.64,.1);
      position: relative;
      overflow: hidden;
    }
    .btn-primary:hover {
      opacity: .9;
      transform: translateY(-2px);
      box-shadow: 0 8px 20px rgba(14,165,233,.15) !important;
    }
    .btn-primary:active {
      transform: translateY(0);
      box-shadow: 0 4px 12px rgba(14,165,233,.1) !important;
    }

    table {
      border-collapse: collapse;
      width: 100%;
    }
    th {
      font-weight: 600;
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      color: var(--text-2);
      padding: 12px 14px;
      background: var(--grad-header);
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      position: sticky;
      top: 0;
      z-index: 2;
    }
    td {
      padding: 13px 14px;
      border-bottom: none;
      vertical-align: middle;
      color: var(--text-1);
      font-size: 12.5px;
      transition: background .12s ease;
      background: var(--surface);
    }
    tbody tr {
      transition: background .09s linear;
      animation: none;
      border-bottom: none !important;
    }
    tbody tr:hover {
      background: rgba(236,231,224,.48) !important;
    }
    tbody tr:hover td {
      background: rgba(241,236,230,.82) !important;
      border-bottom: none !important;
    }
    tbody td {
      border-bottom: none !important;
    }
    tbody tr[style*="border-bottom"] {
      border-bottom: none !important;
    }

    .dock-actions {
      display: flex;
      gap: 10px;
      margin-left: 16px;
      padding-left: 14px;
      border-left: 1px solid rgba(0,0,0,.14);
    }

    button:focus-visible,
    .dock-btn:focus-visible,
    .nav-ico:focus-visible,
    input:focus-visible,
    select:focus-visible,
    textarea:focus-visible {
      outline: 2px solid rgba(14,165,233,.55);
      outline-offset: 2px;
    }

    /* Screen reader only — per accessibilità (label nascoste per NVDA/JAWS) */
    .sr-only {
      position: absolute !important;
      width: 1px !important;
      height: 1px !important;
      padding: 0 !important;
      margin: -1px !important;
      overflow: hidden !important;
      clip: rect(0, 0, 0, 0) !important;
      white-space: nowrap !important;
      border-width: 0 !important;
    }

    input, select, textarea {
      font-family: var(--font);
      font-size: 13px;
      color: var(--text-1);
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius-s);
      outline: none;
      transition: all .15s cubic-bezier(.34,.1,.64,.1);
      box-shadow: 0 1px 0 rgba(14,165,233,.1), 0 1px 2px rgba(0,0,0,.06);
    }
    input::placeholder, textarea::placeholder { color: var(--text-2); opacity: 0.7; }
    input:focus, select:focus, textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(14,165,233,.1), 0 6px 18px rgba(14,165,233,.15);
      background: var(--raised);
      transform: translateY(-1px);
    }
    select option { background: var(--surface); color: var(--text-1); }

    .badge {
      display: inline-flex;
      align-items: center;
      padding: 2px 8px;
      border-radius: 20px;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: .03em;
    }

    /* Assegni hover tooltip */
    .ass-row { position: relative; }
    .ass-tooltip {
      display: none;
      position: absolute;
      right: 0; top: 100%;
      z-index: 99;
      min-width: 230px;
      background: linear-gradient(180deg, rgba(24,24,24,.98) 0%, rgba(16,16,16,.96) 100%);
      border: 1px solid rgba(255,255,255,.16);
      border-radius: var(--radius);
      padding: 10px 13px;
      box-shadow: var(--shadow-l);
      pointer-events: none;
      transform: translateY(8px);
      opacity: 0;
      transition: all .16s ease;
    }
    .ass-row:hover .ass-tooltip { display: block; transform: translateY(0); opacity: 1; }

    .premium-panel-dark {
      background: linear-gradient(180deg, rgba(22,22,22,.95) 0%, rgba(14,14,14,.92) 100%);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      box-shadow: 0 14px 28px rgba(0,0,0,.24);
    }

    .section-kicker {
      color: var(--text-2);
      font-size: 10px;
      font-weight: 700;
      letter-spacing: .11em;
      text-transform: uppercase;
    }

    .step-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 3px 9px;
      border-radius: 999px;
      border: 1px solid rgba(255,255,255,.16);
      font-size: 10px;
      font-weight: 600;
      color: var(--text-2);
      background: rgba(255,255,255,.04);
    }

    .step-pill.active {
      border-color: rgba(255,255,255,.34);
      color: var(--text-1);
      background: rgba(255,255,255,.10);
    }

    .tab-toolbar {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
      align-items: center;
      flex-wrap: wrap;
    }

    .tab-toolbar-meta {
      color: var(--text-3);
      font-size: 11px;
      margin-left: auto;
    }

    .filter-group {
      display: flex;
      align-items: center;
      gap: 6px;
      background: var(--grad-card);
      padding: 2px 10px;
      border-radius: 10px;
      border: 1px solid var(--border);
    }

    .filter-group > span {
      color: var(--text-2) !important;
      font-weight: 700 !important;
      letter-spacing: .04em;
    }

    .filter-group input,
    .filter-group select {
      color: var(--text-1) !important;
      font-weight: 600;
      background: transparent !important;
      box-shadow: none !important;
    }

    .filter-group input::placeholder,
    .filter-group select::placeholder {
      color: var(--text-3) !important;
    }

    .filter-group input:focus,
    .filter-group select:focus {
      background: rgba(14,165,233,.1) !important;
      border-radius: 6px;
      box-shadow: 0 0 0 1px rgba(14,165,233,.2) !important;
    }

    .filter-group input::-webkit-calendar-picker-indicator {
      filter: brightness(0.8) invert(0.9);
      opacity: .85;
    }

    input[type="date"] {
      box-shadow: none !important;
      transform: none !important;
      transition: border-color .12s ease, background .12s ease !important;
    }

    input[type="date"]:focus {
      box-shadow: 0 0 0 1px rgba(255,255,255,.2) !important;
      transform: none !important;
    }

    .filter-group input[type="date"],
    .filter-group input[type="date"]:focus {
      box-shadow: none !important;
      transform: none !important;
    }

    .table-shell {
      background: linear-gradient(180deg, rgba(21,21,21,.98) 0%, rgba(14,14,14,.94) 100%);
      border: 1px solid rgba(255,255,255,.12);
      border-radius: var(--radius);
      overflow: hidden;
      box-shadow: 0 14px 28px rgba(0,0,0,.24);
    }

    .reset-btn {
      background: transparent;
      border: 1px solid rgba(255,255,255,.24);
      color: var(--text-1);
      border-radius: var(--radius-s);
      padding: 7px 10px;
      cursor: pointer;
      font-size: 11px;
      transition: all .15s ease;
    }

    .reset-btn:hover {
      color: var(--text-1);
      border-color: rgba(255,255,255,.22);
      background: rgba(255,255,255,.04);
    }

    .micro-btn {
      border: 1px solid rgba(255,255,255,.26);
      border-radius: var(--radius-s);
      padding: 6px 10px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      line-height: 1;
      transition: all .15s ease;

/* ──────────────────────────────────────────────
   GOOGLE SHEETS API LAYER
────────────────────────────────────────────── */
const WORKER_URL = "https://creditflow-api.m-torinese99.workers.dev";

const d1API = {
  user: null,
  token: null,

  async call(path, method="GET", body=null) {
    const headers = { "Content-Type": "application/json" };
    if (this.token) headers["Authorization"] = `Bearer ${this.token}`;
    const opts = { method, headers };
    if (body) opts.body = JSON.stringify({ ...body, utente: this.user });

    // ── TIMEOUT PROTECTION (10s) ──
    const controller = new AbortController();
    const timeoutId = setTimeout(() => controller.abort(), 10000);
    opts.signal = controller.signal;

    let r;
    try {
      r = await fetch(`${WORKER_URL}${path}`, opts);
    } catch(e) {
      if (e.name === 'AbortError') {
        throw new Error(`Timeout API (>10s) [${method} ${path}]`);
      }
      throw e;
    } finally {
      clearTimeout(timeoutId);
    }

    if (r.status === 401) {
      this.clear();
      sessionStorage.removeItem("cf_token");
      sessionStorage.removeItem("cf_user");
      window.location.reload();
      return;
    }

    let data = null;
    try {
      data = await r.json();
    } catch(_) {
      data = null;
    }

    if (!r.ok) {
      const base = data?.error || data?.message || "Errore API";
      throw new Error(`${base} [${r.status} ${method} ${path}]`);
    }
    return data;
  },

  clear() { this.user = null; this.token = null; },

  async auth(username, password) {
    const res = await fetch(`${WORKER_URL}/api/auth`, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ username, password }),
    });
    const data = await res.json();
    if (data.error) throw new Error(data.error);
    if (!res.ok) throw new Error(`Auth failed [${res.status}]`);
    this.user = data.username;
    this.token = data.token;
    return data;
  },

  async logout() {
    try { await this.call("/api/auth/logout", "POST"); } catch(_) {}
    this.clear();
  },

  async getDashboard()    { return this.call("/api/dashboard"); },
  async getDocumenti(params={}) {
    const qs = new URLSearchParams(params).toString();
    return this.call("/api/documenti" + (qs ? "?" + qs : ""));
  },
  async updateDocumento(id, fields) {
    return this.call(`/api/documenti/${id}`, "PUT", { ...fields, utente: this.user });
  },
  async getIncassi()       { return this.call("/api/incassi"); },
  async postIncasso(body)  { return this.call("/api/incassi", "POST", body); },
  async getAssegni()       { return this.call("/api/assegni"); },
  async updateAssegno(id, fields) {
    return this.call(`/api/assegni/${id}`, "PUT", { ...fields, utente: this.user });
  },
  async getRiconciliazioni() { return this.call("/api/riconciliazioni"); },
  async postRiconciliazione(body) { return this.call("/api/riconciliazioni", "POST", body); },
  async getAudit(docId)   { return this.call(`/api/audit/documenti/${docId}`); },
  async migrate(table, rows) { return this.call("/api/migrate", "POST", { table, rows }); },
  async deleteRiconciliazione(id) { return this.call(`/api/riconciliazioni/${id}`, "DELETE"); },
};

const sheetsAPI = d1API;

const assStatoColor = s => {
  if (!s) return "var(--text-3)";
  const u = String(s).toUpperCase();
  if (u.includes("INCASSATO")) return "var(--success)";
  if (u.includes("CONSEGNATO") || u.includes("PINO")) return "var(--text-2)";
  if (u.includes("ARCHIVIO")) return "var(--warn)";
  return "var(--text-2)";
};

/* ──────────────────────────────────────────────
   REGOLE STATO + PARSER / FORMATTER
────────────────────────────────────────────── */
const CF_STATE = window.CFStateRules || {};

const DOC_STATUS_TRANSITIONS = CF_STATE.DOC_STATUS_TRANSITIONS || {
  "APERTO": ["APERTO","PARZIALE","DA INCASSARE","DA RICONCILIARE","CHIUSO","PAGATO","STORNATO"],
  "PARZIALE": ["PARZIALE","APERTO","DA INCASSARE","DA RICONCILIARE","CHIUSO","PAGATO","STORNATO"],
  "DA INCASSARE": ["DA INCASSARE","PARZIALE","CHIUSO","APERTO"],
  "DA RICONCILIARE": ["DA RICONCILIARE","CHIUSO","APERTO"],
  "CHIUSO": ["CHIUSO","APERTO","DA RICONCILIARE"],
  "PAGATO": ["PAGATO","APERTO","CHIUSO"],
  "STORNATO": ["STORNATO","APERTO"],
};

const ASS_STATUS_TRANSITIONS = CF_STATE.ASS_STATUS_TRANSITIONS || {
  "IN ARCHIVIO": ["IN ARCHIVIO","CONSEGNATO A PINO","INCASSATO"],
  "CONSEGNATO A PINO": ["CONSEGNATO A PINO","IN ARCHIVIO","INCASSATO"],
  "INCASSATO": ["INCASSATO","CONSEGNATO A PINO"],
};

const canTransition = CF_STATE.canTransition || ((rules, fromState, toState) => {
  const from = String(fromState || "").toUpperCase();
  const to = String(toState || "").toUpperCase();
  if (!to || !from || from === to) return true;
  const allowed = rules[from];
  if (!Array.isArray(allowed)) return true;
  return allowed.includes(to);
});

const allowedTransitions = CF_STATE.allowedTransitions || ((rules, fromState) => {
  const from = String(fromState || "").toUpperCase();
  const allowed = rules[from];
  return Array.isArray(allowed) ? allowed : [];
});

const CF_PARSERS = window.CFParsers || {};

const parseDocRefs = CF_PARSERS.parseDocRefs || ((value) => {
  if (Array.isArray(value)) return value.map(v => String(v).trim()).filter(Boolean);
  const raw = String(value || "").trim();
  if (!raw) return [];

  const base = raw.split(/[;,\n\r|]+/).map(s => s.trim()).filter(Boolean);
  if (base.length > 1) return base;

  if (/^\d+(?:[\s.]+\d+)+$/.test(raw)) {
    return raw.split(/[\s.]+/).map(s => s.trim()).filter(Boolean);
  }
  if (/\s+-\s+/.test(raw)) {
    return raw.split(/\s+-\s+/).map(s => s.trim()).filter(Boolean);
  }
  return [raw];
});

const parseNum = CF_PARSERS.parseNum || ((s) => {
  if (s===null || s===undefined || s==="") return 0;
  const str = String(s).trim();
  if (str.includes(",")) return parseFloat(str.replace(/\./g,"").replace(",",".")) || 0;
  return parseFloat(str) || 0;
});

const toISO = CF_PARSERS.toISO || ((v) => {
  if (!v) return "";
  const s = String(v).trim();
  if (/^\d{4}-\d{2}-\d{2}/.test(s)) return s.slice(0,10);
  const it = s.match(/^(\d{1,2})[.\/\-](\d{1,2})[.\/\-](\d{4})/);
  if (it) return `${it[3]}-${it[2].padStart(2,"0")}-${it[1].padStart(2,"0")}`;
  if (typeof v === "number" && v > 40000) {
    const d = new Date(Date.UTC(1899,11,30) + Math.round(v) * 86400000);
    return isNaN(d) ? "" : d.toISOString().slice(0,10);
  }
  return s;
});

const toIT = CF_PARSERS.toIT || ((v) => {
  if (!v) return "—";
  const iso = toISO(v);
  if (!iso) return String(v);
  const [y,m,d] = iso.split("-");
  return `${d}/${m}/${y}`;
});

const eur = CF_PARSERS.eur || (n => new Intl.NumberFormat("it-IT", {style:"currency",currency:"EUR"}).format(parseNum(n)));

const fmtDocList = CF_PARSERS.fmtDocList || ((str) => {
  if (!str || !String(str).trim()) return "—";
  const parts = parseDocRefs(str);
  if (parts.length <= 1) return String(str).trim() || "—";
  return parts.join(" - ");
});

const CF_VIEW = window.CFViewUtils || {};
const ageDays = CF_VIEW.ageDays || (s => (Date.now() - new Date(s)) / 86400000);
const isOver  = CF_VIEW.isOver || (s => ageDays(s) > 90);
const isWarn  = CF_VIEW.isWarn || (s => ageDays(s) > 60 && ageDays(s) <= 90);

const sortData = CF_VIEW.sortData || function(data, sortKey, sortDir) {
  const parseDate = v => {
    const s = String(v || "").trim();
    const itMatch = s.match(/^(\d{1,2})\/(\d{1,2})\/(\d{4})$/);
    if (itMatch) return new Date(itMatch[3], itMatch[2]-1, itMatch[1]);
    const isoMatch = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if (isoMatch) return new Date(isoMatch[1], isoMatch[2]-1, isoMatch[3]);
    return null;
  };
  if (!sortKey) return [...data];
  return [...data].sort((a,b) => {
    const av = a[sortKey] || "";
    const bv = b[sortKey] || "";
    const ad = parseDate(av), bd = parseDate(bv);
    let cmp;
    if (ad && bd) cmp = ad - bd;
    else {
      const an = parseFloat(String(av).replace(/\./g,"").replace(",","."));
      const bn = parseFloat(String(bv).replace(/\./g,"").replace(",","."));
      if (!isNaN(an) && !isNaN(bn)) cmp = an - bn;
      else cmp = String(av).localeCompare(String(bv), "it");
    }
    return sortDir === "asc" ? cmp : -cmp;
  });
};

function makeSortTh(sortKey, sortDir, toggleSort) {

}

function EditCell({value, onSave, numeric, display, color}) {
  const [ed,setEd] = useState(false);
  const [v,setV] = useState(value);
  const ref = useRef();
  useEffect(()=>{ setV(value); },[value]);
  useEffect(()=>{ if(ed&&ref.current) ref.current.focus(); },[ed]);
  const commit = ()=>{ setEd(false); if(String(v)!==String(value)) onSave(v); };
  if(ed) return (
    <input ref={ref} value={v} type={numeric?"number":"text"}
      data-edit-cell="1"
      onChange={e=>setV(e.target.value)}
      onClick={e=>e.stopPropagation()}
      onMouseDown={e=>e.stopPropagation()}
      onBlur={commit}
      onKeyDown={e=>{ if(e.key==="Enter")commit(); if(e.key==="Escape"){setV(value);setEd(false);} }}
      style={{...S.input,padding:"3px 7px",width:"100%",fontSize:12,color:color||"inherit"}} />
  );
  const shown = display !== undefined ? display : (value || "—");
  return (
    <span
      data-edit-cell="1"
      onClick={e=>e.stopPropagation()}
      onMouseDown={e=>e.stopPropagation()}
      onDoubleClick={e=>{ e.stopPropagation(); setEd(true); }}

      {shown}

  );
}

function CashChart({assegni,onNavigate}) {
  const [hoverIdx,setHoverIdx] = useState(null);
  const [pinnedIdx,setPinnedIdx] = useState(null);
  const [mousePos,setMousePos] = useState({x:0,y:0});
  const svgRef = useRef(null);
  const hideTimerRef = useRef(null);

  const clearHideTimer = () => {
    if (hideTimerRef.current) {
      clearTimeout(hideTimerRef.current);
      hideTimerRef.current = null;
    }
  };

  const scheduleHideTooltip = () => {
    if (pinnedIdx !== null) return;
    clearHideTimer();
    hideTimerRef.current = setTimeout(() => setHoverIdx(null), 260);
  };

  useEffect(() => () => clearHideTimer(), []);

  const todayKey = new Date().toISOString().slice(0,10);
  const PRESETS = [
    {label:"30 gg",days:30},
    {label:"60 gg",days:60},
    {label:"90 gg",days:90},
    {label:"6 mesi",days:180},
    {label:"Tutto",days:999},

  const [preset,setPreset] = useState(1);
  const [fromDate,setFromDate] = useState("");
  const [toDate,setToDate] = useState("");
  const [statoFil,setStatoFil] = useState("TUTTI");

  const winFrom = fromDate || todayKey;
  const winTo = toDate || (() => {
    const d = new Date();
    d.setDate(d.getDate() + PRESETS[preset].days);
    return d.toISOString().slice(0,10);
  })();

  const parseDateKey = v => {
    if(!v) return null;
    const s = String(v).trim();
    const iso = s.match(/^(\d{4})-(\d{2})-(\d{2})/);
    if(iso) return s.slice(0,10);
    const it = s.match(/^(\d{1,2})[\/\-](\d{1,2})[\/\-](\d{4})/);
    if(it) return `${it[3]}-${it[2].padStart(2,"0")}-${it[1].padStart(2,"0")}`;
    return null;
  };

  const isIncassato = a => !!a?._incassoId || String(a?.["STATO TITOLO"]||"").toUpperCase()==="INCASSATO";

  const byDay = {};
  (assegni||[]).forEach(a => {
    const stato = String(a["STATO TITOLO"] || "").toUpperCase();
    if(statoFil==="IN ARCHIVIO" && !stato.includes("ARCHIVIO")) return;
    if(statoFil==="CONSEGNATO A PINO" && !stato.includes("PINO")) return;
    const k = parseDateKey(a["DATA TITOLO"]);
    if(!k || k < winFrom || k > winTo) return;
    if(!byDay[k]) byDay[k] = {total:0, archivio:0, pino:0, items:[]};
    const imp = parseNum(a["IMPORTO TITOLO"]);
    byDay[k].total += imp;
    if(stato.includes("ARCHIVIO")) byDay[k].archivio += imp;
    else byDay[k].pino += imp;
    byDay[k].items.push(a);
  });

  const entries = Object.entries(byDay).sort(([a],[b]) => a.localeCompare(b));
  const activeIdx = pinnedIdx !== null ? pinnedIdx : hoverIdx;
  const isInTol = items => (items || []).some(a => !isIncassato(a));

  const MESI_L = ["Gennaio","Febbraio","Marzo","Aprile","Maggio","Giugno","Luglio","Agosto","Settembre","Ottobre","Novembre","Dicembre"];
  const fmtDay = k => `${k.slice(8,10)}/${k.slice(5,7)}`;
  const fmtFullLong = k => {
    const d = new Date(k+"T00:00:00");
    return `${GIORNI[d.getDay()]} ${d.getDate()} ${MESI_L[d.getMonth()]} ${d.getFullYear()}`;
  };
  const fmtY = v => v>=10000?`${(v/1000).toFixed(0)}k`:v>=1000?`${(v/1000).toFixed(1)}k`:Math.round(v).toString();

  const FilBtn = ({label,active,onClick,color}) => (
    <button onClick={onClick} style={{
      background:active?(color||"var(--text-1)"):"var(--raised)",

  );

  const filtriUI = (
    <div style={{display:"flex",gap:12,marginBottom:18,flexWrap:"wrap",alignItems:"center",animation:"slideIn .4s ease-out"}}>
      <div style={{display:"flex",gap:5,background:"var(--surface)",border:"1px solid var(--border)",borderRadius:999,padding:6,transition:"all .2s ease"}}>
        {[["TUTTI","Tutti"],["IN ARCHIVIO","In Archivio"],["CONSEGNATO A PINO","Cons. Pino"]].map(([v,l])=>(
          <FilBtn key={v} label={l} active={statoFil===v}
            color={v==="IN ARCHIVIO"?"#bfa973":v==="CONSEGNATO A PINO"?"var(--text-2)":"var(--text-1)"}
            onClick={()=>setStatoFil(v)}/>
        ))}
      </div>
      <div style={{width:1,height:24,background:"rgba(0,0,0,.08)",flexShrink:0,transition:"opacity .2s ease"}}/>
      <div style={{display:"flex",gap:5,background:"rgba(0,0,0,.03)",border:"1px solid rgba(0,0,0,.08)",borderRadius:999,padding:6,transition:"all .2s ease"}}>
        {PRESETS.map((p,i)=>(
          <FilBtn key={i} label={p.label} color="#141414"
            active={preset===i&&!fromDate&&!toDate}
            onClick={()=>{setPreset(i);setFromDate("");setToDate("");}}/>
        ))}
      </div>
      <div style={{display:"flex",gap:6,alignItems:"center"}}>
        <input type="date" value={fromDate} onChange={e=>setFromDate(e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text-1)",fontSize:10.5,padding:"6px 10px",fontFamily:"var(--font)",transition:"all .15s ease",cursor:"pointer",outline:"none"}}/>
        <span style={{color:"var(--text-2)",fontSize:10,fontWeight:600}}>{"→"}</span>
        <input type="date" value={toDate} onChange={e=>setToDate(e.target.value)} style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:8,color:"var(--text-1)",fontSize:10.5,padding:"6px 10px",fontFamily:"var(--font)",transition:"all .15s ease",cursor:"pointer",outline:"none"}}/>
        {(fromDate||toDate)&&<button onClick={()=>{setFromDate("");setToDate("");}} style={{background:"var(--surface)",border:"1px solid var(--border)",color:"var(--text-2)",borderRadius:8,padding:"5px 9px",cursor:"pointer",fontSize:11,fontWeight:600,transition:"all .15s ease"}}>✕</button>}
      </div>
    </div>
  );

  if(!entries.length) {
    return (
      <div>
        {filtriUI}
        <div style={{padding:"48px 0",textAlign:"center"}}>
          <div style={{fontSize:32,marginBottom:8,opacity:.3}}>◈</div>
          <div style={{color:"var(--text-2)",fontSize:12}}>Nessun assegno nel periodo selezionato</div>
        </div>
      </div>
    );
  }

  const W=820, H=220, P={t:24,r:20,b:44,l:72};
  const iW=W-P.l-P.r, iH=H-P.t-P.b;
  const n=entries.length;
  const gap=iW/n;
  const xOf=i=>P.l+i*gap+gap/2;
  const maxVal=Math.max(...entries.map(([,v])=>v.total),1);
  const labelStep=Math.max(1,Math.ceil(n/12));
  const gridLines=[0.25,0.5,0.75,1].map(r=>({r, y:P.t+iH*r, val:maxVal*(1-r)}));
  const yOf = v => P.t + iH - (Math.max(0, v) / maxVal) * iH;
  const ptsTotal = entries.map(([k,v],i)=>({k,v,i,x:xOf(i),y:yOf(v.total)}));
  const ptsArch = entries.map(([k,v],i)=>({k,v,i,x:xOf(i),y:yOf(v.archivio)}));
  const ptsPino = entries.map(([k,v],i)=>({k,v,i,x:xOf(i),y:yOf(v.pino)}));
  const lineTotal = ptsTotal.map(p=>`${p.x},${p.y}`).join(" ");
  const lineArch = ptsArch.map(p=>`${p.x},${p.y}`).join(" ");
  const linePino = ptsPino.map(p=>`${p.x},${p.y}`).join(" ");
  const areaTotal = ptsTotal.length
    ? `M ${ptsTotal[0].x} ${P.t+iH} L ${ptsTotal.map(p=>`${p.x} ${p.y}`).join(" L ")} L ${ptsTotal[ptsTotal.length-1].x} ${P.t+iH} Z`
    : "";

  const handleMouseMove = e => {
    if(!svgRef.current || pinnedIdx !== null) return;
    clearHideTimer();
    const rect=svgRef.current.getBoundingClientRect();
    const mx=(e.clientX-rect.left)*(W/rect.width);
    let best=null, bestD=Infinity;
    entries.forEach(([,],i)=>{ const d=Math.abs(mx-xOf(i)); if(d<bestD&&d<gap/2+2){bestD=d;best=i;} });
    setHoverIdx(best);
    setMousePos({x:e.clientX-rect.left, y:e.clientY-rect.top});
  };

  const totGlobale = entries.reduce((s,[,v])=>s+v.total,0);
  const nGlobale = entries.reduce((s,[,v])=>s+v.items.length,0);

  return (
    <div style={{userSelect:"none"}}>
      {filtriUI}

      <div style={{display:"flex",gap:8,marginBottom:16,flexWrap:"wrap"}}>
        {[
          {label:"Totale periodo", val:eur(totGlobale), color:"var(--text-2)"},
          {label:"In Archivio", val:eur(entries.reduce((s,[,v])=>s+v.archivio,0)), color:"var(--text-2)"},
          {label:"Cons. a Pino", val:eur(entries.reduce((s,[v])=>s+v.pino,0)), color:"var(--text-2)"},
          {label:"Assegni - Date", val:`${nGlobale} - ${entries.length}`, color:"var(--text-2)"},
        ].map(({label,val,color},i)=>(
          <div key={i} style={{flex:"1 1 140px",background:"var(--surface)",border:"1px solid var(--border)",borderRadius:14,padding:"14px 18px",boxShadow:"0 10px 22px rgba(0,0,0,.22)"}}>
            <div style={{color:"var(--text-2)",fontSize:10,fontWeight:700,textTransform:"uppercase",letterSpacing:1.2,marginBottom:8}}>{label}</div>
            <div style={{color,fontSize:16,fontWeight:800,fontFamily:"'Century Gothic', CenturyGothic, sans-serif",lineHeight:1}}>{val}</div>
          </div>
        ))}
      </div>

      <div style={{position:"relative",border:"1px solid var(--border)",borderRadius:16,background:"var(--grad-card)",padding:"8px 10px 4px",boxShadow:"0 14px 30px rgba(0,0,0,.28)"}}>
        <svg ref={svgRef} width="100%" viewBox={`0 0 ${W} ${H}`} style={{overflow:"visible",cursor:"pointer",display:"block"}} onMouseMove={handleMouseMove} onMouseLeave={scheduleHideTooltip}>
          <defs>
            <linearGradient id="ccPlotBg" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--text-1)"/>
              <stop offset="100%" stopColor="var(--text-2)"/>
            </linearGradient>
            <linearGradient id="ccArea" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stopColor="var(--accent)" stopOpacity=".18"/>
              <stop offset="100%" stopColor="var(--accent)" stopOpacity=".03"/>
            </linearGradient>
          </defs>

          <rect x={P.l} y={P.t} width={iW} height={iH} fill="var(--surface)" rx={9}/>
          <rect x={P.l} y={P.t} width={iW} height={iH} fill="url(#ccPlotBg)" rx={9} stroke="var(--border)"/>

          {gridLines.map(({r,y,val})=>{
            if(r!==1) return null;
            return <line key={r} x1={P.l} x2={P.l+iW} y1={y} y2={y} stroke="var(--border-2)" strokeWidth={1}/>;
          })}

          {areaTotal && <path d={areaTotal} fill="url(#ccArea)"/>}
          {lineArch && <polyline points={lineArch} fill="none" stroke="var(--text-3)" strokeWidth="1.8" strokeLinecap="round" strokeLinejoin="round" opacity=".92"/>}
          {linePino && <polyline points={linePino} fill="none" stroke="var(--text-2)" strokeWidth="1.7" strokeLinecap="round" strokeLinejoin="round" opacity=".85"/>}
          {lineTotal && <polyline points={lineTotal} fill="none" stroke="var(--accent)" strokeWidth="2.35" strokeLinecap="round" strokeLinejoin="round"/>}

          {ptsTotal.map((p)=>{
            const [k,v] = entries[p.i];
            const isHov = activeIdx===p.i;
            const isToday = k===todayKey;
            const inTol = isInTol(v.items);
            const nA = v.items.length;
            return (
              <g key={k} style={{cursor:"pointer"}} onClick={()=>onNavigate&&onNavigate(k,v.items)}>
                <rect x={p.x-gap/2} y={P.t} width={gap} height={iH} fill="transparent"/>
                {isHov&&<line x1={p.x} x2={p.x} y1={P.t} y2={P.t+iH} stroke="var(--text-3)" strokeWidth={1} opacity={.45}/>} 
                {isToday&&!isHov&&<line x1={p.x} x2={p.x} y1={P.t} y2={P.t+iH} stroke="var(--text-3)" strokeWidth={1} opacity={.3}/>} 

                <circle cx={p.x} cy={p.y} r={isHov?4.8:3.2} fill={inTol?"var(--warn)":"var(--text-1)"} stroke="var(--bg)" strokeWidth="1.2"/>

                {(isHov||(n<=8))&&(
                  <text x={p.x} y={p.y-9} textAnchor="middle" fill={inTol?"var(--warn)":"var(--text-1)"} fontSize={8.2} fontFamily="var(--mono)" fontWeight="bold">{fmtY(v.total)}</text>
                )}
                {nA>1&&!isHov&&(
                  <g>
                    <circle cx={p.x} cy={p.y-13} r={6} fill="var(--surface)" stroke="var(--border)" strokeWidth={1}/>
                    <text x={p.x} y={p.y-9.5} textAnchor="middle" fill="var(--text-2)" fontSize={6.5} fontFamily="var(--mono)" fontWeight="bold">{nA}</text>
                  </g>
                )}
                {(p.i%labelStep===0||n<=15)&&<text x={p.x} y={H-P.b+14} textAnchor="middle" fill="var(--text-2)" fontSize={10} fontFamily="'Century Gothic', CenturyGothic, sans-serif" fontWeight={isToday||isHov?"bold":"600"}>{fmtDay(k)}</text>}
              </g>
            );
          })}

          <line x1={P.l} x2={P.l} y1={P.t} y2={P.t+iH} stroke="var(--border)" strokeWidth={1}/>
          <line x1={P.l} x2={P.l+iW} y1={P.t+iH} y2={P.t+iH} stroke="var(--border)" strokeWidth={1}/>
        </svg>

        {activeIdx!==null&&(()=>{
          const [k,v]=entries[activeIdx];
          if(!svgRef.current) return null;
          const svgRect=svgRef.current.getBoundingClientRect();
          const containerW = svgRect.width || 820;
          const containerH = svgRect.height || 220;
          const TW = Math.max(260, Math.min(380, Math.floor(containerW * 0.45)));
          const margin = 8;
          const estTooltipH = 390;
          let leftPx = mousePos.x + 14;
          if (leftPx + TW > containerW - margin) leftPx = mousePos.x - TW - 14;
          leftPx = Math.max(margin, Math.min(leftPx, containerW - TW - margin));
          let topPx = Math.max(margin, mousePos.y - 20);
          topPx = Math.min(topPx, Math.max(margin, containerH - estTooltipH - margin));

          const inTol=isInTol(v.items);
          const accentColor=inTol?"var(--warn)":"var(--success)";
          const accentBg=inTol?"var(--danger-s)":"var(--success-s)";

          return (
            <div style={{position:"absolute",top:topPx,left:leftPx,width:TW,background:"var(--surface)",border:`1px solid ${accentColor}55`,borderRadius:12,boxShadow:"0 14px 34px rgba(0,0,0,.3)",zIndex:300,pointerEvents:"auto",overflow:"hidden"}} onMouseEnter={clearHideTimer} onMouseLeave={scheduleHideTooltip}>
              <div style={{background:accentBg,padding:"12px 16px",borderBottom:`1px solid ${accentColor}22`}}>
                <div style={{color:accentColor,fontSize:11,fontWeight:800,letterSpacing:.35,marginBottom:6,lineHeight:1.35}}>{fmtFullLong(k)}</div>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline"}}>
                  <span style={{color:"var(--text-1)",fontSize:10}}>{v.items.length} assegn{v.items.length===1?"o":"i"} in scadenza</span>
                  <span style={{color:accentColor,fontSize:17,fontWeight:900,fontFamily:"var(--mono)",lineHeight:1}}>{eur(v.total)}</span>
                </div>
              </div>

              <div style={{padding:"6px 16px",background:"var(--raised)",borderBottom:"1px solid var(--border)",display:"flex",justifyContent:"space-between",alignItems:"center",gap:8}}>
                <span style={{color:"var(--text-1)",fontSize:8.5,fontFamily:"var(--mono)",lineHeight:1.3}}>Clicca un punto per aprire nello storico</span>
                <button onClick={(e)=>{e.stopPropagation(); setPinnedIdx(pinnedIdx===activeIdx?null:activeIdx);}} style={{background:pinnedIdx===activeIdx?"var(--text-1)":"var(--raised)",border:"1px solid var(--border)",color:pinnedIdx===activeIdx?"var(--surface)":"var(--text-1)",borderRadius:6,padding:"2px 8px",cursor:"pointer",fontSize:9,fontWeight:700}}>{pinnedIdx===activeIdx?"Sblocca":"Blocca"}</button>
              </div>

              <div style={{maxHeight:360,overflowY:"auto",scrollbarWidth:"thin",scrollbarColor:"rgba(255,255,255,.15) transparent"}}>
                <div style={{position:"sticky",top:0,zIndex:2,display:"flex",justifyContent:"space-between",alignItems:"center",padding:"7px 16px",background:"var(--raised)",borderBottom:"1px solid var(--border)"}}>
                  <span style={{color:"var(--text-1)",fontSize:9}}>Elenco assegni</span>
                  <span style={{color:accentColor,fontSize:10,fontFamily:"var(--mono)",fontWeight:700}}>{eur(v.total)}</span>
                </div>

                {v.items.map((a,j)=>{
                  const imp=parseNum(a["IMPORTO TITOLO"]);
                  const fatture=a["FATTURE PAGATE"]||"";
                  const nc=a["NC SCALATE"]||"";
                  const docsColl=a["DOCUMENTI COLLEGATI"]||"";
                  const done=isIncassato(a);

                  return (
                    <div key={j} style={{padding:"10px 16px",borderBottom:j<v.items.length-1?"1px solid var(--border)":"none",background:j%2===0?"var(--surface)":"var(--bg)"}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:4}}>
                        <div style={{color:"var(--text-1)",fontSize:11,fontWeight:700,flex:1,minWidth:0,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap",paddingRight:8}}>
                          <span style={{display:"inline-block",width:6,height:6,borderRadius:99,marginRight:6,background:done?"var(--success)":"var(--warn)"}}/>{a["CLIENTE"]||"-"}
                        </div>
                        <div style={{color:accentColor,fontSize:12,fontWeight:900,fontFamily:"var(--mono)",whiteSpace:"nowrap",flexShrink:0}}>{eur(imp)}</div>
                      </div>

                      <div style={{display:"flex",gap:6,alignItems:"center",marginBottom:3}}>
                        <span style={{color:"var(--text-1)",fontSize:9,fontFamily:"var(--mono)",fontWeight:700}}>{a["N TITOLO"]||"-"}</span>
                        <span style={{color:"var(--text-2)",fontSize:8}}>-</span>
                        <span style={{fontSize:8,padding:"1px 5px",borderRadius:3,fontWeight:700,background:done?"var(--success-s)":"var(--warn-s)",color:done?"var(--success)":"var(--warn)",border:`1px solid ${done?"var(--success)":"var(--warn)"}`}}>{a["STATO TITOLO"]||""}</span>
                      </div>

                      {(fatture||nc||docsColl)&&(
                        <div style={{display:"flex",gap:8,flexWrap:"wrap",marginTop:3,maxWidth:"100%"}}>
                          {fatture&&<div style={{display:"flex",gap:3,alignItems:"center"}}><span style={{color:"var(--text-2)",fontSize:8,fontWeight:700}}>FATT.</span><span title={fmtDocList(fatture)} style={{color:"var(--text-2)",fontSize:9,fontFamily:"var(--mono)",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtDocList(fatture)}</span></div>}
                          {nc&&<div style={{display:"flex",gap:3,alignItems:"center"}}><span style={{color:"var(--text-2)",fontSize:8,fontWeight:700}}>NC</span><span title={fmtDocList(nc)} style={{color:"var(--text-2)",fontSize:9,fontFamily:"var(--mono)",maxWidth:120,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtDocList(nc)}</span></div>}
                          {docsColl&&!fatture&&<div style={{display:"flex",gap:3,alignItems:"center"}}><span style={{color:"var(--text-2)",fontSize:8,fontWeight:700}}>DOC.</span><span title={fmtDocList(docsColl)} style={{color:"var(--text-2)",fontSize:9,fontFamily:"var(--mono)",maxWidth:140,overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{fmtDocList(docsColl)}</span></div>}
                        </div>
                      )}
                    </div>
                  );
                })}
              </div>

              <div style={{padding:"9px 16px",borderTop:"1px solid var(--border)",background:"var(--raised)"}}>
                {v.archivio>0&&v.pino>0&&<div style={{display:"flex",justifyContent:"space-between",fontSize:9,marginBottom:5}}><span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:99,background:"#4f4f4f",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>Arch. {eur(v.archivio)}</span></span><span style={{display:"flex",alignItems:"center",gap:4}}><span style={{width:6,height:6,borderRadius:99,background:"#808080",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>Pino {eur(v.pino)}</span></span></div>}
                <div style={{display:"flex",justifyContent:"space-between",fontSize:9,color:"var(--text-2)",marginBottom:4}}><span>% sul totale periodo</span><span style={{color:"var(--text-2)",fontFamily:"var(--mono)"}}>{((v.total/totGlobale)*100).toFixed(1)}%</span></div>
                <div style={{height:3,background:"var(--accent-s)",borderRadius:2,overflow:"hidden"}}><div style={{height:"100%",background:accentColor,width:`${(v.total/totGlobale)*100}%`,borderRadius:2}}/></div>
                <div style={{display:"flex",gap:8,marginTop:8}}>
                  <button onClick={(e)=>{ e.stopPropagation(); onNavigate&&onNavigate(k,v.items); }} style={{flex:1,background:"var(--raised)",border:"1px solid var(--border)",color:"var(--text-1)",borderRadius:7,padding:"6px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>Apri Storico Giorno</button>
                  <button onClick={(e)=>{ e.stopPropagation(); setPinnedIdx(null); setHoverIdx(null); }} style={{background:"var(--raised)",border:"1px solid var(--border)",color:"var(--text-2)",borderRadius:7,padding:"6px 8px",cursor:"pointer",fontSize:10,fontWeight:700}}>Chiudi</button>
                </div>
              </div>
            </div>
          );
        })()}
      </div>

      <div style={{display:"flex",gap:14,marginTop:12,fontSize:10,color:"var(--text-2)",flexWrap:"wrap",alignItems:"center"}}>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:2,borderRadius:2,background:"var(--text-3)",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>In Archivio</span></span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:14,height:2,borderRadius:2,background:"var(--text-2)",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>Cons. a Pino</span></span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:8,height:8,borderRadius:99,background:"var(--warn)",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>Da riconciliare</span></span>
        <span style={{display:"flex",alignItems:"center",gap:6}}><span style={{width:2,height:10,background:"var(--text-2)",display:"inline-block"}}/><span style={{color:"var(--text-2)"}}>Oggi</span></span>
        <span style={{marginLeft:"auto",color:"var(--text-2)",fontSize:9,fontFamily:"var(--mono)"}}>{winFrom.slice(8,10)}/{winFrom.slice(5,7)}/{winFrom.slice(0,4)} {"->"} {winTo.slice(8,10)}/{winTo.slice(5,7)}/{winTo.slice(0,4)}</span>
      </div>
    </div>
  );
}

function PayModal({docs,onSave,onClose,user,onLogout}) {
  // ── STEP: 1=tipo+cliente, 2=partitario+abbina, 3=conferma
  const [step,setStep]=useState(1);
  const [tipo,setTipo]=useState(""); // "assegno" | "bonifico"
  const [clientSearch,setClientSearch]=useState("");
  const [cid,setCid]=useState("");
  const [clientName,setClientName]=useState("");
  const [showDropdown,setShowDropdown]=useState(false);

  // Dati assegno
  const [nAssegno,setNAssegno]=useState("");
  const [importoAssegno,setImportoAssegno]=useState(""); // importo fisico scritto sull'assegno
  const [dataTitolo,setDataTitolo]=useState(""); // data scritta sul titolo
  const [dataIncasso,setDataIncasso]=useState(""); // primo giorno lavorativo >= dataTitolo

  // Dati bonifico
  const [dataBonifico,setDataBonifico]=useState(new Date().toISOString().slice(0,10));

  // Abbinamento fatture
  const [rows,setRows]=useState([]); // [{doc, checked, importoAllocato}]
  const [saving,setSaving]=useState(false);
  // Note modificabili step 3
  const [noteAssegno,setNoteAssegno]=useState("");       // nota sull'assegno in registro
  const [noteDocOverride,setNoteDocOverride]=useState(null); // null = usa noteBase automatica, stringa = override
  const [noteDocPerDoc,setNoteDocPerDoc]=useState({});   // {numDoc: nota personalizzata}
  const [showNoteDoc,setShowNoteDoc]=useState(false);    // espandi sezione note per documento

  // ── Helpers
  const primoGiornoLavorativo = isoDate => {
    if(!isoDate) return "";
    const d = new Date(isoDate);
    // 0=Dom, 6=Sab
    while(d.getDay()===0 || d.getDay()===6) d.setDate(d.getDate()+1);
    return d.toISOString().slice(0,10);
  };

  const fmtIso = iso => {
    if(!iso) return "";
    const [y,m,g] = iso.split("-");
    return `${g}/${m}/${y}`;
  };

  const parseIso = ddmmyyyy => {
    if(!ddmmyyyy) return "";
    const p = ddmmyyyy.split("/");
    if(p.length===3) return `${p[2]}-${p[1].padStart(2,"0")}-${p[0].padStart(2,"0")}`;
    return ddmmyyyy;
  };

  const dayName = iso => {
    if(!iso) return "";
    return ["Dom","Lun","Mar","Mer","Gio","Ven","Sab"][new Date(iso).getDay()];
  };
  const dFmt = fmtIso; // Alias per formattazione data

  // Clienti unici (documenti incassabili)
  const isPayableDoc = d => {
    const st = String(d?.[COL.stato] || "").toUpperCase();
    return st === "APERTO" || st === "PARZIALE";
  };
  const allClients = [];
  const seen = new Set();
  docs.filter(isPayableDoc).forEach(d=>{
    const k = d[COL.codiceCliente];
    if(!seen.has(k)){ seen.add(k); allClients.push({id:k,name:d[COL.ragioneSociale]}); }
  });
  const filteredClients = clientSearch.length>1
    ? allClients.filter(c=>c.name.toLowerCase().includes(clientSearch.toLowerCase())||c.id.includes(clientSearch))
    : allClients;

  const selectClient = (id,name) => {
    setCid(id); setClientName(name); setClientSearch(name); setShowDropdown(false);
    setNoteDocOverride(null); setNoteDocPerDoc({}); setNoteAssegno(""); setShowNoteDoc(false);
    // Carica partitario: FVE FIFO + NAC in fondo
    const fves = docs.filter(d=>d[COL.codiceCliente]===id&&isPayableDoc(d)&&d[COL.tipoDocumento]==="FVE")
      .sort((a,b)=>new Date(parseIso(a[COL.dataDocumento]))-new Date(parseIso(b[COL.dataDocumento])));
    const nacs = docs.filter(d=>d[COL.codiceCliente]===id&&isPayableDoc(d)&&d[COL.tipoDocumento]==="NAC");
    setRows([...fves,...nacs].map(doc=>({doc,checked:false,importoAllocato:parseNum(doc[COL.saldoResiduo])})));
  };

  // Totali calcolati
  const fveSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="FVE");
  const nacSel = rows.filter(r=>r.checked&&r.doc[COL.tipoDocumento]==="NAC");
  const totFve = fveSel.reduce((s,r)=>s+r.importoAllocato,0);
  const totNac = nacSel.reduce((s,r)=>s+Math.abs(r.importoAllocato),0);
  const netto = totFve - totNac;

  const toggleRow = i => setRows(p=>{
    const r=[...p]; r[i]={...r[i],checked:!r[i].checked}; return r;
  });
  const setAlloc = (i,val) => setRows(p=>{
    const r=[...p];
    const max = Math.abs(parseNum(r[i].doc[COL.saldoResiduo]));
    r[i]={...r[i],importoAllocato:Math.min(Math.max(0,parseNum(val)),max),checked:true};
    return r;
  });

  // ── PREDIZIONE AUTOMATICA
  // Seleziona FVE non abbinate (senza n_assegno) in FIFO finché copre l'importo assegno,
  // poi scala le NAC disponibili. Tolleranza: l'assegno può eccedere di <5%.
  const applyPrediction = (targetRows, impAss) => {
    if(!impAss || impAss<=0) return targetRows;

    // Parti da tutte le righe deselezionate
    const newRows = targetRows.map(r=>({...r, checked:false, importoAllocato:Math.abs(parseNum(r.doc[COL.saldoResiduo]))}));

    // FVE libere (senza assegno già collegato), ordinate per data crescente
    const fveIdx = newRows
      .map((r,i)=>({r,i}))
      .filter(({r})=>r.doc[COL.tipoDocumento]==="FVE" && !r.doc[COL.nAssegno])
      .sort((a,b)=>new Date(parseIso(a.r.doc[COL.dataDocumento]))-new Date(parseIso(b.r.doc[COL.dataDocumento])));

    // NAC disponibili (indici nel newRows)
    const nacIdx = newRows
      .map((r,i)=>({r,i}))
      .filter(({r})=>r.doc[COL.tipoDocumento]==="NAC");

    const TOL = 0.05; // tolleranza 5%

    // ── PRIORITÀ 1: FVE singola con importo esatto (±1%)
    const esatta = fveIdx.find(({r})=>{
      const s = r.importoAllocato;
      return Math.abs(s - impAss) / impAss <= 0.01;
    });
    if(esatta){
      newRows[esatta.i] = {...newRows[esatta.i], checked:true};
      newRows[esatta.i]._predMode = "exact";
      return newRows;
    }

    // ── PRIORITÀ 2: somma FIFO di FVE per data ravvicinata
    // Accumula FVE dalla più vecchia finché la somma è <= impAss*(1+TOL)
    let somma = 0;
    const selIdx = [];
    for(const {r,i} of fveIdx){
      const s = r.importoAllocato;
      if(somma + s <= impAss * (1 + TOL)){
        somma += s;
        selIdx.push(i);
        // Se siamo entro tolleranza, è una buona soluzione
        if(Math.abs(somma - impAss) / impAss <= TOL) break;
      }
    }

    if(selIdx.length > 0 && Math.abs(somma - impAss) / impAss <= TOL){
      // Soluzione trovata solo con FVE
      selIdx.forEach(i => { newRows[i] = {...newRows[i], checked:true}; });
      return newRows;
    }

    // ── PRIORITÀ 3: FVE + NAC per avvicinarsi
    // Le FVE selezionate eccedono l'assegno → prova a scalare NAC per ridurre il netto
    // Oppure le FVE non arrivano all'importo → aggiungi NAC solo se riducono lo scarto

    // 3a. Se la somma FVE eccede l'assegno, prova a trovare NAC che riducono esattamente lo scarto
    if(selIdx.length > 0 && somma > impAss){
      const eccesso = somma - impAss;
      // Cerca una NAC singola che copre l'eccesso (±2%)
      const nacMatch = nacIdx.find(({r})=>Math.abs(r.importoAllocato - eccesso)/eccesso <= 0.02);
      selIdx.forEach(i => { newRows[i] = {...newRows[i], checked:true}; });
      if(nacMatch){
        newRows[nacMatch.i] = {...newRows[nacMatch.i], checked:true};
      }
      return newRows;
    }

    // 3b. Somma FVE < impAss: seleziona comunque le FVE trovate (parziale)
    if(selIdx.length > 0){
      selIdx.forEach(i => { newRows[i] = {...newRows[i], checked:true}; });
      return newRows;
    }

    // ── FALLBACK: nessuna FVE utile trovata, non seleziona nulla
    return newRows;
  };

  // Data incasso effettivo
  const dataEff = tipo==="assegno" ? dataIncasso : dataBonifico;

  // ── SAVE
  const save = async () => {
    if(saving) return;
    const selected = rows.filter(r=>r.checked&&r.importoAllocato>0);
    if(!selected.length) return;
    setSaving(true);

    const nacNums = nacSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const fveNums = fveSel.map(r=>r.doc[COL.numeroDocumento]).join(", ");
    const impAss = tipo==="assegno"?(parseFloat(importoAssegno)||0):0;
    const scartoNote = impAss>0&&Math.abs(impAss-netto)>0.005?` | ASS: ${eur(impAss)}`:"" ;
    const noteBase = tipo==="assegno"
      ? `DA INCASSARE ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}${scartoNote}`
      : `DA INCASSARE BONIF ${fmtIso(dataEff)}${nacNums?` | NAC: ${nacNums}`:""}`;

    const pred = {
      full: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))<0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      partial: selected.filter(r=>Math.abs(r.importoAllocato-Math.abs(parseNum(r.doc[COL.saldoResiduo])))>=0.01).map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacs: nacSel.map(r=>({...r.doc,allocato:r.importoAllocato})),
      nacTotal: totNac,
      net: netto,
      residual:0,
      exact:[],
    };

    const noteFinale = noteDocOverride!==null ? noteDocOverride : noteBase;
    await onSave({
      method: tipo==="assegno"?"ASSEGNO":"BONIFICO",
      amount: netto,
      importoAssegno: tipo==="assegno"?(parseFloat(importoAssegno)||0):0,
      cid, date: dataEff, notes: noteFinale,
      noteAssegno: noteAssegno||"",
      noteDocPerDoc,
      nAssegno: tipo==="assegno"?nAssegno:"",
      dataTitolo: tipo==="assegno"?dataTitolo:"",
      fveNums, nacNums,
      pred,
    });
    setSaving(false);
    onClose();
  };

  // ── STYLES locali
  const inp = {background:"var(--surface)",border:"1px solid var(--border)",borderRadius:"var(--radius-s)",
    padding:"9px 12px",color:"var(--text-1)",fontSize:13,fontFamily:"var(--font)",
    width:"100%",outline:"none"};
  const card = (active,accent="var(--accent)") => ({
    border:`1px solid ${active?accent:"var(--border)"}`,borderRadius:12,padding:"18px 20px",
    cursor:"pointer",background:active?`rgba(14,165,233,.1)`:"var(--surface)",
    boxShadow: active ? `0 10px 24px rgba(14,165,233,.2)` : "0 8px 18px rgba(0,0,0,.2)",
    transition:"all .15s",textAlign:"center",flex:1,
  });

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,.88)",zIndex:1000,
      display:"flex",alignItems:"center",justifyContent:"center",animation:"overlayEnter .3s ease-out",padding:"12px"}}>
      <div className="premium-panel-dark" role="dialog" aria-label="Registra incasso - Seleziona tipo, cliente, abbina documenti e conferma" style={{
        width:"clamp(320px, 100%, 700px)",maxHeight:"94vh",overflowY:"auto",animation:"modalEnter .35s cubic-bezier(0.34, 1.56, 0.64, 1)",
        boxShadow:"0 24px 80px rgba(0,0,0,.52)",fontFamily:"var(--font)"}}>

        {/* ── HEADER */}
        <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",
          padding:"18px 24px",borderBottom:"1px solid var(--border)",position:"sticky",top:0,
          background:"var(--grad-header)",zIndex:10}}>
          <div>
            <div style={{color:"var(--text-1)",fontSize:15,fontWeight:800,letterSpacing:".01em"}}>Registra Incasso</div>
            <div style={{display:"flex",gap:8,marginTop:8,flexWrap:"wrap"}}>
              {["Tipo & Cliente","Abbina Documenti","Conferma"].map((lbl,i)=>(
                <span key={i} className={step===i+1?"step-pill active":"step-pill"}>
                  {i+1}. {lbl}
                </span>
              ))}
            </div>
          </div>
          <button onClick={onClose} style={{background:"transparent",border:"none",
            color:"var(--text-2)",fontSize:20,cursor:"pointer"}}>✕</button>
        </div>

        <div style={{padding:"24px"}}>

        {/* ══ STEP 1 — Tipo pagamento + Cliente ══ */}
        {step===1&&(
          <>
            {/* Tipo */}
            <div style={{marginBottom:24}}>
              <div style={{color:"var(--text-2)",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                TIPO PAGAMENTO
              </div>
              <div style={{display:"flex",gap:12}}>
                <div style={card(tipo==="assegno","var(--accent)")} onClick={()=>setTipo("assegno")}>
                  <div style={{color:tipo==="assegno"?"var(--accent)":"var(--text-3)",fontWeight:700,fontSize:13}}>Assegno</div>
                  <div style={{color:"var(--text-2)",fontSize:10,marginTop:4}}>Titolo fisico</div>
                </div>
                <div style={card(tipo==="bonifico","var(--accent)")} onClick={()=>setTipo("bonifico")}>
                  <div style={{color:tipo==="bonifico"?"var(--accent)":"var(--text-3)",fontWeight:700,fontSize:13}}>Bonifico</div>
                  <div style={{color:"var(--text-2)",fontSize:10,marginTop:4}}>Trasferimento bancario</div>
                </div>
              </div>
              {!tipo && <div style={{color:"var(--danger)",fontSize:10,marginTop:8}}>⚠ Seleziona un tipo di pagamento</div>}
            </div>

            {/* Dati specifici per tipo */}
            {tipo==="assegno"&&(
              <div style={{background:"var(--surface)",border:"1px solid var(--border)",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"var(--text-2)",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI ASSEGNO
                </div>
                <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:12}}>
                  <div>
                    <label style={{color:"var(--text-2)",fontSize:11,display:"block",marginBottom:5}}>
                      Numero Assegno
                    </label>
                    <input value={nAssegno} onChange={e=>setNAssegno(e.target.value)}
                      placeholder="AB - XXXXX" style={inp}/>
                  </div>
                  <div>
                    <label style={{color:"var(--text-2)",fontSize:11,display:"block",marginBottom:5}}>
                      Data sul Titolo
                    </label>
                    <input type="date" value={dataTitolo}
                      onChange={e=>{
                        setDataTitolo(e.target.value);
                        setDataIncasso(primoGiornoLavorativo(e.target.value));
                      }}
                      style={inp}/>
                  </div>
                  <div>
                    <label style={{color:"var(--text-2)",fontSize:11,display:"block",marginBottom:5}}>
                      Importo Assegno <span style={{color:"var(--warn)",fontSize:9}}>€</span>
                    </label>
                    <input type="number" value={importoAssegno}
                      onChange={e=>setImportoAssegno(e.target.value)}
                      placeholder="0,00" step="0.01" min="0"
                      style={{...inp,fontFamily:"var(--mono)",fontWeight:600,
                        color:importoAssegno?"var(--success)":"var(--text-3)",
                        border:importoAssegno?"1px solid var(--success)":"1px solid var(--border)"}}/>
                  </div>
                </div>
                {dataTitolo&&(
                  <div style={{marginTop:12,background:"var(--surface)",borderRadius:"var(--radius-s)",padding:"10px 14px"}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                      <div>
                        <div style={{color:"var(--text-2)",fontSize:10,marginBottom:3}}>Data sul titolo</div>
                        <div style={{color:"var(--text-2)",fontSize:12}}>
                          {fmtIso(dataTitolo)} — <span style={{color:["Sab","Dom"].includes(dayName(dataTitolo))?"#fb923c":"#334155"}}>
                            {dayName(dataTitolo)}
                          </span>
                        </div>
                      </div>
                      <div style={{textAlign:"right"}}>
                        <div style={{color:"var(--text-2)",fontSize:10,marginBottom:3}}>Data incasso previsto</div>
                        <div style={{color:"var(--success)",fontSize:13,fontWeight:700}}>
                          {fmtIso(dataIncasso)} — {dayName(dataIncasso)}
                        </div>
                        {dataTitolo!==dataIncasso&&(
                          <div style={{color:"var(--warn)",fontSize:10,marginTop:2}}>
                            ↑ spostato (weekend)
                          </div>
                        )}
                      </div>
                    </div>
                    <div style={{marginTop:10}}>
                      <label style={{color:"var(--text-2)",fontSize:10,display:"block",marginBottom:4}}>
                        Correggi data incasso (se necessario)
                      </label>
                      <input type="date" value={dataIncasso}
                        onChange={e=>setDataIncasso(e.target.value)} style={{...inp,fontSize:12}}/>
                    </div>
                  </div>
                )}
                {!dataTitolo && tipo==="assegno" && <div style={{color:"var(--danger)",fontSize:10,marginTop:8}}>⚠ Inserisci data titolo</div>}
              </div>
            )}

            {tipo==="bonifico"&&(
              <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:12,
                padding:18,marginBottom:20}}>
                <div style={{color:"var(--text-2)",fontSize:11,marginBottom:12,fontWeight:700,letterSpacing:1}}>
                  DATI BONIFICO
                </div>
                <div>
                  <label style={{color:"var(--text-2)",fontSize:11,display:"block",marginBottom:5}}>
                    Data contabile bonifico
                  </label>
                  <input type="date" value={dataBonifico}
                    onChange={e=>setDataBonifico(e.target.value)} style={inp}/>
                </div>
                {!dataBonifico && <div style={{color:"var(--danger)",fontSize:10,marginTop:8}}>⚠ Inserisci data bonifico</div>}
              </div>
            )}

            {/* Selezione cliente */}
            {tipo&&(
              <div style={{marginBottom:20}}>
                <div style={{color:"var(--text-2)",fontSize:11,marginBottom:10,fontWeight:700,letterSpacing:1}}>
                  CLIENTE
                </div>
                <div style={{position:"relative"}}>
                  <input value={clientSearch}
                    aria-label="Cerca cliente per nome o codice"
                    onChange={e=>{setClientSearch(e.target.value);setShowDropdown(true);setCid("");}}
                    onFocus={()=>setShowDropdown(true)}
                    placeholder="🔍 Cerca per nome o codice..."
                    style={inp}/>
                  {showDropdown&&filteredClients.length>0&&(
                    <div style={{position:"absolute",top:"100%",left:0,right:0,zIndex:50,
                      background:"var(--bg)",border:"1px solid var(--border)",borderRadius:"var(--radius-s)",
                      maxHeight:200,overflowY:"auto",boxShadow:"0 8px 24px #000a"}}>
                      {filteredClients.slice(0,10).map(c=>(
                        <div key={c.id} onClick={()=>selectClient(c.id,c.name)}
                          style={{padding:"10px 14px",cursor:"pointer",borderBottom:"1px solid var(--border-2)"}}
                          className="row-hover">
                          <div style={{color:"var(--text-1)",fontSize:12}}>{c.name}</div>
                          <div style={{color:"var(--text-2)",fontSize:10}}>cod. {c.id}</div>
                        </div>
                      ))}
                    </div>
                  )}
                </div>
                {cid&&(
                  <div style={{marginTop:10,background:"var(--bg)",border:"1px solid var(--border)",
                    borderRadius:"var(--radius-s)",padding:"10px 14px",fontSize:12,color:"var(--accent)"}}>
                    ✓ <strong>{clientName}</strong> — {rows.filter(r=>r.doc[COL.tipoDocumento]==="FVE").length} FVE aperte,{" "}
                    {rows.filter(r=>r.doc[COL.tipoDocumento]==="NAC").length} NAC disponibili
                  </div>
                )}
                {tipo&&!cid && <div style={{color:"var(--danger)",fontSize:10,marginTop:8}}>⚠ Seleziona un cliente</div>}
              </div>
            )}

            <div style={{display:"flex",justifyContent:"flex-end",gap:10}}>
              <button onClick={onClose} style={{background:"var(--accent-s)",border:"none",borderRadius:"var(--radius-s)",
                padding:"10px 20px",color:"var(--text-2)",cursor:"pointer",fontSize:13}}>Annulla</button>
              <button
                disabled={!tipo||!cid||(tipo==="assegno"&&!dataIncasso)||(tipo==="bonifico"&&!dataBonifico)}
                onClick={()=>{
                  const imp=parseFloat(importoAssegno)||0;
                  if(tipo==="assegno"&&imp>0) setRows(r=>applyPrediction(r,imp));
                  setStep(2);
                }}
                style={{background:tipo&&cid?"var(--accent)":"var(--raised)",
                  border:"none",borderRadius:"var(--radius-s)",padding:"10px 24px",
                  color:tipo&&cid?"#fff":"var(--text-3)",cursor:tipo&&cid?"pointer":"not-allowed",
                  fontSize:13,fontWeight:700}}>
                Avanti → Abbina Documenti
              </button>
            </div>
          </>
        )}

        {/* ══ STEP 2 — Partitario cliente + Abbinamento ══ */}
        {step===2&&(
          <>
            {/* Riepilogo testata */}
            <div style={{background:"var(--bg)",border:"1px solid var(--border)",borderRadius:10,
              padding:"12px 16px",marginBottom:18,display:"flex",gap:20,flexWrap:"wrap",alignItems:"center"}}>
              <div>
                <div style={{color:"var(--text-2)",fontSize:10}}>Cliente</div>
                <div style={{color:"var(--text-1)",fontSize:13,fontWeight:700}}>{clientName}</div>
              </div>
              <div>
                <div style={{color:"var(--text-2)",fontSize:10}}>Tipo</div>
                <div style={{color:"var(--accent)",fontSize:13,fontWeight:700}}>
                  {tipo==="assegno"?`Assegno ${nAssegno}`:"Bonifico"}
                </div>
              </div>
              {tipo==="assegno"&&parseFloat(importoAssegno)>0&&(
                <div style={{background:"var(--raised)",borderRadius:"var(--radius-s)",padding:"6px 12px",
                  border:"1px solid var(--border)"}}>
                  <div style={{color:"var(--text-2)",fontSize:10}}>Importo assegno</div>
                  <div style={{color:"var(--success)",fontSize:14,fontWeight:700,fontFamily:"var(--mono)"}}>
                    {eur(parseFloat(importoAssegno))}
                  </div>
                </div>
              )}
              <div>
                <div style={{color:"var(--text-2)",fontSize:10}}>Data incasso previsto</div>
                <div style={{color:"var(--success)",fontSize:13,fontWeight:700}}>{fmtIso(dataEff)}</div>
              </div>
            </div>

            {/* Widget importo assegno + contatori live */}
            {(()=>{
              const impAss = parseFloat(importoAssegno)||0;
              const scarto = impAss>0 ? impAss - netto : 0;
              const scartoPerc = impAss>0 ? (scarto/impAss)*100 : 0;
              const overLimit = Math.abs(scartoPerc)>5; // >5% è anomalo
              const scartoColor = scarto<-0.005 ? "var(--danger)" : scarto>0.005 ? "var(--warn)" : "var(--success)";
              const barPct = impAss>0 ? Math.min(100,(netto/impAss)*100) : 0;
              return (
                <>
                  {/* Barra confronto — solo se importo assegno inserito */}
                  {impAss>0&&(
                    <div style={{background:"var(--raised)",border:"1px solid var(--border)",
                      borderRadius:"var(--radius-s)",padding:"12px 16px",marginBottom:14}}>
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:8}}>
                        <span style={{color:"var(--text-2)",fontSize:10,fontWeight:600,letterSpacing:".8px",textTransform:"uppercase"}}>
                          Copertura assegno
                        </span>
                        <span style={{display:"flex",gap:16,alignItems:"baseline"}}>
                          <span style={{color:"var(--text-2)",fontSize:10}}>
                            Assegno: <span style={{color:"var(--text-1)",fontFamily:"var(--mono)",fontWeight:600}}>{eur(impAss)}</span>
                          </span>
                          <span style={{color:"var(--text-2)",fontSize:10}}>
                            Netto selezione: <span style={{color:"#38bdf8",fontFamily:"var(--mono)",fontWeight:600}}>{eur(netto)}</span>
                          </span>
                        </span>
                      </div>
                      {/* Barra progresso */}
                      <div style={{height:6,background:"var(--border)",borderRadius:3,marginBottom:8,overflow:"hidden"}}>
                        <div style={{height:"100%",width:`${barPct}%`,
                          background:overLimit?"var(--danger)":scarto<-0.005?"var(--danger)":scarto>0.005?"#38bdf8":"var(--success)",
                          borderRadius:3,transition:"width .3s ease"}}/>
                      </div>
                      {/* Scarto */}
                      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                        <div style={{fontSize:10,color:scartoColor,fontWeight:600}}>
                          {Math.abs(scarto)<0.005
                            ? "✓ Corrisponde esattamente"
                            : scarto>0
                              ? `↑ Assegno eccede di ${eur(scarto)} (${scartoPerc.toFixed(1)}%) — arrotondamento`
                              : `↓ Assegno non copre: mancano ${eur(Math.abs(scarto))}`
                          }
                        </div>
                        {overLimit&&(
                          <span style={{fontSize:9,color:"var(--warn)",background:"var(--warn-s)",
                            padding:"2px 8px",borderRadius:20,fontWeight:600}}>
                            scarto {'>'} 5% — verificare
                          </span>
                        )}
                      </div>
                    </div>
                  )}

                  {/* Contatori live */}
                  <div style={{display:"grid",gridTemplateColumns:impAss>0?"repeat(4,1fr)":"repeat(3,1fr)",gap:10,marginBottom:18}}>
                    {[
                      {lbl:"FVE selezionate",val:eur(totFve),c:"#60a5fa"},
                      {lbl:"NAC scalate",     val:eur(totNac),c:"#c084fc"},
                      {lbl:"Netto",           val:eur(netto), c:"var(--text-1)"},
                      ...(impAss>0?[{lbl:"Assegno",val:eur(impAss),c:scartoColor}]:[]),
                    ].map(({lbl,val,c:col})=>(
                      <div key={lbl} style={{background:"var(--bg)",border:"1px solid var(--border)",
